<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>量子双缝干涉 - 物理沙盒宇宙</title>
  <link rel="stylesheet" href="shared-theme.css?v=20260724b">

  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <style>
    .exp-bg { z-index: -1; }
    body { overflow-x: hidden; font-family: 'Inter', system-ui, sans-serif; }

    /* Theme overrides for quantum experiment */
    [data-theme="academic"] body { background: var(--bg-color); color: var(--text-color); }
    [data-theme="academic"] .q-panel { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 4px; }
    [data-theme="academic"] .q-text { color: #1a1a2e; }
    [data-theme="academic"] .q-muted { color: #7a7a8a; }
    [data-theme="academic"] .q-accent { color: #6b8cae; }
    [data-theme="academic"] .q-btn-primary { background: #6b8cae; color: white; border: none; border-radius: 4px; }
    [data-theme="academic"] .q-btn-secondary { background: #f1f3f5; color: #1a1a2e; border: 1px solid #e0e0e0; border-radius: 4px; }
    [data-theme="academic"] .q-canvas-bg { background: #ffffff; border: 1px solid #e0e0e0; }
    [data-theme="academic"] .q-switch-bg { background: rgba(0,0,0,0.1); }
    [data-theme="academic"] .q-switch-thumb { background: #6b8cae; }
    [data-theme="academic"] input[type="range"] { background: rgba(0,0,0,0.1); }
    [data-theme="academic"] input[type="range"]::-webkit-slider-thumb { background: #6b8cae; }

    [data-theme="cartoon"] body { background: var(--bg-color); color: var(--text-color); }
    [data-theme="cartoon"] .q-panel { background: rgba(255,255,255,0.85); border: 3px solid rgba(255,180,100,0.3); border-radius: 24px; }
    [data-theme="cartoon"] .q-text { color: #2d3436; }
    [data-theme="cartoon"] .q-muted { color: #636e72; }
    [data-theme="cartoon"] .q-accent { color: var(--accent-1); }
    [data-theme="cartoon"] .q-btn-primary { background: linear-gradient(135deg, var(--accent-2), var(--accent-1)); color: white; border: none; border-radius: 16px; }
    [data-theme="cartoon"] .q-btn-secondary { background: rgba(0,0,0,0.05); color: #555; border: 2px solid #ddd; border-radius: 16px; }
    [data-theme="cartoon"] .q-canvas-bg { background: rgba(255,255,255,0.6); border: 2px solid rgba(255,180,100,0.2); }
    [data-theme="cartoon"] .q-switch-bg { background: rgba(0,0,0,0.1); }
    [data-theme="cartoon"] .q-switch-thumb { background: white; }
    [data-theme="cartoon"] input[type="range"] { background: rgba(0,0,0,0.1); }
    [data-theme="cartoon"] input[type="range"]::-webkit-slider-thumb { background: var(--accent-1); }

    [data-theme="glass"] body { background: var(--bg-color); color: var(--text-color); }
    [data-theme="glass"] .q-panel { background: rgba(255,255,255,0.06); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; }
    [data-theme="glass"] .q-text { color: #e0e6ed; }
    [data-theme="glass"] .q-muted { color: #8b92a8; }
    [data-theme="glass"] .q-accent { color: #74b9ff; }
    [data-theme="glass"] .q-btn-primary { background: rgba(116,185,255,0.2); color: #74b9ff; border: 1px solid rgba(116,185,255,0.4); border-radius: 12px; }
    [data-theme="glass"] .q-btn-secondary { background: rgba(255,255,255,0.05); color: #ccc; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; }
    [data-theme="glass"] .q-canvas-bg { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
    [data-theme="glass"] .q-switch-bg { background: rgba(255,255,255,0.1); }
    [data-theme="glass"] .q-switch-thumb { background: #74b9ff; }

    [data-theme="cyber"] body { background: var(--bg-color); color: var(--text-color); }
    [data-theme="cyber"] .q-panel { background: rgba(20,0,40,0.7); border: 1px solid rgba(189,0,255,0.4); border-radius: 8px; box-shadow: 0 0 20px rgba(189,0,255,0.1); }
    [data-theme="cyber"] .q-text { color: #f0e6ff; }
    [data-theme="cyber"] .q-muted { color: #a080c0; }
    [data-theme="cyber"] .q-accent { color: #00f3ff; }
    [data-theme="cyber"] .q-btn-primary { background: rgba(189,0,255,0.2); color: #bd00ff; border: 1px solid rgba(189,0,255,0.5); border-radius: 8px; text-shadow: 0 0 8px rgba(189,0,255,0.3); }
    [data-theme="cyber"] .q-btn-secondary { background: rgba(189,0,255,0.1); color: #a080c0; border: 1px solid rgba(189,0,255,0.3); border-radius: 8px; }
    [data-theme="cyber"] .q-canvas-bg { background: rgba(10,0,20,0.6); border: 1px solid rgba(189,0,255,0.3); box-shadow: 0 0 15px rgba(189,0,255,0.1); }
    [data-theme="cyber"] .q-switch-bg { background: rgba(189,0,255,0.3); }
    [data-theme="cyber"] .q-switch-thumb { background: #bd00ff; box-shadow: 0 0 10px rgba(189,0,255,0.8); }

    [data-theme="soviet"] body { background: var(--bg-color); color: var(--text-color); }
    [data-theme="soviet"] .q-panel { background: #fffaf2; border: 2px solid #c41e1e; border-radius: 2px; box-shadow: none; }
    [data-theme="soviet"] .q-text { color: #1a1a1a; }
    [data-theme="soviet"] .q-muted { color: #6a5a4a; }
    [data-theme="soviet"] .q-accent { color: #c41e1e; }
    [data-theme="soviet"] .q-btn-primary { background: #f4f0ea; color: #c41e1e; border: 2px solid #c41e1e; border-radius: 2px; text-shadow: none; }
    [data-theme="soviet"] .q-btn-secondary { background: #f4f0ea; color: #6a5a4a; border: 1px solid #d4c4a8; border-radius: 2px; }
    [data-theme="soviet"] .q-canvas-bg { background: #f0ebe4; border: 2px solid #d4c4a8; box-shadow: none; }
    [data-theme="soviet"] .q-switch-bg { background: #d4c4a8; }
    [data-theme="soviet"] .q-switch-thumb { background: #c41e1e; box-shadow: none; }
    [data-theme="soviet"] input[type="range"] { background: #d4c4a8; }
    [data-theme="soviet"] input[type="range"]::-webkit-slider-thumb { background: #c41e1e; }
    [data-theme="soviet"] .grid-bg { background-image: linear-gradient(rgba(196,30,30,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(196,30,30,0.08) 1px, transparent 1px); }

    .q-panel { transition: all 0.4s ease; padding: 1.25rem; }
    .q-text, .q-muted, .q-accent { transition: color 0.4s ease; }
    .q-btn-primary, .q-btn-secondary { padding: 0.75rem 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
    .q-btn-primary:hover { transform: translateY(-1px); }
    .q-canvas-bg { transition: all 0.4s ease; border-radius: 0.5rem; overflow: hidden; }

    /* Custom switch */
    .switch { position: relative; display: inline-block; width: 60px; height: 30px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider-switch { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; transition: .4s; border-radius: 34px; }
    .slider-switch:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider-switch:before { transform: translateX(30px); }
    input:checked + .slider-switch.q-switch-bg { background-color: var(--accent-1); }

    canvas { display: block; }
    .grid-bg {
      background-image: linear-gradient(rgba(56, 189, 248, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(56, 189, 248, 0.1) 1px, transparent 1px);
      background-size: 20px 20px;
    }
    [data-theme="academic"] .grid-bg {
      background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
    }
    [data-theme="cartoon"] .grid-bg {
      background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <div class="exp-bg"></div>

  <header class="py-4 px-6 md:px-12 flex justify-between items-center border-b border-opacity-20 z-10 relative" style="border-color: var(--panel-border);">
    <div class="flex items-center space-x-3">
      <div class="w-10 h-10 rounded-full flex items-center justify-center border" style="background: var(--panel-bg); border-color: var(--panel-border);">
        <i class="fa fa-atom q-accent text-xl"></i>
      </div>
      <h1 class="text-2xl font-light q-text">量子<span class="q-accent font-normal">实验室</span></h1>
    </div>
  </header>

  <main class="flex-grow flex flex-col md:flex-row p-4 md:p-8 gap-6 z-10 relative">
    <div class="w-full md:w-2/3 flex flex-col gap-4">
      <div class="q-panel">
        <h2 class="text-xl font-medium q-text mb-2">双缝干涉实验</h2>
        <p class="q-muted text-sm mb-4">观察粒子（光子/电子）如何穿越双缝。开启"探测器"将导致波函数坍缩，干涉条纹消失。</p>
        <div class="relative w-full" style="height: 450px;">
          <div id="canvas-container" class="absolute inset-0 q-canvas-bg grid-bg">
            <canvas id="simCanvas" width="800" height="400" class="w-full h-full"></canvas>
          </div>
          <div class="absolute top-4 right-4 q-panel px-3 py-2 text-sm flex items-center space-x-2">
            <div id="status-indicator" class="w-3 h-3 rounded-full bg-green-400 animate-pulse"></div>
            <span id="status-text" class="q-text">运行中</span>
          </div>
        </div>
        <div class="flex justify-center mt-4 gap-8 text-sm q-muted">
          <div class="flex items-center"><div class="w-3 h-3 rounded-full bg-yellow-400 mr-2"></div><span>发射源</span></div>
          <div class="flex items-center"><div class="w-3 h-3 rounded-full bg-cyan-400 mr-2"></div><span>双缝</span></div>
          <div class="flex items-center"><div class="w-3 h-3 rounded-full bg-red-400 mr-2"></div><span>屏幕</span></div>
        </div>
      </div>
      <div class="q-panel">
        <h2 class="text-xl font-medium q-text mb-2">强度分布</h2>
        <div class="w-full h-40 rounded-lg p-2 q-canvas-bg">
          <canvas id="intensityCanvas" width="800" height="150" class="w-full h-full"></canvas>
        </div>
      </div>
    </div>

    <div class="w-full md:w-1/3 flex flex-col gap-4">
      <div class="q-panel">
        <h2 class="text-xl font-medium q-text mb-4">实验控制</h2>
        <div class="space-y-6">
          <div>
            <label class="block q-muted text-sm mb-2">实验模式</label>
            <div class="flex rounded-lg overflow-hidden border" style="border-color: var(--panel-border);">
              <button id="singleSlitBtn" class="flex-1 py-2 px-4 text-center text-sm transition-colors q-btn-secondary">单缝模式</button>
              <button id="doubleSlitBtn" class="flex-1 py-2 px-4 text-center text-sm transition-colors q-btn-primary">双缝模式</button>
            </div>
          </div>
          <div>
            <div class="flex justify-between items-center mb-2">
              <label class="q-muted text-sm">观察者模式</label>
              <span id="observerStatus" class="text-xs px-2 py-1 rounded-full q-btn-secondary">关闭 (波动模式)</span>
            </div>
            <label class="switch">
              <input type="checkbox" id="observerToggle" onchange="toggleObserver()">
              <span class="slider-switch q-switch-bg"></span>
            </label>
          </div>
          <div>
            <div class="flex justify-between items-center mb-2">
              <label class="q-muted text-sm">粒子发射速率</label>
              <span id="emissionRateValue" class="text-xs px-2 py-1 rounded-full q-btn-secondary">3 粒子/帧</span>
            </div>
            <input type="range" id="emissionRate" min="1" max="10" value="3" class="w-full" oninput="updateEmissionRate(this.value)">
          </div>
          <div>
            <div class="flex justify-between items-center mb-2">
              <label class="q-muted text-sm">缝隙宽度</label>
              <span id="slitWidthValue" class="text-xs px-2 py-1 rounded-full q-btn-secondary">10 像素</span>
            </div>
            <input type="range" id="slitWidth" min="2" max="20" value="10" class="w-full" oninput="updateSlitWidth(this.value)">
          </div>
          <div id="slitGapContainer">
            <div class="flex justify-between items-center mb-2">
              <label class="q-muted text-sm">缝隙间距</label>
              <span id="slitGapValue" class="text-xs px-2 py-1 rounded-full q-btn-secondary">40 像素</span>
            </div>
            <input type="range" id="slitGap" min="20" max="80" value="40" class="w-full" oninput="updateSlitGap(this.value)">
          </div>
        </div>
      </div>
      <div class="q-panel">
        <div class="grid grid-cols-2 gap-3">
          <button id="resetBtn" class="q-btn-secondary"><i class="fa fa-refresh mr-2"></i>重置屏幕</button>
          <button id="clearBtn" class="q-btn-secondary"><i class="fa fa-trash mr-2"></i>清除所有</button>
          <button id="pauseBtn" class="q-btn-primary col-span-2"><i class="fa fa-pause mr-2"></i>暂停/继续</button>
        </div>
      </div>
      <div class="q-panel">
        <h2 class="text-xl font-medium q-text mb-2">波粒二象性</h2>
        <p class="q-muted text-sm">量子力学中的波粒二象性表明，微观粒子同时具有波动性和粒子性。双缝干涉实验是展示这一现象的经典实验。</p>
      </div>
    </div>
  </main>

  <footer class="py-4 px-6 md:px-12 border-t border-opacity-20 text-center q-muted text-sm z-10 relative" style="border-color: var(--panel-border);">
    <p>量子实验室 | 波粒二象性与双缝干涉实验可视化</p>
  </footer>

  <script src="shared-theme.js?v=20260724b"></script>
  <script>
    PSUTheme.createSwitcher();
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const intensityCanvas = document.getElementById('intensityCanvas');
    const intensityCtx = intensityCanvas.getContext('2d');
    const width = canvas.width, height = canvas.height;
    const sourceX = 50, sourceY = height / 2, wallX = 300, screenX = 750;
    let slitGap = 40, slitWidth = 10;
    let particles = [], hits = new Array(height).fill(0);
    let isObserverOn = false, isDoubleSlit = true, isPaused = false;
    let emissionRate = 3, frameCount = 0, animationId;

    class Particle {
      constructor() {
        this.x = sourceX; this.y = sourceY;
        this.vx = 4 + Math.random(); this.vy = (Math.random() - 0.5) * 2;
        this.phase = 0; this.color = '#fbbf24'; this.dead = false; this.wavePhase = Math.random() * Math.PI * 2;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if (this.phase === 0 && this.x >= wallX) {
          let isThrough = false;
          if (isDoubleSlit) {
            const upperSlit = (this.y > height/2 - slitGap/2 - slitWidth/2 && this.y < height/2 - slitGap/2 + slitWidth/2);
            const lowerSlit = (this.y > height/2 + slitGap/2 - slitWidth/2 && this.y < height/2 + slitGap/2 + slitWidth/2);
            isThrough = upperSlit || lowerSlit;
            if (isThrough) { this.phase = 1; this.performQuantumMagic(upperSlit); }
            else { this.dead = true; }
          } else {
            const singleSlit = (this.y > height/2 - slitWidth/2 && this.y < height/2 + slitWidth/2);
            isThrough = singleSlit;
            if (isThrough) { this.phase = 1; this.performQuantumMagic(true); }
            else { this.dead = true; }
          }
        }
        if (this.phase === 1 && this.x >= screenX) { this.dead = true; this.recordHit(); }
      }
      performQuantumMagic(isUpper) {
        if (isObserverOn) {
          this.vx = 4; this.vy += (Math.random() - 0.5) * 0.5; this.color = '#ef4444';
        } else {
          let targetY, accepted = false;
          while (!accepted) {
            let testY = Math.random() * height;
            let angle = (testY - height/2) / (screenX - wallX);
            let intensity;
            if (isDoubleSlit) { intensity = Math.cos(angle * 60); intensity = intensity * intensity; }
            else { let x = angle * 30; if (Math.abs(x) < 0.001) x = 0.001; intensity = Math.sin(x) / x; intensity = intensity * intensity; }
            let envelope = Math.exp(-0.00005 * Math.pow(testY - height/2, 2));
            if (Math.random() < intensity * envelope) { targetY = testY; accepted = true; }
          }
          let timeToScreen = (screenX - this.x) / this.vx;
          this.vy = (targetY - this.y) / timeToScreen;
          this.color = '#38bdf8';
        }
      }
      recordHit() { let index = Math.floor(this.y); if (index >= 0 && index < height) hits[index]++; }
      draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill();
        if (!isObserverOn && this.phase === 1) {
          ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + 10, this.y);
          ctx.strokeStyle = this.color; ctx.globalAlpha = 0.5; ctx.stroke(); ctx.globalAlpha = 1;
        }
      }
    }

    function drawScene() {
      const theme = document.documentElement.getAttribute('data-theme') || 'cyber';
      ctx.fillStyle = theme === 'cartoon' ? 'rgba(255,255,255,0.2)' : (theme === 'glass' ? 'rgba(15,17,23,0.2)' : (theme === 'soviet' ? 'rgba(240,235,228,0.2)' : 'rgba(2, 6, 23, 0.2)'));
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = theme === 'cartoon' ? '#bbb' : (theme === 'soviet' ? '#8b7d6b' : '#475569');
      if (isDoubleSlit) {
        ctx.fillRect(wallX, 0, 5, height/2 - slitGap/2 - slitWidth/2);
        ctx.fillRect(wallX, height/2 - slitGap/2 + slitWidth/2, 5, slitGap - slitWidth);
        ctx.fillRect(wallX, height/2 + slitGap/2 + slitWidth/2, 5, height);
      } else {
        ctx.fillRect(wallX, 0, 5, height/2 - slitWidth/2);
        ctx.fillRect(wallX, height/2 + slitWidth/2, 5, height);
      }
      ctx.strokeStyle = theme === 'cartoon' ? '#ccc' : (theme === 'soviet' ? '#a89880' : '#94a3b8');
      ctx.beginPath(); ctx.moveTo(screenX, 0); ctx.lineTo(screenX, height); ctx.stroke();
      ctx.fillStyle = isObserverOn ? 'rgba(239, 68, 68, 0.5)' : 'rgba(56, 189, 248, 0.5)';
      ctx.beginPath();
      for (let y = 0; y < height; y++) { ctx.fillRect(screenX + 2, y, hits[y] * 2, 1); }
      ctx.beginPath(); ctx.arc(sourceX, sourceY, 8, 0, Math.PI * 2); ctx.fillStyle = '#fbbf24'; ctx.fill();
      ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2; ctx.stroke();
      ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 2;
      if (isDoubleSlit) {
        ctx.beginPath(); ctx.moveTo(wallX, height/2 - slitGap/2 - slitWidth/2); ctx.lineTo(wallX, height/2 - slitGap/2 + slitWidth/2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(wallX, height/2 + slitGap/2 - slitWidth/2); ctx.lineTo(wallX, height/2 + slitGap/2 + slitWidth/2); ctx.stroke();
      } else {
        ctx.beginPath(); ctx.moveTo(wallX, height/2 - slitWidth/2); ctx.lineTo(wallX, height/2 + slitWidth/2); ctx.stroke();
      }
    }

    function drawIntensityGraph() {
      const graphWidth = intensityCanvas.width, graphHeight = intensityCanvas.height;
      const theme = document.documentElement.getAttribute('data-theme') || 'cyber';
      intensityCtx.fillStyle = theme === 'cartoon' ? '#f5f5f5' : (theme === 'glass' ? '#0f172a' : (theme === 'soviet' ? '#f0ebe4' : '#0f172a'));
      intensityCtx.fillRect(0, 0, graphWidth, graphHeight);
      intensityCtx.strokeStyle = 'rgba(148, 163, 184, 0.1)'; intensityCtx.lineWidth = 1;
      for (let y = 0; y <= graphHeight; y += 30) { intensityCtx.beginPath(); intensityCtx.moveTo(0, y); intensityCtx.lineTo(graphWidth, y); intensityCtx.stroke(); }
      for (let x = 0; x <= graphWidth; x += 50) { intensityCtx.beginPath(); intensityCtx.moveTo(x, 0); intensityCtx.lineTo(x, graphHeight); intensityCtx.stroke(); }
      let maxHits = Math.max(...hits, 1);
      intensityCtx.beginPath(); intensityCtx.moveTo(0, graphHeight);
      for (let y = 0; y < height; y++) { const x = (y / height) * graphWidth; const intensity = (hits[y] / maxHits) * graphHeight; intensityCtx.lineTo(x, graphHeight - intensity); }
      intensityCtx.lineTo(graphWidth, graphHeight);
      intensityCtx.fillStyle = isObserverOn ? 'rgba(239, 68, 68, 0.3)' : 'rgba(56, 189, 248, 0.3)'; intensityCtx.fill();
      intensityCtx.strokeStyle = isObserverOn ? '#ef4444' : '#38bdf8'; intensityCtx.lineWidth = 2; intensityCtx.stroke();
      intensityCtx.strokeStyle = 'rgba(148, 163, 184, 0.3)'; intensityCtx.lineWidth = 1;
      intensityCtx.beginPath(); intensityCtx.moveTo(graphWidth / 2, 0); intensityCtx.lineTo(graphWidth / 2, graphHeight); intensityCtx.stroke();
      intensityCtx.fillStyle = '#94a3b8'; intensityCtx.font = '10px Arial'; intensityCtx.textAlign = 'center';
      intensityCtx.fillText('强度分布', graphWidth / 2, 15);
    }

    function loop() {
      if (!isPaused) {
        drawScene(); drawIntensityGraph();
        for(let i=0; i<emissionRate; i++) particles.push(new Particle());
        for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.update(); p.draw(); if (p.dead) particles.splice(i, 1); }
        frameCount++;
      }
      animationId = requestAnimationFrame(loop);
    }
    function resetSimulation() { hits = new Array(height).fill(0); }
    function clearAll() { hits = new Array(height).fill(0); particles = []; }
    function toggleObserver() {
      isObserverOn = document.getElementById('observerToggle').checked;
      const status = document.getElementById('observerStatus');
      if (isObserverOn) { status.textContent = "开启 (粒子模式)"; }
      else { status.textContent = "关闭 (波动模式)"; }
    }
    function toggleSlitMode() {
      isDoubleSlit = !isDoubleSlit;
      const singleBtn = document.getElementById('singleSlitBtn');
      const doubleBtn = document.getElementById('doubleSlitBtn');
      const slitGapContainer = document.getElementById('slitGapContainer');
      if (isDoubleSlit) {
        singleBtn.className = "flex-1 py-2 px-4 text-center text-sm transition-colors q-btn-secondary";
        doubleBtn.className = "flex-1 py-2 px-4 text-center text-sm transition-colors q-btn-primary";
        slitGapContainer.style.display = "block";
      } else {
        singleBtn.className = "flex-1 py-2 px-4 text-center text-sm transition-colors q-btn-primary";
        doubleBtn.className = "flex-1 py-2 px-4 text-center text-sm transition-colors q-btn-secondary";
        slitGapContainer.style.display = "none";
      }
      resetSimulation();
    }
    function togglePause() {
      isPaused = !isPaused;
      const pauseBtn = document.getElementById('pauseBtn');
      const statusIndicator = document.getElementById('status-indicator');
      const statusText = document.getElementById('status-text');
      if (isPaused) {
        pauseBtn.innerHTML = '<i class="fa fa-play mr-2"></i>暂停/继续';
        statusIndicator.className = "w-3 h-3 rounded-full bg-yellow-400";
        statusText.textContent = "已暂停";
      } else {
        pauseBtn.innerHTML = '<i class="fa fa-pause mr-2"></i>暂停/继续';
        statusIndicator.className = "w-3 h-3 rounded-full bg-green-400 animate-pulse";
        statusText.textContent = "运行中";
      }
    }
    function updateEmissionRate(value) { emissionRate = parseInt(value); document.getElementById('emissionRateValue').textContent = `${emissionRate} 粒子/帧`; }
    function updateSlitWidth(value) { slitWidth = parseInt(value); document.getElementById('slitWidthValue').textContent = `${slitWidth} 像素`; }
    function updateSlitGap(value) { slitGap = parseInt(value); document.getElementById('slitGapValue').textContent = `${slitGap} 像素`; }

    document.getElementById('singleSlitBtn').addEventListener('click', function() { if (isDoubleSlit) toggleSlitMode(); });
    document.getElementById('doubleSlitBtn').addEventListener('click', function() { if (!isDoubleSlit) toggleSlitMode(); });
    document.getElementById('resetBtn').addEventListener('click', resetSimulation);
    document.getElementById('clearBtn').addEventListener('click', clearAll);
    document.getElementById('pauseBtn').addEventListener('click', togglePause);

    function resizeCanvas() {
      const container = document.getElementById('canvas-container');
      const containerWidth = container.clientWidth, containerHeight = container.clientHeight;
      const ratio = width / height;
      let newWidth = containerWidth, newHeight = containerWidth / ratio;
      if (newHeight > containerHeight) { newHeight = containerHeight; newWidth = containerHeight * ratio; }
      canvas.style.width = `${newWidth}px`; canvas.style.height = `${newHeight}px`;
      intensityCanvas.style.width = '100%'; intensityCanvas.style.height = '100%';
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); loop();
  </script>
</body>
</html>

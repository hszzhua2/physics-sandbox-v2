<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>利萨茹曲线 - 物理沙盒宇宙</title>
  <link rel="stylesheet" href="shared-theme.css">
  <style>
    .exp-bg { z-index: -1; }
    #sim-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
    #ui-panel {
      position: absolute;
      top: 80px;
      left: 30px;
      width: 300px;
      padding: 20px;
      z-index: 10;
    }
    h1 { margin: 0; font-size: 1.5rem; transition: var(--theme-transition); }
    p.desc { color: var(--text-muted); font-size: 0.85rem; margin: 8px 0 15px 0; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.9rem; margin: 15px 0 5px; font-weight: bold; }
    .val-display { font-family: monospace; }

    [data-theme="cartoon"] h1 { color: var(--accent-1); text-shadow: 1px 1px 0 rgba(0,0,0,0.1); }
    [data-theme="cartoon"] .val-display { color: var(--accent-1); }

    [data-theme="glass"] h1 { color: #ff00ea; text-shadow: 0 0 10px rgba(255,0,234,0.3); }
    [data-theme="glass"] .val-display { color: #a29bfe; }

    [data-theme="cyber"] h1 { color: #ff00ea; text-shadow: 0 0 15px rgba(255,0,234,0.5); }
    [data-theme="cyber"] .val-display { color: #00f3ff; }

    [data-theme="soviet"] h1 { color: #c41e1e; text-shadow: none; }
    [data-theme="soviet"] .val-display { color: #8b4513; }
  </style>
</head>
<body>
  <div class="exp-bg"></div>
  <canvas id="sim-canvas"></canvas>

  <div id="ui-panel" class="glass-panel">
    <h1>LISSAJOUS CURVES</h1>
    <p class="desc">数学拓扑：简谐运动声光轨迹</p>
    <div class="slider-group">
      <label><span>Freq X</span><span id="vx" class="val-display">3</span></label>
      <input type="range" id="sx" min="1" max="15" value="3">
    </div>
    <div class="slider-group">
      <label><span>Freq Y</span><span id="vy" class="val-display">4</span></label>
      <input type="range" id="sy" min="1" max="15" value="4">
    </div>
    <div class="slider-group">
      <label><span>3D Phase Shift</span><span id="vp" class="val-display">1.0</span></label>
      <input type="range" id="sp" min="0" max="3" step="0.1" value="1.0">
    </div>
    <button class="theme-btn" onclick="randomize()">随机共振</button>
  </div>

  <script src="shared-theme.js"></script>
  <script>
    PSUTheme.createSwitcher();
    PSUTheme.createBackButton('index.html');

    const canvas = document.getElementById('sim-canvas'), ctx = canvas.getContext('2d');
    const sx = document.getElementById('sx'), sy = document.getElementById('sy'), sp = document.getElementById('sp');
    let tx = 3, ty = 4, cx = 3, cy = 4, phase = 0;
    let animationId = null;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    function randomize() { tx=Math.ceil(Math.random()*9); ty=Math.ceil(Math.random()*9); sx.value=tx; sy.value=ty; }

    function getThemeColors() {
      const theme = document.documentElement.getAttribute('data-theme') || 'cyber';
      if (theme === 'cartoon') {
        return { fade: 'rgba(254, 246, 228, 0.2)', hueStart: 0, hueRange: 200 };
      } else if (theme === 'glass') {
        return { fade: 'rgba(15, 17, 23, 0.2)', hueStart: 180, hueRange: 120 };
      } else if (theme === 'soviet') {
        return { fade: 'rgba(240, 235, 228, 0.2)', hueStart: 0, hueRange: 40 };
      } else {
        return { fade: 'rgba(3, 3, 5, 0.2)', hueStart: 180, hueRange: 120 };
      }
    }

    function loop() {
      document.getElementById('vx').innerText = tx = parseInt(sx.value);
      document.getElementById('vy').innerText = ty = parseInt(sy.value);
      document.getElementById('vp').innerText = sp.value;
      cx += (tx - cx)*0.05; cy += (ty - cy)*0.05; phase += 0.01 * parseFloat(sp.value);
      const colors = getThemeColors();
      ctx.globalCompositeOperation = 'source-over'; ctx.fillStyle = colors.fade; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.globalCompositeOperation = 'lighter';
      let r = Math.min(canvas.width, canvas.height)*0.4, midX = canvas.width/2, midY = canvas.height/2;
      for(let l=0; l<8; l++) {
        ctx.beginPath(); let offset = phase + l*0.03;
        for(let i=0; i<=800; i++) {
          let t = (i/800)*Math.PI*2, x = midX + r*Math.sin(cx*t + offset), y = midY + r*Math.sin(cy*t);
          i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        const h = colors.hueStart + colors.hueRange*(l/8);
        ctx.strokeStyle = `hsla(${h}, 100%, 60%, ${(1 - l/8)*0.5})`; ctx.lineWidth = 1.5; ctx.stroke();
      }
      animationId = requestAnimationFrame(loop);
    }
    loop();
    window.addEventListener('beforeunload', () => cancelAnimationFrame(animationId));
  </script>
</body>
</html>

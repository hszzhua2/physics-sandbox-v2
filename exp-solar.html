<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地动说 · 太阳系与银河 - 物理沙盒宇宙</title>
  <link rel="stylesheet" href="shared-theme.css?v=20260724b">
  <style>
    .exp-bg { z-index: -1; }
    #canvas-container { position: fixed; inset: 0; z-index: 0; }
    canvas { display: block; }

    /* App title bar */
    #app-title {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      z-index: 12; pointer-events: none; text-align: center;
      background: var(--panel-bg); border: 1px solid var(--panel-border);
      border-radius: var(--radius); padding: 8px 24px;
      backdrop-filter: var(--backdrop); -webkit-backdrop-filter: var(--backdrop);
      box-shadow: var(--shadow);
      transition: all 0.4s ease;
    }
    #app-title .main {
      font-size: 1rem; font-weight: 700; color: var(--accent-1);
      letter-spacing: 2px; transition: color 0.4s;
    }
    #app-title .subtitle {
      display: block; font-size: 0.68rem; font-weight: 400;
      color: var(--text-muted); letter-spacing: 1px; margin-top: 2px;
      transition: color 0.4s;
    }
    #app-title .notice {
      display: block; font-size: 0.65rem; font-weight: 400;
      color: var(--accent-3); letter-spacing: 0.5px; margin-top: 3px;
      opacity: 0.85; transition: color 0.4s;
    }

    /* Left panel */
    #left-panel {
      position: fixed; top: 140px; left: 16px; bottom: 20px;
      width: 260px; z-index: 10;
      display: flex; flex-direction: column;
    }
    #left-panel .panel-header {
      padding: 12px 16px; font-size: 0.9rem; font-weight: 700;
      color: var(--accent-1); border-bottom: 1px solid var(--panel-border);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
      transition: color 0.4s, border-color 0.4s;
    }
    #left-panel .panel-body {
      padding: 14px 16px; overflow-y: auto; flex: 1;
    }
    #left-panel .panel-body::-webkit-scrollbar { width: 4px; }
    #left-panel .panel-body::-webkit-scrollbar-thumb {
      background: var(--panel-border); border-radius: 2px;
    }

    .section { margin-bottom: 16px; }
    .section:last-child { margin-bottom: 0; }
    .section-label {
      font-size: 0.72rem; color: var(--text-muted);
      margin-bottom: 8px; text-transform: uppercase;
      letter-spacing: 1px; font-weight: 600;
      transition: color 0.4s;
    }

    .speed-control { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .speed-control input[type="range"] {
      flex: 1; -webkit-appearance: none; height: 4px;
      border-radius: 2px; background: var(--panel-border); outline: none;
      transition: background 0.4s;
    }
    .speed-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--accent-1);
      cursor: pointer; border: 2px solid var(--text-color);
      transition: all 0.3s;
    }
    .speed-display {
      min-width: 48px; text-align: right; font-size: 0.85rem;
      color: var(--accent-1); font-weight: 600;
      font-variant-numeric: tabular-nums; transition: color 0.4s;
    }
    .speed-buttons { display: flex; gap: 6px; }
    .speed-buttons button { flex: 1; padding: 6px 0; font-size: 0.78rem; }

    .ref-buttons { display: flex; flex-direction: column; gap: 6px; }
    .ref-buttons button {
      padding: 8px 10px; font-size: 0.82rem; text-align: left;
      display: flex; align-items: center; gap: 8px;
    }
    .ref-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    button {
      background: var(--panel-bg); color: var(--text-color);
      border: 1px solid var(--panel-border); padding: 7px 14px;
      border-radius: var(--radius); cursor: pointer; transition: all 0.25s;
      font-size: 0.82rem; font-family: inherit;
    }
    button:hover { border-color: var(--accent-1); color: var(--accent-1); }
    button.active {
      background: var(--accent-1) !important; color: #fff !important;
      border-color: var(--accent-1) !important; font-weight: 600;
    }

    .toggle-btn { width: 100%; padding: 8px; font-size: 0.82rem; }
    .action-btn { width: 100%; padding: 8px; font-size: 0.82rem; }
    .hint {
      font-size: 0.7rem; color: var(--accent-3); margin: 6px 0 0;
      line-height: 1.5; display: none; transition: color 0.4s;
    }
    .hint.visible { display: block; }

    .legend {
      margin-top: 4px; padding-top: 12px;
      border-top: 1px solid var(--panel-border);
      font-size: 0.72rem; color: var(--text-muted); line-height: 2;
      transition: border-color 0.4s, color 0.4s;
    }
    .legend span { display: inline-flex; align-items: center; margin-right: 12px; }
    .legend .dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-right: 4px;
    }

    /* Right panel - knowledge */
    #right-panel {
      position: fixed; top: 140px; right: 16px; bottom: 20px;
      width: 320px; z-index: 10;
      display: flex; flex-direction: column;
    }
    #right-panel .panel-header {
      padding: 12px 16px; font-size: 0.9rem; font-weight: 700;
      color: var(--accent-3); border-bottom: 1px solid var(--panel-border);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
      transition: color 0.4s, border-color 0.4s;
    }
    .knowledge-content {
      padding: 14px 16px; overflow-y: auto; flex: 1;
    }
    .knowledge-content::-webkit-scrollbar { width: 4px; }
    .knowledge-content::-webkit-scrollbar-thumb {
      background: var(--panel-border); border-radius: 2px;
    }

    .knowledge-intro {
      font-size: 0.8rem; color: var(--text-muted); line-height: 1.6;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid var(--panel-border);
      transition: color 0.4s, border-color 0.4s;
    }

    .kp-card {
      margin-bottom: 16px; padding: 12px 14px;
      background: rgba(128,128,128,0.05);
      border-left: 3px solid var(--accent-3);
      border-radius: 0 var(--radius) var(--radius) 0;
      transition: background 0.3s, border-color 0.4s;
    }
    .kp-card:hover { background: rgba(128,128,128,0.1); }
    .kp-card.galaxy { border-left-color: var(--accent-1); }
    .kp-title {
      font-size: 0.86rem; font-weight: 700;
      color: var(--accent-3); margin-bottom: 6px;
      transition: color 0.4s;
    }
    .kp-card.galaxy .kp-title { color: var(--accent-1); }
    .kp-year {
      display: inline-block; font-size: 0.66rem;
      color: var(--text-muted); margin-left: 6px; font-weight: 400;
      transition: color 0.4s;
    }
    .kp-text {
      font-size: 0.78rem; color: var(--text-muted); line-height: 1.65;
      transition: color 0.4s;
    }
    .kp-text .hl {
      color: var(--accent-3); font-weight: 600;
      transition: color 0.4s;
    }
    .kp-card.galaxy .kp-text .hl { color: var(--accent-1); }

    /* Collapsible panels for mobile */
    .panel-toggle { display: none; }

    @media (max-width: 1100px) {
      #left-panel { width: 220px; }
      #right-panel { width: 280px; }
    }
    @media (max-width: 800px) {
      #left-panel, #right-panel { display: none; }
    }
  </style>

</head>
<body>
<div class="exp-bg"></div>
<div id="app-title">
  <span class="main">地动说 · 太阳系与银河</span>
  <span class="subtitle">相对运动 · 日心说与地心说的可视化</span>
  <span class="notice">教学演示，距离、大小与速度比例均经过调整，非真实比例</span>
</div>

<div id="canvas-container"></div>

<!-- Left Panel: Controls -->
<div id="left-panel" class="glass-panel">
  <div class="panel-header">&#9881; 参数设置</div>
  <div class="panel-body">
    <div class="section">
      <div class="section-label">播放速度</div>

      <div class="ref-buttons">
        <button id="btn-ref-galaxy" class="active">
          <span class="ref-dot" style="background:#ff8800;"></span>银心黑洞

          <span class="ref-dot" style="background:#ffff00;"></span>太阳系（日心说）
        </button>

      <span><span class="dot" style="background:#cccccc;"></span>月球</span>
      <span><span class="dot" style="background:#d2a679;"></span>木星</span>
      <span><span class="dot" style="background:#ffcc66;"></span>木卫</span>

  </div>
</div>

<!-- Right Panel: Knowledge -->
<div id="right-panel" class="glass-panel">
  <div class="panel-header">&#128214; <span id="knowledge-header">知识点与历史</span></div>
  <div class="knowledge-content" id="knowledge-content"></div>
</div>

<script>
// ================================================================
//  知识点数据库
// ================================================================
const knowledgeBase = {
  galaxy: {
    header: '银河系尺度 · 宇宙结构',
    intro: '当我们以银河系中心为参照物，可以看到整个太阳系作为一个整体绕银心运行。这是最宏大的宇宙视角。',
    cards: [
      { title: '人马座A*——银河系中心黑洞', year: '2022年首次成像',
        text: '银河系中心存在一个超大质量黑洞，编号为<span class="hl">人马座A*（Sgr A*）</span>，质量约为太阳的430万倍，距离地球约2.6万光年。2022年，事件视界望远镜（EHT）首次拍摄到它的照片。' },
      { title: '太阳系的银河之旅',
        text: '太阳携带整个太阳系以约<span class="hl">220 km/s</span>的速度绕银心公转，绕行一周约需<span class="hl">2.3亿年</span>，这段时间被称为一个"银河年"。自太阳诞生以来，仅完成了约20圈。' },
      { title: '银河系的结构',
        text: '银河系是一个<span class="hl">棒旋星系</span>，直径约10万光年，包含1000～4000亿颗恒星。太阳位于猎户臂上，距离银心约2.6万光年——我们并不在银河系的中心。' }
    ]
  },
  sun: {
    header: '日心说 · 地动说',
    intro: '以太阳为参照物，行星沿各自轨道绕太阳运行。这正是哥白尼"地动说"所描绘的图景，它终结了地心说长达千余年的统治，开启了科学革命。',
    cards: [
      { title: '哥白尼与《天体运行论》', year: '1543',
        text: '波兰天文学家<span class="hl">哥白尼</span>在1543年出版《天体运行论》，提出日心说（地动说）：地球和其他行星绕太阳运行，地球自身也在自转。这一理论打破了托勒密地心说长达1400年的统治，被视为<span class="hl">科学革命的起点</span>。' },
      { title: '伽利略的望远镜观测', year: '1610',
        text: '1610年，<span class="hl">伽利略</span>用自制望远镜做出三项关键发现：木星有四颗卫星（证明并非一切都绕地球转）、金星有完整相位变化（证明金星绕太阳运行）、月球表面有山脉环形山。这些观测为日心说提供了有力证据。' },
      { title: '开普勒三定律', year: '1609–1619',
        text: '德国天文学家<span class="hl">开普勒</span>分析导师第谷的观测数据，发现行星运动三定律：轨道为椭圆、面积速度恒定、周期与半长轴的3/2次方成正比。这揭示了行星运动的精确数学规律，为牛顿万有引力定律奠定基础。' },
      { title: '地球公转与四季',
        text: '地球以约<span class="hl">30 km/s</span>的速度沿椭圆轨道绕太阳公转，周期约365.25天。地球自转轴倾斜约23.5°，公转过程中太阳直射点的变化形成了四季更替。' }
    ]
  },
  earth: {
    header: '地心说 · 相对运动',
    intro: '以地球为参照物，太阳和其他天体看似绕地球运行。这正是托勒密地心说的视角。观察行星轨迹的"逆行"——日心说给出了更简洁的解释。',
    cards: [
      { title: '托勒密地心说', year: '约公元150年',
        text: '希腊天文学家<span class="hl">托勒密</span>在《天文学大成》中建立了以地球为中心的宇宙模型。为解释行星的"逆行"现象，他引入"本轮-均轮"体系：行星沿小圆（本轮）运动，小圆心又沿大圆（均轮）绕地球运动。这一模型精密而复杂，统治西方天文学<span class="hl">逾1400年</span>。' },
      { title: '行星逆行现象',
        text: '从地球观测，火星、木星等外行星会周期性地在星空中短暂<span class="hl">"倒退"</span>，称为逆行。地心说用复杂的本轮叠加来解释；而日心说给出了简洁的解释——这是地球与外行星在各自轨道上"超车"时的相对运动，如同两辆同向行驶的列车。' },
      { title: '运动的相对性',
        text: '运动是相对的，参照物不同则运动图景不同。以地球为参照，太阳似乎绕地球运行；以太阳为参照，地球绕太阳运行。两种描述在运动学上都"正确"，但<span class="hl">日心说更简洁、更能揭示引力本质</span>，因此成为现代天文学的基础。' },
      { title: '地球自转的证据', year: '1851',
        text: '地球自西向东自转，赤道处自转速度约<span class="hl">0.46 km/s</span>。1851年，<span class="hl">傅科</span>在巴黎用摆实验首次直接证明地球自转——摆的摆动平面相对地面缓慢偏转。日月星辰的东升西落正是地球自转的视觉表现。' }
    ]
  }
};

function renderKnowledge(frame) {
  const data = knowledgeBase[frame];
  document.getElementById('knowledge-header').textContent = data.header;
  let html = '<div class="knowledge-intro">' + data.intro + '</div>';
  const cardClass = frame === 'galaxy' ? 'kp-card galaxy' : 'kp-card';
  data.cards.forEach(card => {
    const yearHtml = card.year ? '<span class="kp-year">' + card.year + '</span>' : '';
    html += '<div class="' + cardClass + '">';
    html += '<div class="kp-title">' + card.title + yearHtml + '</div>';
    html += '<div class="kp-text">' + card.text + '</div>';
    html += '</div>';
  });
  document.getElementById('knowledge-content').innerHTML = html;
}

// ================================================================
//  Three.js 场景
// ================================================================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.0002);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 20000);
camera.position.set(0, 500, 1200);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio || 1);
container.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxDistance = 5000;
controls.minDistance = 50;
controls.target.set(0, 0, 0);

let time = 0;
let timeScale = 1.0;
let isPaused = false;
const galacticRotationSpeed = 0.001;

const referenceSpeedMultiplier = { galaxy: 1.0, sun: 0.3, earth: 0.3 };

let trailsEnabled = true;
let referenceFrame = 'galaxy';
const maxTrailLength = 600;
const bodyRegistry = [];

// 1. 星空背景
function createStarfield() {
  const starGeometry = new THREE.BufferGeometry();
  const starMaterial = new THREE.PointsMaterial({
    color: 0xffffff, size: 1.5, transparent: true, opacity: 0.8, sizeAttenuation: true
  });
  const starCount = 5000;
  const starPositions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount * 3; i += 3) {
    const radius = 2000 + Math.random() * 3000;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    starPositions[i]     = radius * Math.sin(phi) * Math.cos(theta);
    starPositions[i + 1] = radius * Math.cos(phi);
    starPositions[i + 2] = radius * Math.sin(phi) * Math.sin(theta);
  }
  starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  scene.add(new THREE.Points(starGeometry, starMaterial));
}
createStarfield();

// 2. 银心黑洞
const galaxyCenter = new THREE.Group();
scene.add(galaxyCenter);

const blackHole = new THREE.Mesh(
  new THREE.SphereGeometry(15, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0x000000 })
);
galaxyCenter.add(blackHole);

const accretionDisk = new THREE.Mesh(
  new THREE.RingGeometry(20, 60, 64),
  new THREE.MeshBasicMaterial({
    color: 0xffaa00, side: THREE.DoubleSide, transparent: true,
    opacity: 0.7, blending: THREE.AdditiveBlending, depthWrite: false
  })
);
accretionDisk.rotation.x = Math.PI / 2 + 0.2;
galaxyCenter.add(accretionDisk);

galaxyCenter.add(new THREE.PointLight(0xffdd88, 3, 2000));

const galaxyDisk = new THREE.Mesh(
  new THREE.CylinderGeometry(1500, 1500, 50, 64),
  new THREE.MeshBasicMaterial({
    color: 0x224466, transparent: true, opacity: 0.1,
    blending: THREE.AdditiveBlending, depthWrite: false
  })
);
scene.add(galaxyDisk);

function createCelestialBody(name, radius, color, orbitRadius, orbitSpeed, parentGroup, isEmissive = false) {
  const group = new THREE.Group();
  const geometry = new THREE.SphereGeometry(radius, 32, 32);
  let material;
  if (isEmissive) material = new THREE.MeshBasicMaterial({ color: color });
  else material = new THREE.MeshPhongMaterial({ color: color, emissive: 0x111111, shininess: 10 });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.x = orbitRadius;
  group.add(mesh);

  if (orbitRadius > 0) {
    const orbitGeo = new THREE.BufferGeometry();
    const orbitPoints = [];
    const segments = 128;
    for (let i = 0; i <= segments; i++) {
      const theta = (i / segments) * Math.PI * 2;
      orbitPoints.push(orbitRadius * Math.cos(theta), 0, orbitRadius * Math.sin(theta));
    }
    orbitGeo.setAttribute('position', new THREE.Float32BufferAttribute(orbitPoints, 3));
    const orbitLine = new THREE.Line(orbitGeo, new THREE.LineBasicMaterial({
      color: 0xffffff, transparent: true, opacity: 0.15
    }));
    parentGroup.add(orbitLine);
  }
  parentGroup.add(group);
  return { group: group, mesh: mesh, orbitRadius: orbitRadius, orbitSpeed: orbitSpeed, name: name };
}

// 3. 太阳系
const solarSystemOrbitRadius = 600;
const solarSystemGroup = new THREE.Group();
solarSystemGroup.position.x = solarSystemOrbitRadius;
scene.add(solarSystemGroup);

const ssOrbitGeo = new THREE.BufferGeometry();
const ssOrbitPoints = [];
for (let i = 0; i <= 256; i++) {
  const theta = (i / 256) * Math.PI * 2;
  ssOrbitPoints.push(solarSystemOrbitRadius * Math.cos(theta), 0, solarSystemOrbitRadius * Math.sin(theta));
}
ssOrbitGeo.setAttribute('position', new THREE.Float32BufferAttribute(ssOrbitPoints, 3));
const ssOrbitLine = new THREE.Line(ssOrbitGeo, new THREE.LineDashedMaterial({
  color: 0xaaaaaa, transparent: true, opacity: 0.3, dashSize: 10, gapSize: 10
}));
ssOrbitLine.computeLineDistances();
scene.add(ssOrbitLine);

solarSystemGroup.add(new THREE.AmbientLight(0x222222));

const sun = createCelestialBody("Sun", 12, 0xffff00, 0, 0, solarSystemGroup, true);
sun.mesh.add(new THREE.PointLight(0xffffff, 2, 800));

const bodies = [];

const earthSystemSpeed = 0.05;
const earthOrbitRadius = 70;
const earthSystemGroup = new THREE.Group();
solarSystemGroup.add(earthSystemGroup);
const earth = createCelestialBody("Earth", 3.5, 0x2266ff, earthOrbitRadius, 0, earthSystemGroup);
bodies.push({ group: earthSystemGroup, speed: earthSystemSpeed });

const moonOrbitGroup = new THREE.Group();
earth.mesh.add(moonOrbitGroup);
const moon = createCelestialBody("Moon", 1, 0xaaaaaa, 10, 0.2, moonOrbitGroup);
bodies.push({ group: moonOrbitGroup, speed: 0.2 });

const jupiterSystemSpeed = 0.02;
const jupiterOrbitRadius = 140;
const jupiterSystemGroup = new THREE.Group();
solarSystemGroup.add(jupiterSystemGroup);
const jupiter = createCelestialBody("Jupiter", 8, 0xd2a679, jupiterOrbitRadius, 0, jupiterSystemGroup);
bodies.push({ group: jupiterSystemGroup, speed: jupiterSystemSpeed });

const moonsData = [
  { name: "Io",       r: 0.8, color: 0xffffaa, dist: 15, speed: 0.3 },
  { name: "Europa",   r: 0.7, color: 0xccccff, dist: 20, speed: 0.2 },
  { name: "Ganymede", r: 1.2, color: 0x999999, dist: 28, speed: 0.15 },
  { name: "Callisto", r: 1.1, color: 0x777777, dist: 38, speed: 0.1 }
];
const jupiterMoons = [];
moonsData.forEach(data => {
  const moonGroup = new THREE.Group();
  jupiter.mesh.add(moonGroup);
  const m = createCelestialBody(data.name, data.r, data.color, data.dist, 0, moonGroup);
  bodies.push({ group: moonGroup, speed: data.speed });
  jupiterMoons.push(m);
});

solarSystemGroup.rotation.x = Math.PI * 0.1;
solarSystemGroup.rotation.z = Math.PI * 0.05;

// 轨迹系统
function registerBody(name, mesh, color) {
  const trailGeometry = new THREE.BufferGeometry();
  const positions = new Float32Array(maxTrailLength * 3);
  trailGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const trailMaterial = new THREE.LineBasicMaterial({
    color: color, transparent: true, opacity: 0.95, depthWrite: false
  });
  const trailLine = new THREE.Line(trailGeometry, trailMaterial);
  trailLine.frustumCulled = false;
  scene.add(trailLine);

  const points = [];
  for (let i = 0; i < maxTrailLength; i++) points.push(new THREE.Vector3(0, 0, 0));
  const entry = { name, mesh, color, trail: { points, geometry: trailGeometry, line: trailLine, positionArray: positions } };
  bodyRegistry.push(entry);
  return entry;
}

registerBody('Sun', sun.mesh, 0xffff00);
registerBody('Earth', earth.mesh, 0x4db8ff);
registerBody('Moon', moon.mesh, 0xcccccc);
registerBody('Jupiter', jupiter.mesh, 0xd2a679);
jupiterMoons.forEach(m => registerBody(m.name, m.mesh, 0xffcc66));

const _tmpBodyPos = new THREE.Vector3();
const _tmpRefPos = new THREE.Vector3();
const _lastRefPos = new THREE.Vector3();
let _refFollowInitialized = false;

function getReferencePosition(outVec) {
  if (referenceFrame === 'galaxy') outVec.set(0, 0, 0);
  else if (referenceFrame === 'sun') sun.mesh.getWorldPosition(outVec);
  else if (referenceFrame === 'earth') earth.mesh.getWorldPosition(outVec);
  return outVec;
}

function isReferenceBody(body) {
  return (referenceFrame === 'sun' && body.name === 'Sun') ||
         (referenceFrame === 'earth' && body.name === 'Earth');
}

function lockCameraToReference() {
  getReferencePosition(_tmpRefPos);
  controls.target.copy(_tmpRefPos);
  _lastRefPos.copy(_tmpRefPos);
  _refFollowInitialized = true;
}

function followReferenceFrame() {
  if (!_refFollowInitialized) return;
  getReferencePosition(_tmpRefPos);
  const dx = _tmpRefPos.x - _lastRefPos.x;
  const dy = _tmpRefPos.y - _lastRefPos.y;
  const dz = _tmpRefPos.z - _lastRefPos.z;
  if (dx !== 0 || dy !== 0 || dz !== 0) {
    camera.position.x += dx; camera.position.y += dy; camera.position.z += dz;
    controls.target.x += dx; controls.target.y += dy; controls.target.z += dz;
  }
  _lastRefPos.copy(_tmpRefPos);
}

function clearTrails() {
  getReferencePosition(_tmpRefPos);
  bodyRegistry.forEach(body => {
    const trail = body.trail;
    if (isReferenceBody(body)) { trail.line.visible = false; return; }
    trail.line.visible = trailsEnabled;
    body.mesh.getWorldPosition(_tmpBodyPos);
    const relX = _tmpBodyPos.x - _tmpRefPos.x;
    const relY = _tmpBodyPos.y - _tmpRefPos.y;
    const relZ = _tmpBodyPos.z - _tmpRefPos.z;
    const pts = trail.points;
    const arr = trail.positionArray;
    for (let i = 0; i < maxTrailLength; i++) {
      pts[i].set(relX, relY, relZ);
      arr[i*3] = relX + _tmpRefPos.x; arr[i*3+1] = relY + _tmpRefPos.y; arr[i*3+2] = relZ + _tmpRefPos.z;
    }
    trail.geometry.attributes.position.needsUpdate = true;
  });
}

function updateTrails() {
  if (!trailsEnabled) return;
  getReferencePosition(_tmpRefPos);
  bodyRegistry.forEach(body => {
    if (isReferenceBody(body)) return;
    const trail = body.trail;
    const pts = trail.points;
    for (let i = maxTrailLength - 1; i > 0; i--) pts[i].copy(pts[i-1]);
    body.mesh.getWorldPosition(_tmpBodyPos);
    pts[0].set(_tmpBodyPos.x - _tmpRefPos.x, _tmpBodyPos.y - _tmpRefPos.y, _tmpBodyPos.z - _tmpRefPos.z);
    const arr = trail.positionArray;
    for (let i = 0; i < maxTrailLength; i++) {
      arr[i*3] = pts[i].x + _tmpRefPos.x; arr[i*3+1] = pts[i].y + _tmpRefPos.y; arr[i*3+2] = pts[i].z + _tmpRefPos.z;
    }
    trail.geometry.attributes.position.needsUpdate = true;
  });
}

clearTrails();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}, false);

// ================================================================
//  UI 交互
// ================================================================
function updateRefHint() {
  const hint = document.getElementById('ref-hint');
  const mult = referenceSpeedMultiplier[referenceFrame];
  if (mult < 1.0) {
    hint.textContent = '此视角已自动减速至 ' + mult + 'x，便于观察行星轨道运动';
    hint.classList.add('visible');
  } else hint.classList.remove('visible');
}

const speedSlider = document.getElementById('speed-slider');
const speedValue = document.getElementById('speed-value');
speedSlider.addEventListener('input', (e) => {
  timeScale = parseFloat(e.target.value);
  speedValue.textContent = timeScale.toFixed(1);
});

document.getElementById('btn-speed-up').addEventListener('click', () => {
  timeScale = Math.min(timeScale + 0.3, 5.0);
  speedSlider.value = timeScale; speedValue.textContent = timeScale.toFixed(1);
});
document.getElementById('btn-speed-down').addEventListener('click', () => {
  timeScale = Math.max(timeScale - 0.3, 0.1);
  speedSlider.value = timeScale; speedValue.textContent = timeScale.toFixed(1);
});

const btnPause = document.getElementById('btn-pause');
btnPause.addEventListener('click', () => {
  isPaused = !isPaused;
  btnPause.textContent = isPaused ? '继续' : '暂停';
  btnPause.classList.toggle('active', isPaused);
});

document.getElementById('btn-reset-cam').addEventListener('click', () => {
  getReferencePosition(_tmpRefPos);
  camera.position.set(_tmpRefPos.x, _tmpRefPos.y + 150, _tmpRefPos.z + 200);
  controls.target.copy(_tmpRefPos);
  _lastRefPos.copy(_tmpRefPos);
  _refFollowInitialized = true;
});

const btnTrail = document.getElementById('btn-trail-toggle');
btnTrail.addEventListener('click', () => {
  trailsEnabled = !trailsEnabled;
  btnTrail.textContent = trailsEnabled ? '显示轨迹' : '轨迹已关';
  btnTrail.classList.toggle('active', trailsEnabled);
  bodyRegistry.forEach(body => {
    if (!isReferenceBody(body)) body.trail.line.visible = trailsEnabled;
  });
});

function setReferenceFrame(frame) {
  referenceFrame = frame;
  document.querySelectorAll('.ref-buttons button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-ref-' + frame).classList.add('active');
  lockCameraToReference();
  clearTrails();
  updateRefHint();
  renderKnowledge(frame);
}
document.getElementById('btn-ref-galaxy').addEventListener('click', () => setReferenceFrame('galaxy'));
document.getElementById('btn-ref-sun').addEventListener('click', () => setReferenceFrame('sun'));
document.getElementById('btn-ref-earth').addEventListener('click', () => setReferenceFrame('earth'));

controls.target.set(0, 0, 0);
_lastRefPos.set(0, 0, 0);
_refFollowInitialized = true;
renderKnowledge('galaxy');

// 动画循环
let galacticAngle = 0;
function animate() {
  requestAnimationFrame(animate);
  if (!isPaused) {
    const effectiveTimeScale = timeScale * referenceSpeedMultiplier[referenceFrame];
    const deltaTime = 0.016 * effectiveTimeScale;
    time += deltaTime;
    accretionDisk.rotation.z -= 0.01 * effectiveTimeScale;
    galacticAngle += galacticRotationSpeed * effectiveTimeScale;
    solarSystemGroup.position.set(
      solarSystemOrbitRadius * Math.cos(galacticAngle), 0, solarSystemOrbitRadius * Math.sin(galacticAngle)
    );
    solarSystemGroup.rotation.y += 0.002 * effectiveTimeScale;
    bodies.forEach(bodyData => { bodyData.group.rotation.y += bodyData.speed * effectiveTimeScale; });
    updateTrails();
  }
  followReferenceFrame();
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太阳系沙盘 — Solar System | 物理沙盒宇宙</title>
  <link rel="stylesheet" href="shared-theme.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    :root {
      --sol-bg: #0a0a14; --sol-bg2: #111122; --sol-panel: rgba(15,15,30,0.92);
      --sol-border: rgba(255,255,255,0.08); --sol-text: #e0e0f0; --sol-text2: #8899bb;
      --sol-accent: #f0c060; --sol-accent2: #60a0ff; --sol-accent3: #ff6b6b;
      --sol-bar-bg: rgba(255,255,255,0.05);
    }
    [data-theme="academic"] {
      --sol-bg: #f5f5f7; --sol-bg2: #ffffff; --sol-panel: #ffffff; --sol-border: #e0e0e0;
      --sol-text: #1a1a2e; --sol-text2: #666; --sol-accent: #b8860b; --sol-accent2: #6b8cae; --sol-accent3: #c0392b;
      --sol-bar-bg: rgba(0,0,0,0.04);
    }
    [data-theme="cartoon"] {
      --sol-bg: #fff8f0; --sol-bg2: #fff5e6; --sol-panel: rgba(255,248,240,0.95);
      --sol-border: rgba(0,0,0,0.08); --sol-text: #2d3436; --sol-text2: #636e72;
      --sol-accent: #fdcb6e; --sol-accent2: #74b9ff; --sol-accent3: #ff7675;
      --sol-bar-bg: rgba(0,0,0,0.04);
    }
    [data-theme="cyber"] {
      --sol-bg: #040410; --sol-bg2: #08081a; --sol-panel: rgba(8,8,26,0.92);
      --sol-border: rgba(0,243,255,0.12); --sol-text: #e0f7fa; --sol-text2: #a080c0;
      --sol-accent: #ffd700; --sol-accent2: #00f3ff; --sol-accent3: #ff00ea;
      --sol-bar-bg: rgba(0,243,255,0.05);
    }
    [data-theme="soviet"] {
      --sol-bg: #f0ebe4; --sol-bg2: #fffaf2; --sol-panel: #fffaf2; --sol-border: #d4c4a8;
      --sol-text: #1a1a1a; --sol-text2: #6a5a4a; --sol-accent: #c41e1e; --sol-accent2: #5b7a8a; --sol-accent3: #e8a020;
      --sol-bar-bg: rgba(0,0,0,0.04);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-main,'Segoe UI','Microsoft YaHei',system-ui,sans-serif);
      background: var(--sol-bg); color: var(--sol-text); min-height:100vh; overflow:hidden;
    }
    .top-bar {
      position:fixed;top:0;left:0;right:0;z-index:1001;display:flex;align-items:center;
      justify-content:space-between;padding:10px 20px;background:var(--sol-bg2);
      border-bottom:1px solid var(--sol-border);
    }
    .top-bar .sub { font-size:0.9rem;font-weight:700;color:var(--sol-accent); }
    .top-bar .desc { font-size:0.7rem;color:var(--sol-text2);margin-left:8px; }
    .back-btn {
      padding:6px 14px;border-radius:8px;border:1px solid var(--sol-border);
      background:var(--sol-bar-bg);color:var(--sol-text2);text-decoration:none;
      font-size:0.8rem;cursor:pointer;transition:all 0.2s;
    }
    .back-btn:hover { color:var(--sol-accent);border-color:var(--sol-accent); }

    .app { display:flex;height:100vh;padding-top:48px; }
    .scene-wrap { flex:1;position:relative;min-width:0; }
    .scene-wrap canvas { display:block;width:100%;height:100%; }
    .scene-hint {
      position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
      font-size:0.65rem;color:var(--sol-text2);pointer-events:none;opacity:0.5;
      font-family:monospace;
    }
    .scene-controls {
      position:absolute;top:12px;left:12px;display:flex;gap:6px;z-index:5;
    }
    .ctrl-btn {
      padding:5px 10px;background:var(--sol-panel);border:1px solid var(--sol-border);
      border-radius:6px;font-size:0.7rem;color:var(--sol-text2);cursor:pointer;
      font-family:inherit;transition:all 0.2s;
    }
    .ctrl-btn:hover { color:var(--sol-accent);border-color:var(--sol-accent); }
    .ctrl-btn.active { color:var(--sol-accent);border-color:var(--sol-accent);background:var(--sol-bar-bg); }
    .speed-indicator {
      position:absolute;top:12px;right:12px;z-index:5;padding:4px 10px;
      background:var(--sol-panel);border:1px solid var(--sol-border);border-radius:6px;
      font-family:monospace;font-size:0.65rem;color:var(--sol-text2);
    }

    .left-panel, .right-panel {
      width:340px;min-width:280px;background:var(--sol-panel);
      display:flex;flex-direction:column;overflow-y:auto;padding:14px;gap:10px;
      transition:width 0.3s ease, padding 0.3s ease, min-width 0.3s ease;
      position:relative;
    }
    .left-panel { border-right:1px solid var(--sol-border); }
    .right-panel { border-left:1px solid var(--sol-border); }
    .left-panel.collapsed, .right-panel.collapsed {
      width:36px;min-width:36px;padding:14px 4px;overflow:hidden;
    }
    .left-panel.collapsed .panel-inner, .right-panel.collapsed .panel-inner {
      opacity:0;pointer-events:none;
    }
    .panel-inner { transition:opacity 0.2s ease; }
    .collapse-btn {
      position:absolute;top:50%;transform:translateY(-50%);
      width:18px;height:50px;background:var(--sol-panel);border:1px solid var(--sol-border);
      display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:20;
      font-size:10px;color:var(--sol-text2);transition:all 0.2s;
    }
    .collapse-btn:hover { color:var(--sol-accent);border-color:var(--sol-accent); }
    .left-panel .collapse-btn { right:-9px;border-radius:0 4px 4px 0;border-left:none; }
    .right-panel .collapse-btn { left:-9px;border-radius:4px 0 0 4px;border-right:none; }

    .left-panel h3, .right-panel h3 {
      font-size:0.72rem;font-weight:600;color:var(--sol-text2);text-transform:uppercase;
      letter-spacing:1px;border-bottom:1px solid var(--sol-border);padding-bottom:6px;
    }
    .card-img {
      width:100%;height:140px;object-fit:cover;border-radius:8px;margin-bottom:10px;
      background:var(--sol-bar-bg);
    }
    .card-img[src=""] { display:none; }

    .planet-card {
      background:var(--sol-bar-bg);border:1px solid var(--sol-border);border-radius:10px;
      padding:14px 16px;
    }
    .planet-card .planet-name {
      font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px;
    }
    .planet-card .planet-name .dot {
      width:12px;height:12px;border-radius:50%;display:inline-block;flex-shrink:0;
    }
    .planet-card .planet-type {
      font-size:0.65rem;color:var(--sol-text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;
    }
    .planet-card .story {
      font-size:0.74rem;color:var(--sol-text);line-height:1.6;margin-top:8px;
    }
    .planet-card .story .highlight { color:var(--sol-accent);font-weight:600; }
    .planet-stats {
      display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;
    }
    .planet-stat {
      font-size:0.65rem;color:var(--sol-text2);
      display:flex;justify-content:space-between;
    }
    .planet-stat .val { color:var(--sol-text);font-family:monospace;font-weight:600; }

    .probe-card {
      background:var(--sol-bar-bg);border:1px solid var(--sol-border);border-radius:10px;
      padding:12px 14px;
    }
    .probe-card .probe-name {
      font-size:0.85rem;font-weight:700;display:flex;align-items:center;gap:6px;
    }
    .probe-card .probe-name .status {
      width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0;
    }
    .probe-card .probe-info {
      font-size:0.7rem;color:var(--sol-text2);margin-top:4px;line-height:1.5;
    }
    .probe-card .probe-instruments {
      font-size:0.65rem;color:var(--sol-text);margin-top:6px;line-height:1.5;
      padding:6px 8px;background:var(--sol-bar-bg);border-radius:6px;
    }

    .planet-list {
      display:flex;flex-wrap:wrap;gap:4px;
    }
    .planet-chip {
      padding:3px 8px;border:1px solid var(--sol-border);border-radius:6px;
      font-size:0.65rem;cursor:pointer;color:var(--sol-text2);transition:all 0.2s;
      background:var(--sol-bar-bg);font-family:inherit;
    }
    .planet-chip:hover { border-color:var(--sol-accent);color:var(--sol-accent); }
    .planet-chip.active { border-color:var(--sol-accent);color:var(--sol-accent);background:rgba(240,192,96,0.1); }

    .probe-list { display:flex;flex-direction:column;gap:4px; }
    .probe-chip {
      padding:4px 8px;border:1px solid var(--sol-border);border-radius:6px;
      font-size:0.65rem;cursor:pointer;color:var(--sol-text2);transition:all 0.2s;
      background:var(--sol-bar-bg);font-family:inherit;text-align:left;
      display:flex;align-items:center;gap:6px;
    }
    .probe-chip:hover { border-color:var(--sol-accent2);color:var(--sol-accent2); }
    .probe-chip.active { border-color:var(--sol-accent2);color:var(--sol-accent2);background:rgba(96,160,255,0.1); }
    .probe-chip .p-dot { width:6px;height:6px;border-radius:50%;background:var(--sol-accent2);flex-shrink:0; }

    .empty-state {
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:40px 20px;text-align:center;color:var(--sol-text2);gap:8px;
    }
    .empty-state .icon { font-size:2rem;opacity:0.3; }
    .empty-state .msg { font-size:0.75rem;line-height:1.5; }

    @media (max-width:900px) {
      .app { flex-direction:column; }
      .left-panel, .right-panel { width:100%;border:none;border-top:1px solid var(--sol-border);max-height:35vh; }
      .left-panel.collapsed, .right-panel.collapsed { width:100%;min-width:auto;height:36px; }
    }
  </style>
</head>
<body>
  <script src="shared-theme.js"></script>

  <div class="top-bar">
    <div>
      <span class="sub">太阳系沙盘</span>
      <span class="desc">行星 · 发现故事 · 深空探测器</span>
    </div>
    <a class="back-btn" href="index.html">&#8592; 返回首页</a>
  </div>

  <div class="app">
    <div class="left-panel" id="leftPanel">
      <div class="panel-inner">
        <!-- Sun -->
        <h3>太阳</h3>
        <div class="planet-list" id="sunList"></div>

        <!-- Planet List -->
        <h3>八大行星</h3>
        <div class="planet-list" id="planetList"></div>

        <!-- Dwarf Planet List -->
        <h3>矮行星</h3>
        <div class="planet-list" id="dwarfList"></div>

        <!-- Moon List -->
        <h3>主要卫星</h3>
        <div class="planet-list" id="moonList"></div>

        <!-- Detail -->
        <div id="planetDetail">
          <div class="empty-state">
            <div class="icon">&#9790;</div>
            <div class="msg">点击3D场景中的天体<br>或选择上方标签查看详情</div>
          </div>
        </div>
      </div>
      <button class="collapse-btn" id="collapseLeft">&#9664;</button>
    </div>

    <div class="scene-wrap" id="sceneWrap">
      <div class="scene-controls">
        <button class="ctrl-btn" data-speed="0">&#10074;&#10074; 暂停</button>
        <button class="ctrl-btn" data-speed="0.5">0.5x</button>
        <button class="ctrl-btn active" data-speed="1">1x</button>
        <button class="ctrl-btn" data-speed="2">2x</button>
        <button class="ctrl-btn" data-speed="5">5x</button>
      </div>
      <div class="speed-indicator" id="speedLabel">1x</div>
      <div class="scene-hint">[左键] 旋转 | [右键] 平移 | [滚轮] 缩放 | [点击天体] 查看详情</div>
    </div>

    <div class="right-panel" id="rightPanel">
      <div class="panel-inner">
        <!-- Historians -->
        <h3>历史人物 &#128214;</h3>
        <div class="planet-list" id="historianList"></div>

        <!-- Probes -->
        <h3>深空探测器 &#128640;</h3>
        <div class="probe-list" id="probeList"></div>
        <div id="probeDetail"></div>
      </div>
      <button class="collapse-btn" id="collapseRight">&#9654;</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ========== Sun Data ==========
    const SUN_DATA = {
      key:'sun', name:'太阳', en:'Sun', type:'恒星', color:'#ffcc33',
      img:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/The_Sun_by_the_Atmospheric_Imaging_Assembly_of_NASA%27s_Solar_Dynamics_Observatory_-_20100819.jpg/600px-The_Sun_by_the_Atmospheric_Imaging_Assembly_of_NASA%27s_Solar_Dynamics_Observatory_-_20100819.jpg',
      dist:0, orbit:0, rot:25.38, temp:'约5,500°C（表面）/ 1,500万°C（核心）',
      diameter:'139.2万 km', gravity:'274 m/s² (28g)',
      story:'太阳是太阳系的中心恒星，占整个太阳系质量的99.86%。约46亿年前由分子云坍缩形成。核心温度高达1,500万°C，通过氢核聚变产生能量，每秒消耗约400万吨氢转化为氦。能量以辐射和对流方式传递到表面，最终以光子和中微子辐射到太空。约50亿年后，太阳将耗尽核心氢燃料，膨胀为红巨星，半径可能吞噬地球轨道。太阳每11年左右经历一次磁场活动周期，表现为太阳黑子数量的周期性变化。太阳风是从太阳上层大气持续流出的带电粒子流，影响整个太阳系的空间天气。'
    };

    // ========== Data ==========
    const PLANET_DATA = [
      { key:'mercury', name:'水星', en:'Mercury', type:'类地行星', color:'#b0a899', size:0.38,
        img:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Mercury_in_true_color.jpg/600px-Mercury_in_true_color.jpg',
        dist:5.8, orbit:0.24, rot:58.6, temp:'167°C (昼430°C/夜-180°C)', moons:0,
        gravity:'0.38 g', diameter:'4,878 km', incl:7.0,
        story:'水星是离太阳最近的行星，早在公元前3000年就被苏美尔人观测记录。因其快速绕太阳运行，古罗马人以信使之神墨丘利(Mercurius)命名。由于紧贴太阳，水星极难观测——哥白尼临终前遗憾一辈子未见过水星。1974年水手10号首次飞掠，2011年信使号进入轨道，揭示其表面布满陨石坑，酷似月球。',

        gravity:'0.90 g', diameter:'12,104 km', incl:3.4,

        discoverer:'—', year:'—' },
      { key:'mars', name:'火星', en:'Mars', type:'类地行星', color:'#e07050', size:0.53,

        gravity:'0.38 g', diameter:'6,779 km', incl:1.85,
        story:'火星因锈红色而被称为"红色星球"，古罗马人以战神马尔斯(Mars)命名。中国古代称"荧惑"。17世纪开普勒计算了火星椭圆轨道，打破了"完美圆周"的教条。1877年斯基亚帕雷利观测到火星表面"运河"，引发火星生命猜想。1965年水手4号首次飞掠火星。目前已有多个探测器在火星表面工作，包括毅力号、好奇号、祝融号等。',

        story:'土星以其壮丽的环系统闻名。1610年伽利略首次用望远镜看到土星环，但因分辨率不足，误以为是土星的"耳朵"或两颗卫星。1655年惠更斯用更强大的望远镜正确识别出土星环。1675年卡西尼发现环中的缝隙（卡西尼缝）。1997年发射的卡西尼-惠更斯号探测器环绕土星13年，于2017年壮丽地坠入土星大气层，完成了史诗般的使命。',

        img:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Uranus2.jpg/600px-Uranus2.jpg',

    function tagDiscoverer(text) {
      if (!text || text === '—' || text === '自古以来已知') return text;
      const entries = Object.entries(HISTORIAN_MAP).sort((a, b) => b[0].length - a[0].length);
      let result = text;
      entries.forEach(([name, key]) => {
        const tag = `<span class="historian-tag" data-hkey="${key}" style="cursor:pointer;color:var(--sol-accent);border-bottom:1px dotted var(--sol-accent);">${name}</span>`;
        result = result.split(name).join(tag);
      });
      return result;
    }

    // ========== Theme Colors ==========
    function getThemeColors() {
      const s = getComputedStyle(document.documentElement);
      const accent = s.getPropertyValue('--sol-accent').trim() || '#f0c060';
      const accent2 = s.getPropertyValue('--sol-accent2').trim() || '#60a0ff';
      const bg = s.getPropertyValue('--sol-bg').trim() || '#0a0a14';
      const text2 = s.getPropertyValue('--sol-text2').trim() || '#8899bb';
      return { accent, accent2, bg, text2 };
    }

    // ========== Solar System ==========
    class SolarSystem {
      constructor() {
        this.speed = 1;
        this.paused = false;
        this.selectedPlanet = null;
        this.selectedMoon = null;
        this.selectedSun = null;
        this.selectedHistorian = null;
        this.selectedProbe = null;
        this.planetMeshes = {};
        this.dwarfMeshes = {};
        this.moonMeshes = {};
        this.probeMeshes = {};
        this.orbitLines = {};
        this.orbitGroups = {};

        // Camera follow state
        this.cameraTarget = new THREE.Vector3(0, 0, 0);
        this.cameraDestPos = null;
        this.cameraAnimating = false;
        this.orbitAngle = 0;
        this.orbitRadius = 80;
        this.orbitHeight = 35;
        this.autoOrbit = false;

        this.setupScene();
        this.createSun();
        this.createPlanets();
        this.createDwarfPlanets();
        this.createMoons();
        this.createProbes();
        this.createStarfield();
        this.bindEvents();
        this.buildSidePanel();
        this.animate();
      }

      setupScene() {
        const wrap = document.getElementById('sceneWrap');
        const w = wrap.clientWidth, h = wrap.clientHeight;

        this.scene = new THREE.Scene();
        const colors = getThemeColors();
        this.scene.background = new THREE.Color(colors.bg);

        this.camera = new THREE.PerspectiveCamera(50, w/h, 0.5, 2000);
        this.camera.position.set(40, 35, 60);

        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(w, h);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        wrap.appendChild(this.renderer.domElement);

        this.controls = new OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;
        this.controls.dampingFactor = 0.08;
        this.controls.target.set(0, 0, 0);
        this.controls.minDistance = 3;
        this.controls.maxDistance = 300;

        this.raycaster = new THREE.Raycaster();
        this.mouse = new THREE.Vector2();

        const ambient = new THREE.AmbientLight(0x333344, 0.6);
        this.scene.add(ambient);
        const sunLight = new THREE.PointLight(0xfff8e0, 200, 500, 0.5);
        sunLight.position.set(0, 0, 0);
        this.scene.add(sunLight);

        window.addEventListener('resize', () => {
          const rw = wrap.clientWidth, rh = wrap.clientHeight;
          this.camera.aspect = rw/rh;
          this.camera.updateProjectionMatrix();
          this.renderer.setSize(rw, rh);
        });
      }

      createSun() {
        const geo = new THREE.SphereGeometry(2.5, 64, 64);
        const mat = new THREE.MeshBasicMaterial({ color: 0xffcc33 });
        this.sun = new THREE.Mesh(geo, mat);
        this.sun.userData = { type:'sun' };
        this.scene.add(this.sun);

        // Glow
        const glowGeo = new THREE.SphereGeometry(3.2, 64, 64);
        const glowMat = new THREE.ShaderMaterial({
          uniforms: { time: { value: 0 } },
          vertexShader: `
            varying vec3 vNormal; varying vec3 vPosition;
            void main() { vNormal = normalize(normalMatrix * normal); vPosition = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
          `,
          fragmentShader: `
            varying vec3 vNormal; varying vec3 vPosition;
            void main() {
              float intensity = pow(0.72 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 1.8);
              gl_FragColor = vec4(1.0, 0.75, 0.15, 1.0) * intensity * 0.5;
            }
          `,
          transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });
        this.sunGlow = new THREE.Mesh(glowGeo, glowMat);
        this.scene.add(this.sunGlow);
      }

      createOrbitRing(dist, color) {
        const pts = [];
        const segments = 256;
        for (let i=0; i<=segments; i++) {
          const angle = (i/segments) * Math.PI * 2;
          pts.push(new THREE.Vector3(Math.cos(angle)*dist, 0, Math.sin(angle)*dist));
        }
        const geo = new THREE.BufferGeometry().setFromPoints(pts);
        const mat = new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.15, depthTest:true });
        return new THREE.Line(geo, mat);
      }

      createPlanets() {
        PLANET_DATA.filter(p => p.type !== '矮行星').forEach((p, idx) => {
          // Orbit group (tilts the entire orbit plane)
          const group = new THREE.Group();
          if (p.incl) group.rotation.x = p.incl * Math.PI / 180;
          this.scene.add(group);
          this.orbitGroups[p.key] = group;

          // Orbit ring
          const ring = this.createOrbitRing(p.dist, 0x334466);
          group.add(ring);
          this.orbitLines[p.key] = ring;

          // Planet
          const geo = new THREE.SphereGeometry(p.size * 0.45, 48, 48);
          const mat = new THREE.MeshStandardMaterial({
            color: new THREE.Color(p.color),
            roughness: 0.7, metalness: 0.05
          });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(p.dist, 0, 0);
          mesh.userData = { planetKey: p.key, type:'planet' };
          mesh.castShadow = true;
          group.add(mesh);
          this.planetMeshes[p.key] = mesh;

          // Saturn ring
          if (p.key === 'saturn') {
            const ringGeo = new THREE.TorusGeometry(p.size*0.55, p.size*0.12, 16, 64);
            const ringMat = new THREE.MeshStandardMaterial({ color:0xd4c090, roughness:0.6, metalness:0.2, side:THREE.DoubleSide });
            const ringMesh = new THREE.Mesh(ringGeo, ringMat);
            ringMesh.rotation.x = Math.PI/2.3;
            mesh.add(ringMesh);
          }
        });
      }

      createDwarfPlanets() {
        const dwarfPlanets = PLANET_DATA.filter(p => p.type === '矮行星' && p.dist > 450);
        dwarfPlanets.forEach(p => {
          // Orbit group (tilts the entire orbit plane)
          const group = new THREE.Group();
          if (p.incl) group.rotation.x = p.incl * Math.PI / 180;
          this.scene.add(group);
          this.orbitGroups[p.key] = group;

          // Orbit ring (thinner, more transparent)
          const ring = this.createOrbitRing(p.dist, 0x554466);
          ring.material.opacity = 0.08;
          group.add(ring);
          this.orbitLines[p.key] = ring;

          // Dwarf planet (smaller than full planets)
          const geo = new THREE.SphereGeometry(p.size * 0.35, 32, 32);
          const mat = new THREE.MeshStandardMaterial({
            color: new THREE.Color(p.color),
            roughness: 0.8, metalness: 0.02
          });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(p.dist, 0, 0);
          mesh.userData = { planetKey: p.key, type: 'dwarf' };
          group.add(mesh);
          this.dwarfMeshes[p.key] = mesh;
        });
      }

      createMoons() {
        MOON_DATA.forEach(m => {
          // Moon will be positioned relative to its parent planet
          const geo = new THREE.SphereGeometry(m.size * 0.2, 24, 24);
          const mat = new THREE.MeshStandardMaterial({
            color: new THREE.Color(m.color),
            roughness: 0.7, metalness: 0.05
          });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.userData = { moonKey: m.key, parentKey: m.parentKey, type: 'moon' };
          this.scene.add(mesh);
          this.moonMeshes[m.key] = mesh;
        });
      }

      createProbes() {
        const geo = new THREE.SphereGeometry(0.25, 16, 16);
        PROBE_DATA.forEach(probe => {
          const mat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(probe.pos.x, probe.pos.y, probe.pos.z);
          mesh.userData = { probeKey: probe.key, type:'probe' };
          this.scene.add(mesh);
          this.probeMeshes[probe.key] = mesh;

          // Line from Sun
          const pts = [new THREE.Vector3(0,0,0), new THREE.Vector3(probe.pos.x, probe.pos.y, probe.pos.z)];
          const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
          const lineMat = new THREE.LineBasicMaterial({ color:0x338855, transparent:true, opacity:0.2, depthTest:true });
          this.scene.add(new THREE.Line(lineGeo, lineMat));
        });
      }

      createStarfield() {
        const starsGeo = new THREE.BufferGeometry();
        const count = 2000;
        const positions = new Float32Array(count*3);
        for (let i=0; i<count*3; i+=3) {
          positions[i] = (Math.random()-0.5)*600;
          positions[i+1] = (Math.random()-0.5)*400;
          positions[i+2] = (Math.random()-0.5)*600;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(positions,3));
        const starsMat = new THREE.PointsMaterial({ color:0xffffff, size:0.15, transparent:true, opacity:0.7 });
        this.scene.add(new THREE.Points(starsGeo, starsMat));
      }

      bindEvents() {
        this.renderer.domElement.addEventListener('click', (e) => {
          const rect = this.renderer.domElement.getBoundingClientRect();
          this.mouse.x = ((e.clientX-rect.left)/rect.width)*2-1;
          this.mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;

          this.raycaster.setFromCamera(this.mouse, this.camera);
          const allMeshes = [
            this.sun,
            ...Object.values(this.planetMeshes),
            ...Object.values(this.dwarfMeshes),
            ...Object.values(this.moonMeshes),
            ...Object.values(this.probeMeshes)
          ];
          const intersects = this.raycaster.intersectObjects(allMeshes);

          if (intersects.length > 0) {
            const obj = intersects[0].object;
            if (obj.userData.type === 'sun') {
              this.selectSun();
            } else if (obj.userData.type === 'planet') {
              this.selectPlanet(obj.userData.planetKey);
            } else if (obj.userData.type === 'dwarf') {
              this.selectPlanet(obj.userData.planetKey);
            } else if (obj.userData.type === 'moon') {
              this.selectMoon(obj.userData.moonKey);
            } else if (obj.userData.type === 'probe') {
              this.selectProbe(obj.userData.probeKey);
            }
          }
        });

        document.querySelectorAll('.ctrl-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const spd = parseFloat(btn.dataset.speed);
            this.speed = spd;
            this.paused = spd === 0;
            document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.toggle('active', b.dataset.speed === String(spd)));
            document.getElementById('speedLabel').textContent = spd === 0 ? '暂停' : spd + 'x';
          });
        });

        // Historian tag click (event delegation on detail panel)
        document.getElementById('planetDetail').addEventListener('click', (e) => {
          const tag = e.target.closest('.historian-tag');
          if (tag && tag.dataset.hkey) {
            this.selectHistorian(tag.dataset.hkey);
          }
        });

        // Panel collapse buttons
        document.getElementById('collapseLeft').addEventListener('click', () => {
          const panel = document.getElementById('leftPanel');
          panel.classList.toggle('collapsed');
        });
        document.getElementById('collapseRight').addEventListener('click', () => {
          const panel = document.getElementById('rightPanel');
          panel.classList.toggle('collapsed');
        });
      }

      selectSun() {
        this.selectedSun = true;
        this.selectedPlanet = null;
        this.selectedMoon = null;
        this.selectedHistorian = null;
        this.selectedProbe = null;
        this.autoOrbit = false;
        this.updateSidePanel();
        // Clear all highlights
        [...Object.values(this.planetMeshes), ...Object.values(this.dwarfMeshes)].forEach(m => {
          m.material.emissive = new THREE.Color(0x000000);
          m.material.emissiveIntensity = 0;
        });
        Object.values(this.moonMeshes).forEach(m => {
          m.material.emissive = new THREE.Color(0x000000);
          m.material.emissiveIntensity = 0;
        });
        // Pulse sun glow
        this.sun.material.color.setHex(0xffffaa);
        setTimeout(() => { this.sun.material.color.setHex(0xffcc33); }, 300);
      }

      selectPlanet(key) {
        this.selectedPlanet = key;
        this.selectedMoon = null;
        this.selectedSun = null;
        this.selectedHistorian = null;
        this.selectedProbe = null;
        this.autoOrbit = false;
        this.updateSidePanel();
        // Highlight
        [...Object.values(this.planetMeshes), ...Object.values(this.dwarfMeshes)].forEach(m => {
          m.material.emissive = new THREE.Color(0x000000);
          m.material.emissiveIntensity = 0;
        });
        Object.values(this.moonMeshes).forEach(m => {
          m.material.emissive = new THREE.Color(0x000000);
          m.material.emissiveIntensity = 0;
        });
        const targetMesh = this.planetMeshes[key] || this.dwarfMeshes[key];
        if (targetMesh) {
          targetMesh.material.emissive = new THREE.Color(0xffffff);
          targetMesh.material.emissiveIntensity = 0.3;
        }
      }

      selectMoon(key) {
        this.selectedMoon = key;
        this.selectedPlanet = null;
        this.selectedSun = null;
        this.selectedHistorian = null;
        this.selectedProbe = null;
        this.autoOrbit = false;
        this.updateSidePanel();
        [...Object.values(this.planetMeshes), ...Object.values(this.dwarfMeshes)].forEach(m => {
          m.material.emissive = new THREE.Color(0x000000);
          m.material.emissiveIntensity = 0;
        });
        Object.values(this.moonMeshes).forEach(m => {
          m.material.emissive = new THREE.Color(0x000000);
          m.material.emissiveIntensity = 0;
        });
        if (this.moonMeshes[key]) {
          this.moonMeshes[key].material.emissive = new THREE.Color(0xffffff);
          this.moonMeshes[key].material.emissiveIntensity = 0.3;
        }
      }

      selectHistorian(key) {
        this.selectedHistorian = key;
        this.selectedSun = null;
        this.selectedPlanet = null;
        this.selectedMoon = null;
        this.selectedProbe = null;
        this.updateSidePanel();
        // Clear all 3D highlights
        [...Object.values(this.planetMeshes), ...Object.values(this.dwarfMeshes)].forEach(m => {
          m.material.emissive = new THREE.Color(0x000000);
          m.material.emissiveIntensity = 0;
        });
        Object.values(this.moonMeshes).forEach(m => {
          m.material.emissive = new THREE.Color(0x000000);
          m.material.emissiveIntensity = 0;
        });
      }

      selectProbe(key) {
        this.selectedProbe = key;
        this.selectedPlanet = null;
        this.selectedMoon = null;
        this.selectedSun = null;
        this.selectedHistorian = null;
        this.autoOrbit = false;
        this.updateSidePanel();
        [...Object.values(this.planetMeshes), ...Object.values(this.dwarfMeshes)].forEach(m => {
          m.material.emissive = new THREE.Color(0x000000);
          m.material.emissiveIntensity = 0;
        });
        Object.values(this.moonMeshes).forEach(m => {
          m.material.emissive = new THREE.Color(0x000000);
          m.material.emissiveIntensity = 0;
        });
      }

      buildSidePanel() {
        // Sun chip
        const sl = document.getElementById('sunList');
        const sunChip = document.createElement('button');
        sunChip.className = 'planet-chip';
        sunChip.innerHTML = `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${SUN_DATA.color};margin-right:4px;box-shadow:0 0 4px ${SUN_DATA.color};"></span>${SUN_DATA.name}`;
        sunChip.addEventListener('click', () => this.selectSun());
        sunChip.dataset.key = 'sun';
        sunChip.dataset.section = 'sun';
        sl.appendChild(sunChip);

        // Planet chips
        const pl = document.getElementById('planetList');
        const mainPlanets = PLANET_DATA.filter(p => p.type !== '矮行星');
        mainPlanets.forEach(p => {
          const chip = document.createElement('button');
          chip.className = 'planet-chip';
          chip.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:4px;"></span>${p.name}`;
          chip.addEventListener('click', () => this.selectPlanet(p.key));
          chip.dataset.key = p.key;
          chip.dataset.section = 'planet';
          pl.appendChild(chip);
        });

        // Dwarf planet chips
        const dwarfPlanets = PLANET_DATA.filter(p => p.type === '矮行星' && p.dist > 450);
        const dwl = document.getElementById('dwarfList');
        dwarfPlanets.forEach(p => {
          const chip = document.createElement('button');
          chip.className = 'planet-chip';
          chip.innerHTML = `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${p.color};margin-right:4px;"></span>${p.name}`;
          chip.addEventListener('click', () => this.selectPlanet(p.key));
          chip.dataset.key = p.key;
          chip.dataset.section = 'dwarf';
          dwl.appendChild(chip);
        });

        // Moon chips
        const ml = document.getElementById('moonList');
        MOON_DATA.forEach(m => {
          const chip = document.createElement('button');
          chip.className = 'planet-chip';
          chip.innerHTML = `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${m.color};margin-right:4px;"></span>${m.name}`;
          chip.addEventListener('click', () => this.selectMoon(m.key));
          chip.dataset.key = m.key;
          chip.dataset.section = 'moon';
          ml.appendChild(chip);
        });

        // Historian chips
        const hl = document.getElementById('historianList');
        HISTORIAN_DATA.forEach(h => {
          const chip = document.createElement('button');
          chip.className = 'planet-chip';
          chip.innerHTML = `${h.name}`;
          chip.addEventListener('click', () => this.selectHistorian(h.key));
          chip.dataset.key = h.key;
          chip.dataset.section = 'historian';
          hl.appendChild(chip);
        });

        // Probe chips
        const prl = document.getElementById('probeList');
        PROBE_DATA.forEach(probe => {
          const chip = document.createElement('button');
          chip.className = 'probe-chip';
          chip.innerHTML = `<span class="p-dot"></span>${probe.name}`;
          chip.addEventListener('click', () => this.selectProbe(probe.key));
          chip.dataset.key = probe.key;
          prl.appendChild(chip);
        });
      }

      updateSidePanel() {
        // Update chips
        document.querySelectorAll('.planet-chip').forEach(c => {
          c.classList.remove('active');
        });
        if (this.selectedSun) {
          document.querySelectorAll(`.planet-chip[data-key="sun"]`).forEach(c => c.classList.add('active'));
        }
        if (this.selectedPlanet) {
          document.querySelectorAll(`.planet-chip[data-key="${this.selectedPlanet}"]`).forEach(c => c.classList.add('active'));
        }
        if (this.selectedMoon) {
          document.querySelectorAll(`.planet-chip[data-key="${this.selectedMoon}"]`).forEach(c => c.classList.add('active'));
        }
        if (this.selectedHistorian) {
          document.querySelectorAll(`.planet-chip[data-key="${this.selectedHistorian}"]`).forEach(c => c.classList.add('active'));
        }
        document.querySelectorAll('#probeList .probe-chip').forEach(c => {
          c.classList.toggle('active', c.dataset.key === this.selectedProbe);
        });

        const detail = document.getElementById('planetDetail');
        const probeDetail = document.getElementById('probeDetail');

        // Clear both panels first
        detail.innerHTML = '';
        probeDetail.innerHTML = '';

        if (this.selectedSun) {
          const s = SUN_DATA;
          detail.innerHTML = `
            <div class="planet-card">
              <img class="card-img" src="${s.img}" alt="${s.name}" loading="lazy">
              <div class="planet-name"><span class="dot" style="background:${s.color}"></span>${s.name} <span style="font-size:0.7rem;color:var(--sol-text2);font-weight:400;">${s.en}</span></div>
              <div class="planet-type">${s.type}</div>
              <div class="planet-stats">
                <div class="planet-stat"><span>距太阳</span><span class="val">0 AU（中心）</span></div>
                <div class="planet-stat"><span>自转周期</span><span class="val">${s.rot}天</span></div>
                <div class="planet-stat"><span>直径</span><span class="val">${s.diameter}</span></div>
                <div class="planet-stat"><span>温度</span><span class="val">${s.temp}</span></div>
                <div class="planet-stat"><span>质量占比</span><span class="val">99.86%</span></div>
                <div class="planet-stat"><span>表面重力</span><span class="val">${s.gravity}</span></div>
              </div>
              <div class="story">
                ${s.story}
              </div>
            </div>`;
        } else if (this.selectedPlanet) {
          const p = PLANET_DATA.find(pl => pl.key === this.selectedPlanet);
          detail.innerHTML = `
            <div class="planet-card">
              <img class="card-img" src="${p.img}" alt="${p.name}" loading="lazy">
              <div class="planet-name"><span class="dot" style="background:${p.color}"></span>${p.name} <span style="font-size:0.7rem;color:var(--sol-text2);font-weight:400;">${p.en}</span></div>
              <div class="planet-type">${p.type}</div>
              <div class="planet-stats">
                <div class="planet-stat"><span>距太阳</span><span class="val">${p.dist} AU</span></div>
                <div class="planet-stat"><span>公转周期</span><span class="val">${typeof p.orbit==='number'&&p.orbit<10?p.orbit+'年':'约'+p.orbit+'天'}</span></div>
                <div class="planet-stat"><span>直径</span><span class="val">${p.diameter}</span></div>
                <div class="planet-stat"><span>温度</span><span class="val">${p.temp}</span></div>
                <div class="planet-stat"><span>卫星</span><span class="val">${p.moons}颗</span></div>
                <div class="planet-stat"><span>重力</span><span class="val">${p.gravity}</span></div>
                <div class="planet-stat"><span>黄道面倾角</span><span class="val">${p.incl}°</span></div>
              </div>
              <div class="story">
                <div style="font-size:0.7rem;color:var(--sol-accent);margin-bottom:4px;font-weight:600;">发现历史 · ${p.year}</div>
                <strong>发现者：</strong>${tagDiscoverer(p.discoverer)}<br><br>
                ${p.story}
              </div>
            </div>`;
        } else if (this.selectedMoon) {
          const m = MOON_DATA.find(mo => mo.key === this.selectedMoon);
          detail.innerHTML = `
            <div class="planet-card">
              <img class="card-img" src="${m.img}" alt="${m.name}" loading="lazy">
              <div class="planet-name"><span class="dot" style="background:${m.color}"></span>${m.name} <span style="font-size:0.7rem;color:var(--sol-text2);font-weight:400;">${m.en}</span></div>
              <div class="planet-type">卫星 · 绕${m.parent}</div>
              <div class="planet-stats">
                <div class="planet-stat"><span>绕行距离</span><span class="val">${m.dist_planet >= 1 ? m.dist_planet.toFixed(0) + ' km' : (m.dist_planet*1000000).toFixed(0) + ' km'}</span></div>
                <div class="planet-stat"><span>公转周期</span><span class="val">${Math.abs(m.orbit).toFixed(1)}天</span></div>
                <div class="planet-stat"><span>直径</span><span class="val">${m.size_display}</span></div>
                <div class="planet-stat"><span>温度</span><span class="val">${m.temp_mean}</span></div>
                <div class="planet-stat"><span>自转</span><span class="val">${m.rotation}</span></div>
                <div class="planet-stat"><span>重力</span><span class="val">${m.gravity}</span></div>
              </div>
              <div class="story">
                <div style="font-size:0.7rem;color:var(--sol-accent);margin-bottom:4px;font-weight:600;">发现历史</div>
                <strong>发现者：</strong>${tagDiscoverer(m.discoverer)}<br><br>
                ${m.story}
              </div>
            </div>`;
        } else {
          detail.innerHTML = `<div class="empty-state"><div class="icon">&#9790;</div><div class="msg">点击3D场景中的天体<br>或选择上方标签查看详情</div></div>`;
        }

        if (this.selectedHistorian) {
          const h = HISTORIAN_DATA.find(he => he.key === this.selectedHistorian);
          probeDetail.innerHTML = `
            <div class="planet-card">
              <img class="card-img" src="${h.img}" alt="${h.name}" loading="lazy">
              <div class="planet-name"><span class="dot" style="background:var(--sol-accent)"></span>${h.name} <span style="font-size:0.7rem;color:var(--sol-text2);font-weight:400;">${h.en}</span></div>
              <div class="planet-type">${h.role} · ${h.country}</div>
              <div class="planet-stats">
                <div class="planet-stat"><span>生卒</span><span class="val">${h.period}</span></div>
                <div class="planet-stat"><span>国籍</span><span class="val">${h.country}</span></div>
              </div>
              <div class="story">
                <strong>生平：</strong>${h.bio}
              </div>
              <div class="story" style="margin-top:8px;">
                <div style="font-size:0.7rem;color:var(--sol-accent);margin-bottom:4px;font-weight:600;">主要发现</div>
                ${h.discoveries.map(d => `• ${d}`).join('<br>')}
              </div>
            </div>`;
        } else if (this.selectedProbe) {
          const pr = PROBE_DATA.find(pb => pb.key === this.selectedProbe);
          probeDetail.innerHTML = `
            <div class="probe-card" style="margin-top:8px;">
              <div class="probe-name"><span class="status"></span>${pr.name} <span style="font-size:0.65rem;color:var(--sol-text2);font-weight:400;">${pr.en}</span></div>
              <div class="probe-info">
                <strong>机构：</strong>${pr.agency} &nbsp; <strong>发射：</strong>${pr.launch}<br>
                <strong>位置：</strong>${pr.location}<br>
                <strong>距离：</strong>${pr.distance}<br>
                <strong>状态：</strong>${pr.status}
              </div>
              <div class="probe-instruments">
                <strong>携带仪器：</strong>${pr.instruments}
              </div>
              <div class="probe-info" style="margin-top:4px;"><strong>任务目标：</strong>${pr.goal}</div>
            </div>`;
        }
      }

      animate() {
        requestAnimationFrame(() => this.animate());

        const time = Date.now() * 0.001;
        if (!this.paused) {
          const dt = 0.016 * this.speed;
          // Update planets
          PLANET_DATA.forEach(p => {
            const isDwarf = p.type === '矮行星';
            const mesh = isDwarf ? this.dwarfMeshes[p.key] : this.planetMeshes[p.key];
            if (!mesh) return;
            const period = p.orbit;
            const angle = time * 0.3 / Math.max(period, 0.1) + p.key.charCodeAt(0) * 0.1;
            mesh.position.x = Math.cos(angle) * p.dist;
            mesh.position.z = Math.sin(angle) * p.dist;
            mesh.rotation.y += dt * (isDwarf ? 1.5 : 2);
          });

          // Update moons (orbit around parent planets)
          MOON_DATA.forEach(m => {
            const moonMesh = this.moonMeshes[m.key];
            const parentMesh = this.planetMeshes[m.parentKey];
            if (!moonMesh || !parentMesh) return;
            const moonAngle = time * 1.5 / Math.max(Math.abs(m.orbit), 0.1) + m.key.charCodeAt(0) * 0.2;
            const dist = m.dist_planet * 8;
            moonMesh.position.x = parentMesh.position.x + Math.cos(moonAngle) * dist;
            moonMesh.position.z = parentMesh.position.z + Math.sin(moonAngle) * dist;
            moonMesh.position.y = parentMesh.position.y + Math.sin(moonAngle * 0.7) * dist * 0.3;
            moonMesh.rotation.y += dt * 3;
          });

          // Pulse probes
          Object.values(this.probeMeshes).forEach(m => {
            m.material.opacity = 0.5 + Math.sin(time*5) * 0.5;
          });
        }

        // Camera behavior
        const activeBody = this.getActiveBodyMesh();
        if (activeBody) {
          // Follow selected body: smooth target transition
          const targetPos = activeBody.position.clone();
          this.controls.target.lerp(targetPos, 0.05);
          this.autoOrbit = false;
        } else if (this.autoOrbit) {
          // Default: slowly orbit around the sun
          this.orbitAngle += 0.0008 * this.speed;
          const camX = Math.cos(this.orbitAngle) * this.orbitRadius;
          const camZ = Math.sin(this.orbitAngle) * this.orbitRadius;
          this.camera.position.lerp(new THREE.Vector3(camX, this.orbitHeight, camZ), 0.02);
          this.controls.target.lerp(new THREE.Vector3(0, 0, 0), 0.02);
        }

        this.controls.update();

        // Sun glow pulse
        this.sunGlow.material.uniforms.time.value = time;
        this.sunGlow.scale.setScalar(1 + Math.sin(time*2)*0.03);

        this.renderer.render(this.scene, this.camera);
      }

      getActiveBodyMesh() {
        if (this.selectedSun) return this.sun;
        if (this.selectedPlanet) return this.planetMeshes[this.selectedPlanet] || this.dwarfMeshes[this.selectedPlanet];
        if (this.selectedMoon) return this.moonMeshes[this.selectedMoon];
        if (this.selectedProbe) return this.probeMeshes[this.selectedProbe];
        return null;
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      new SolarSystem();
    });
  </script>
</body>
</html>

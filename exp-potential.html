<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一维势阱 - 物理沙盒宇宙</title>
  <link rel="stylesheet" href="shared-theme.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .exp-bg { z-index: -1; }
    /* Theme overrides for potential well */
    [data-theme="academic"] #root { --pw-bg: #f8f9fa; --pw-panel: #ffffff; --pw-border: #e0e0e0; --pw-text: #1a1a2e; --pw-muted: #7a7a8a; --pw-cyan: #6b8cae; --pw-fuchsia: #8a7ca8; }
    [data-theme="cartoon"] #root { --pw-bg: #fef6e4; --pw-panel: rgba(255,255,255,0.9); --pw-border: rgba(255,180,100,0.4); --pw-text: #2d3436; --pw-muted: #636e72; --pw-cyan: #4ecdc4; --pw-fuchsia: #ff6b6b; }
    [data-theme="glass"] #root { --pw-bg: #0f1117; --pw-panel: rgba(255,255,255,0.06); --pw-border: rgba(255,255,255,0.15); --pw-text: #e0e6ed; --pw-muted: #8b92a8; --pw-cyan: #74b9ff; --pw-fuchsia: #fd79a8; }
    [data-theme="cyber"] #root { --pw-bg: #0a0014; --pw-panel: rgba(20,0,40,0.7); --pw-border: rgba(189,0,255,0.4); --pw-text: #f0e6ff; --pw-muted: #a080c0; --pw-cyan: #00f3ff; --pw-fuchsia: #ff00ea; }
    [data-theme="soviet"] #root { --pw-bg: #f0ebe4; --pw-panel: #fffaf2; --pw-border: #c41e1e; --pw-text: #1a1a1a; --pw-muted: #6a5a4a; --pw-cyan: #c41e1e; --pw-fuchsia: #8b4513; }

    #root {
      min-height: 100vh;
      background: var(--pw-bg);
      color: var(--pw-text);
      font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif;
      transition: background 0.6s ease, color 0.4s ease;
    }
    .pw-panel {
      background: var(--pw-panel);
      border: 1px solid var(--pw-border);
      border-radius: var(--radius);
      transition: all 0.4s ease;
    }
    [data-theme="academic"] .pw-panel { border-width: 1px; border-radius: 4px; }
    [data-theme="cartoon"] .pw-panel { border-width: 3px; border-radius: 24px; }
    [data-theme="glass"] .pw-panel { backdrop-filter: blur(16px); }
    [data-theme="cyber"] .pw-panel { box-shadow: 0 0 20px rgba(189,0,255,0.1); }
    [data-theme="soviet"] .pw-panel { border-width: 2px; border-radius: 2px; backdrop-filter: none; box-shadow: none; }
    .pw-text { color: var(--pw-text); }
    .pw-muted { color: var(--pw-muted); }
    .pw-cyan { color: var(--pw-cyan); }
    .pw-fuchsia { color: var(--pw-fuchsia); }
    .pw-bg-cyan { background: var(--pw-cyan); }
    .pw-bg-fuchsia { background: var(--pw-fuchsia); }
    .pw-border-cyan { border-color: var(--pw-cyan); }
    .pw-border-fuchsia { border-color: var(--pw-fuchsia); }
    .pw-shadow-cyan { box-shadow: 0 0 10px var(--pw-cyan); }
    .pw-shadow-fuchsia { box-shadow: 0 0 10px var(--pw-fuchsia); }
  </style>
</head>
<body>
  <div class="exp-bg"></div>
  <div id="root"></div>

  <script src="shared-theme.js"></script>
  <script>
    PSUTheme.createSwitcher();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Play = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
    const Pause = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>;
    const Maximize2 = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>;
    const Zap = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
    const Eye = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
    const Info = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;

    const App = () => {
      const canvasRef = useRef(null);
      const [n, setN] = useState(1);
      const [boxWidth, setBoxWidth] = useState(80);
      const [isPlaying, setIsPlaying] = useState(true);
      const [showWave, setShowWave] = useState(true);
      const [showProb, setShowProb] = useState(true);
      const [particle, setParticle] = useState(null);
      const rippleRef = useRef({ active: false, radius: 0, alpha: 1 });
      const timeRef = useRef(0);
      const requestRef = useRef();

      const renderCanvas = () => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = 'rgba(0,0,0,0.02)';
        ctx.fillRect(0,0,width,height);

        const wellPxWidth = (boxWidth / 100) * (width * 0.8);
        const startX = (width - wellPxWidth) / 2;
        const endX = startX + wellPxWidth;
        const bottomY = height - 40;
        const centerY = bottomY - 150;

        const wallGlowIntensity = (n / 8) * 30 + Math.sin(timeRef.current * 2) * 5;
        const wallColorStr = `rgba(75, 85, 99, ${0.5 + (n/16)})`;

        ctx.beginPath();
        ctx.moveTo(startX, 20); ctx.lineTo(startX, bottomY + 10);
        ctx.moveTo(endX, 20); ctx.lineTo(endX, bottomY + 10);
        ctx.strokeStyle = wallColorStr; ctx.lineWidth = 4;
        ctx.shadowBlur = wallGlowIntensity;
        ctx.shadowColor = n > 4 ? '#f0abfc' : '#67e8f9';
        ctx.stroke(); ctx.shadowBlur = 0;

        ctx.beginPath(); ctx.moveTo(startX - 10, bottomY); ctx.lineTo(endX + 10, bottomY);
        ctx.lineWidth = 2; ctx.stroke();

        ctx.strokeStyle = '#374151'; ctx.lineWidth = 1; ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.moveTo(startX, centerY); ctx.lineTo(endX, centerY); ctx.stroke(); ctx.setLineDash([]);

        const waveAmplitude = 80, probAmplitude = 180;
        const omega = (n * n) / Math.pow(boxWidth / 50, 2) * 0.05;
        if (isPlaying && !particle) timeRef.current += omega;
        const points = 300; const dx = wellPxWidth / points;

        if (showProb) {
          ctx.beginPath(); ctx.moveTo(startX, bottomY);
          for (let i = 0; i <= points; i++) {
            const x = startX + i * dx; const normalizedX = i / points;
            const psi = Math.sin(n * Math.PI * normalizedX);
            const prob = psi * psi;
            ctx.lineTo(x, bottomY - prob * probAmplitude);
          }
          ctx.lineTo(endX, bottomY);
          ctx.strokeStyle = 'rgba(217, 70, 239, 0.5)'; ctx.lineWidth = 2; ctx.stroke();
          const particleCount = 600; ctx.fillStyle = '#f5d0fe'; ctx.shadowBlur = 4; ctx.shadowColor = '#d946ef';
          ctx.beginPath();
          for (let k = 0; k < particleCount; k++) {
            const randNormX = Math.random(); const randNormY = Math.random();
            const probHeightNorm = Math.pow(Math.sin(n * Math.PI * randNormX), 2);
            if (randNormY < probHeightNorm) {
              const pX = startX + randNormX * wellPxWidth;
              const jitterY = (Math.random() - 0.5) * 10;
              const pY = bottomY - randNormY * probAmplitude + jitterY;
              ctx.rect(pX, pY, 1.5, 1.5);
            }
          }
          ctx.fill(); ctx.shadowBlur = 0;
        }

        if (showWave && !particle) {
          ctx.beginPath();
          for (let i = 0; i <= points; i++) {
            const x = startX + i * dx; const normalizedX = i / points;
            const psi = Math.sin(n * Math.PI * normalizedX);
            const realPart = psi * Math.cos(timeRef.current);
            const y = centerY - realPart * waveAmplitude;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.shadowBlur = 20; ctx.shadowColor = 'rgba(6, 182, 212, 0.8)';
          ctx.strokeStyle = '#22d3ee'; ctx.lineWidth = 3; ctx.stroke();
          ctx.shadowBlur = 5; ctx.shadowColor = 'rgba(6, 182, 212, 0.3)';
          ctx.strokeStyle = '#cffafe'; ctx.lineWidth = 1; ctx.stroke(); ctx.shadowBlur = 0;
        }

        if (particle) {
          const px = startX + particle.normalizedX * wellPxWidth; const py = bottomY - 10;
          if (rippleRef.current.active) {
            rippleRef.current.radius += 3; rippleRef.current.alpha -= 0.03;
            if (rippleRef.current.alpha <= 0) rippleRef.current.active = false;
            else {
              ctx.beginPath(); ctx.arc(px, py, rippleRef.current.radius, 0, Math.PI * 2);
              ctx.strokeStyle = `rgba(251, 191, 36, ${rippleRef.current.alpha})`; ctx.lineWidth = 2 * rippleRef.current.alpha; ctx.stroke();
            }
          }
          ctx.shadowBlur = 35; ctx.shadowColor = '#fbbf24';
          ctx.beginPath(); ctx.arc(px, py, 8, 0, Math.PI * 2); ctx.fillStyle = '#fde68a'; ctx.fill();
          ctx.shadowBlur = 0;
          ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();
          ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
          ctx.fillText('观测到粒子！', px, bottomY - 40);
          ctx.font = '12px sans-serif'; ctx.fillStyle = 'rgba(251, 191, 36, 0.7)';
          ctx.fillText('(波函数坍缩)', px, bottomY - 25);
        }
        requestRef.current = requestAnimationFrame(renderCanvas);
      };

      useEffect(() => {
        const canvas = canvasRef.current;
        const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
        const rect = canvas.getBoundingClientRect();
        if (canvas.width !== rect.width * dpr || canvas.height !== rect.height * dpr) {
          canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
          const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
        }
        requestRef.current = requestAnimationFrame(renderCanvas);
        return () => cancelAnimationFrame(requestRef.current);
      }, [n, boxWidth, isPlaying, showWave, showProb, particle]);

      const measureParticle = () => {
        let found = false, attempts = 0, normX = 0;
        while (!found && attempts < 2000) {
          const randX = Math.random(); const randY = Math.random();
          const prob = Math.pow(Math.sin(n * Math.PI * randX), 2);
          if (randY < prob) { normX = randX; found = true; }
          attempts++;
        }
        setParticle({ normalizedX: normX });
        rippleRef.current = { active: true, radius: 5, alpha: 1.0 };
        setTimeout(() => { setParticle(null); rippleRef.current = { active: false, radius: 0, alpha: 0 }; }, 1800);
      };

      return (
        <div className="min-h-screen flex flex-col p-4 md:p-8" style={{background: 'var(--pw-bg)'}}>
          <header className="mb-6 flex items-center justify-between">
            <div>
              <h1 className="text-3xl md:text-4xl font-bold mb-2 flex items-center gap-3" style={{background: 'linear-gradient(90deg, var(--pw-cyan), var(--pw-fuchsia))', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'}}>
                <Zap className="w-8 h-8 pw-cyan" />
                量子游乐场：一维势阱
              </h1>
              <p className="pw-muted max-w-2xl text-sm md:text-base">探索微观世界的反直觉特性。调整能量和空间，观察波函数的动态演化与坍缩。</p>
            </div>
          </header>

          <div className="flex flex-col lg:flex-row gap-6 h-full flex-grow">
            <div className="flex-grow pw-panel overflow-hidden relative min-h-[400px]">
              <canvas ref={canvasRef} className="w-full h-full block" style={{width: '100%', height: '100%'}} />
              <div className="absolute top-4 left-4 pw-panel p-3 text-sm shadow-lg">
                <div className="flex items-center gap-2 mb-2">
                  <div className="w-3 h-3 rounded-full pw-bg-cyan pw-shadow-cyan"></div>
                  <span className="pw-muted">波函数实部 (振幅)</span>
                </div>
                <div className="flex items-center gap-2">
                  <div className="w-3 h-3 rounded-full pw-bg-fuchsia pw-shadow-fuchsia animate-pulse"></div>
                  <span className="pw-muted">概率密度 (粒子云)</span>
                </div>
              </div>
            </div>

            <div className="w-full lg:w-80 flex flex-col gap-4">
              <div className="pw-panel p-6 relative overflow-hidden">
                <div className="absolute -top-20 -right-20 w-40 h-40 rounded-full blur-3xl pointer-events-none" style={{background: 'var(--pw-cyan)', opacity: 0.1}}></div>
                <div className="absolute -bottom-20 -left-20 w-40 h-40 rounded-full blur-3xl pointer-events-none" style={{background: 'var(--pw-fuchsia)', opacity: 0.1}}></div>
                <h2 className="text-xl font-semibold mb-6 flex items-center gap-2 relative z-10 pw-text">
                  <Maximize2 className="w-5 h-5 pw-cyan" />
                  物理参数控制
                </h2>
                <div className="mb-8 relative z-10">
                  <div className="flex justify-between items-center mb-2">
                    <label className="text-sm font-medium pw-muted">能级 (量子数 n)</label>
                    <span className="pw-cyan font-bold font-mono px-3 py-1 rounded-lg text-sm border" style={{borderColor: 'var(--pw-cyan)'}}>{n}</span>
                  </div>
                  <input type="range" min="1" max="8" step="1" value={n} onChange={(e) => setN(parseInt(e.target.value))} className="w-full h-2 rounded-lg appearance-none cursor-pointer" style={{background: 'rgba(128,128,128,0.2)', accentColor: 'var(--pw-cyan)'}} />
                  <div className="flex justify-between text-xs pw-muted mt-2 px-1"><span>基态 (低能)</span><span>激发态 (高能)</span></div>
                </div>
                <div className="mb-6 relative z-10">
                  <div className="flex justify-between items-center mb-2">
                    <label className="text-sm font-medium pw-muted">势阱宽度 (L)</label>
                    <span className="pw-fuchsia font-bold font-mono px-3 py-1 rounded-lg text-sm border" style={{borderColor: 'var(--pw-fuchsia)'}}>{boxWidth}%</span>
                  </div>
                  <input type="range" min="30" max="100" step="1" value={boxWidth} onChange={(e) => setBoxWidth(parseInt(e.target.value))} className="w-full h-2 rounded-lg appearance-none cursor-pointer" style={{background: 'rgba(128,128,128,0.2)', accentColor: 'var(--pw-fuchsia)'}} />
                </div>
                <div className="h-px w-full my-6 relative z-10" style={{background: 'linear-gradient(90deg, transparent, var(--pw-border), transparent)'}}></div>
                <h2 className="text-sm font-semibold pw-muted mb-4 uppercase tracking-wider relative z-10">量子交互</h2>
                <div className="space-y-4 relative z-10">
                  <button onClick={() => setIsPlaying(!isPlaying)} className="w-full flex items-center justify-center gap-2 py-3 rounded-xl transition-all duration-300 font-medium border" style={{background: isPlaying ? 'rgba(128,128,128,0.1)' : 'var(--pw-cyan)', color: isPlaying ? 'var(--pw-muted)' : '#fff', borderColor: 'var(--pw-border)'}}>
                    {isPlaying ? <Pause className="w-5 h-5" /> : <Play className="w-5 h-5" />}
                    {isPlaying ? '暂停演化' : '播放演化'}
                  </button>
                  <button onClick={measureParticle} disabled={!!particle} className="w-full flex items-center justify-center gap-2 py-4 rounded-xl transition-all duration-200 font-bold text-lg border relative overflow-hidden group" style={{background: 'linear-gradient(90deg, var(--pw-fuchsia), #d946ef)', color: '#fff', borderColor: 'var(--pw-fuchsia)', opacity: particle ? 0.5 : 1, cursor: particle ? 'not-allowed' : 'pointer'}}>
                    <Eye className="w-6 h-6 relative z-10" />
                    <span className="relative z-10">{particle ? '坍缩中...' : '观测粒子'}</span>
                  </button>
                </div>
                <div className="mt-6 space-y-3 relative z-10 p-4 rounded-xl" style={{background: 'rgba(128,128,128,0.05)'}}>
                  <label className="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" checked={showWave} onChange={(e) => setShowWave(e.target.checked)} className="w-4 h-4" />
                    <span className="pw-muted text-sm">显示波函数实部 (Re[Ψ])</span>
                  </label>
                  <label className="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" checked={showProb} onChange={(e) => setShowProb(e.target.checked)} className="w-4 h-4" />
                    <span className="pw-muted text-sm">显示概率密度 (|Ψ|²)</span>
                  </label>
                </div>
              </div>
              <div className="p-4 rounded-xl border text-sm flex gap-3 shadow-lg" style={{background: 'rgba(59, 130, 246, 0.1)', borderColor: 'rgba(59, 130, 246, 0.2)', color: 'var(--pw-muted)'}}>
                <Info className="w-5 h-5 flex-shrink-0 pw-cyan" />
                <p>提示：试着把能级调高，看看墙壁的光芒如何变化，以及概率云变得多么复杂！点击观测按钮来体验"坍缩"。</p>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

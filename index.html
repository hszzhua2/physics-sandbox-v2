    /* ========== Home Page Specific Styles ========== */
    #home-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .header-title {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      z-index: 10;
      transition: all 0.5s ease;
    }

    .header-title h1 {
      margin: 0;
      font-size: 2.8rem;
      letter-spacing: 6px;
      font-weight: 800;
      transition: all 0.5s ease;
    }

    .header-title p {
      margin: 10px 0 0 0;
      letter-spacing: 2px;
      font-size: 0.95rem;
      transition: all 0.5s ease;
    }

    /* Cartoon title */
    [data-theme="cartoon"] .header-title h1 {
      color: #2d3436;
      text-shadow: 2px 2px 0px #ff6b6b, 4px 4px 0px rgba(255, 107, 107, 0.2);
    }
    [data-theme="cartoon"] .header-title p {
      color: #636e72;
      text-transform: uppercase;
    }

    /* Glass title */
    [data-theme="glass"] .header-title h1 {
      color: #e0e6ed;
      text-shadow: 0 0 20px rgba(116, 185, 255, 0.5), 0 0 40px rgba(116, 185, 255, 0.2);

    [data-theme="glass"] .header-title p {
      color: #8b92a8;

    [data-theme="cyber"] .header-title h1 {

    [data-theme="cyber"] .header-title p {
      color: #a080c0;
      text-shadow: 0 0 10px rgba(189, 0, 255, 0.3);
      text-transform: uppercase;
    }

    [data-theme="soviet"] .header-title h1 {

      letter-spacing: 6px;
    }
    [data-theme="soviet"] .header-title p {
      color: #6a5a4a;

    @keyframes cyberPulse {
      0% { text-shadow: 0 0 10px #bd00ff, 0 0 30px rgba(189,0,255,0.5); }
      100% { text-shadow: 0 0 20px #bd00ff, 0 0 60px rgba(189,0,255,0.6), 0 0 90px rgba(189,0,255,0.3); }

    /* Academic title */
    [data-theme="academic"] .header-title h1 {

      letter-spacing: 8px;
      font-weight: 900;
      text-shadow: none;
      animation: none;
    }

      color: #7a7a8a;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 4px;
      margin-top: 12px;
    }
    #en-title { transition: color 0.4s ease; }
    [data-theme="cartoon"] #en-title { color: #a0a0a8; }
    [data-theme="glass"] #en-title { color: #5a5a6a; }
    [data-theme="cyber"] #en-title { color: #7060a0; text-shadow: 0 0 6px rgba(189,0,255,0.15); }
    [data-theme="soviet"] #en-title { color: #8a7a6a; }
    [data-theme="academic"] #en-title { color: #b0b0b8; }

    /* Floating decorative particles */
    .bg-particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    [data-theme="academic"] .bg-particles { display: none; }

    .bg-particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.3;
      animation: floatParticle 20s infinite ease-in-out;
    }

    @keyframes floatParticle {
      0%, 100% { transform: translateY(0) translateX(0); }
      25% { transform: translateY(-30px) translateX(20px); }
      50% { transform: translateY(20px) translateX(-20px); }
      75% { transform: translateY(-10px) translateX(30px); }
    }

    [data-theme="cartoon"] .bg-particle {
      background: radial-gradient(circle, rgba(255,107,107,0.4) 0%, transparent 70%);
    }
    [data-theme="glass"] .bg-particle {

    }
    [data-theme="cyber"] .bg-particle {

    [data-theme="soviet"] .bg-particle {

    [data-theme="glass"] .hint-text { color: #8b92a8; animation: hintBounce 2s ease-in-out infinite; }

      { id: 'social-force',title: '社会力模型',         subtitle: '多体系统',       color: '#6b8cae', x: 0, y: 0, vx: 0, vy: 0, rad: 58, icon: '👥' },
      { id: 'solar',     title: '太阳系沙盘',         subtitle: '行星与探测器',   color: '#f0c060', x: 0, y: 0, vx: 0, vy: 0, rad: 58, icon: '☀️' },
      { id: 'bicycle',   title: '齿轮与自行车',       subtitle: '机械传动',       color: '#4a9e6a', x: 0, y: 0, vx: 0, vy: 0, rad: 58, icon: '🚲' },
      { id: 'gravitational-wave', title: '引力波探测', subtitle: '相对论天文', color: '#6b8cae', x: 0, y: 0, vx: 0, vy: 0, rad: 58, icon: '🌌' },
      { id: 'klein-bottle', title: '克莱因瓶', subtitle: '拓扑几何', color: '#8a7ca8', x: 0, y: 0, vx: 0, vy: 0, rad: 58, icon: '🫙' },
      { id: 'theia-impact', title: '忒伊亚撞击', subtitle: '天体物理', color: '#e65c2c', x: 0, y: 0, vx: 0, vy: 0, rad: 58, icon: '🌍' }
    ];

    function resize() {
      cw = canvas.width = window.innerWidth;
      ch = canvas.height = window.innerHeight;
      graphNodes.forEach(node => {
        if (node.x === 0) {
          node.x = Math.random() * (cw - 200) + 100;
          node.y = Math.random() * (ch - 200) + 100;
          node.vx = (Math.random() - 0.5) * 1.5;
          node.vy = (Math.random() - 0.5) * 1.5;
        }
      });
    }
    window.addEventListener('resize', resize);
    resize();

    let draggedNode = null;
    let dragOffsetX = 0, dragOffsetY = 0;
    let hasDragged = false;

    canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      for (let node of graphNodes) {
        const dist = Math.hypot(node.x - mx, node.y - my);
        if (dist <= node.rad + 10) {
          draggedNode = node;
          dragOffsetX = node.x - mx;
          dragOffsetY = node.y - my;
          hasDragged = false;
          node.vx = 0; node.vy = 0;
          break;
        }
      }
    });
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
      if (draggedNode) {
        draggedNode.x = mouseX + dragOffsetX;
        draggedNode.y = mouseY + dragOffsetY;
        hasDragged = true;
      }
    });
    canvas.addEventListener('mouseup', () => {
      if (draggedNode) {
        draggedNode.vx = (Math.random() - 0.5) * 0.2;
        draggedNode.vy = (Math.random() - 0.5) * 0.2;
      }
      draggedNode = null;
    });
    canvas.addEventListener('mouseleave', () => {
      mouseX = -1000; mouseY = -1000;
      draggedNode = null;
    });
    canvas.addEventListener('click', (e) => {
      if (hasDragged) return;
      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;
      for (let node of graphNodes) {
        const dist = Math.hypot(node.x - clickX, node.y - clickY);
        if (dist <= node.rad + 10) {
          const theme = PSUTheme.get();
          window.location.href = `exp-${node.id}.html?theme=${theme}`;
          break;
        }
      }
    });

    // ---- Floating Physics with Soft Collision + Drag ----
    // Title repulsion zone (center of screen)
    const TITLE_CX = () => cw / 2;
    const TITLE_CY = () => ch / 2;
    const TITLE_RX = 220; // horizontal repulsion radius
    const TITLE_RY = 90;  // vertical repulsion radius

    function updateGraphPhysics() {
      for (let i = 0; i < graphNodes.length; i++) {
        let n = graphNodes[i];
        if (n === draggedNode) continue;

        n.x += n.vx;
        n.y += n.vy;

        const margin = n.rad + 20;
        if (n.x < margin) n.vx += 0.003;
        if (n.x > cw - margin) n.vx -= 0.003;
        if (n.y < margin) n.vy += 0.003;
        if (n.y > ch - margin) n.vy -= 0.003;

        // Title area repulsion
        const tcx = TITLE_CX();
        const tcy = TITLE_CY();
        const dx = n.x - tcx;
        const dy = n.y - tcy;
        // Elliptical distance approximation
        const distEll = Math.sqrt((dx * dx) / (TITLE_RX * TITLE_RX) + (dy * dy) / (TITLE_RY * TITLE_RY));
        if (distEll < 1.0) {
          const push = (1.0 - distEll) * 0.08;
          const angle = Math.atan2(dy, dx);
          n.vx += Math.cos(angle) * push;
          n.vy += Math.sin(angle) * push;
        }

        const time = performance.now() * 0.0003;
        n.vx += Math.sin(time + n.id.charCodeAt(0)) * 0.0008;
        n.vy += Math.cos(time + n.id.charCodeAt(2)) * 0.0008;

        n.vx *= 0.998;
        n.vy *= 0.998;

        const speed = Math.hypot(n.vx, n.vy);
        const maxSpeed = 0.6;
        if (speed > maxSpeed) {
          n.vx = (n.vx / speed) * maxSpeed;
          n.vy = (n.vy / speed) * maxSpeed;
        }
      }

      for (let i = 0; i < graphNodes.length; i++) {
        for (let j = i + 1; j < graphNodes.length; j++) {
          let a = graphNodes[i], b = graphNodes[j];
          let dx = b.x - a.x, dy = b.y - a.y;
          let dist = Math.hypot(dx, dy);
          let minDist = a.rad + b.rad + 8;
          if (dist < minDist && dist > 0) {
            let overlap = (minDist - dist) * 0.5;
            let nx = dx / dist, ny = dy / dist;
            if (a !== draggedNode) { a.x -= nx * overlap; a.y -= ny * overlap; }
            if (b !== draggedNode) { b.x += nx * overlap; b.y += ny * overlap; }
          }
        }
      }
    }

    function getThemeColors() {
      const theme = document.documentElement.getAttribute('data-theme') || 'cartoon';
      if (theme === 'cartoon') {
        return {
          bg: '#fef6e4',
          lineBase: '255, 180, 100',
          nodeFill: 'rgba(255, 255, 255, 0.95)',
          textMain: '#2d3436',
          textSub: '#636e72',
          shadowColor: 'rgba(0,0,0,0.08)',
          lineAlpha: 0.5,
          isAcademic: false
        };
      } else if (theme === 'glass') {
        return {
          bg: '#0f1117',
          lineBase: '116, 185, 255',
          nodeFill: 'rgba(255, 255, 255, 0.06)',
          textMain: '#e0e6ed',
          textSub: '#8b92a8',
          shadowColor: 'rgba(0,0,0,0.3)',
          lineAlpha: 0.4,
          isAcademic: false
        };
      } else if (theme === 'soviet') {
        return {
          bg: '#f0ebe4',
          lineBase: '196, 30, 30',
          nodeFill: '#ffffff',
          textMain: '#1a1a1a',
          textSub: '#6a5a4a',
          shadowColor: 'transparent',
          lineAlpha: 0.35,
          isAcademic: true
        };
      } else if (theme === 'academic') {
        return {
          bg: '#f8f9fa',
          lineBase: '180, 180, 190',
          nodeFill: '#ffffff',
          textMain: '#1a1a2e',
          textSub: '#9a9aa5',
          shadowColor: 'transparent',
          lineAlpha: 0.35,
          isAcademic: true
        };
      } else {
        return {
          bg: '#0a0014',
          lineBase: '189, 0, 255',
          nodeFill: 'rgba(20, 0, 40, 0.8)',
          textMain: '#f0e6ff',
          textSub: '#a080c0',
          shadowColor: 'rgba(189, 0, 255, 0.15)',
          lineAlpha: 0.5,
          isAcademic: false
        };
      }
    }

    function drawGraph() {
      const colors = getThemeColors();
      ctx.fillStyle = colors.bg;
      ctx.fillRect(0, 0, cw, ch);

      const theme = document.documentElement.getAttribute('data-theme') || 'cartoon';

      // ---- Draw connections ----
      if (colors.isAcademic) {
        // Academic: ultra-thin light gray lines
        ctx.lineWidth = 0.8;
        for (let i = 0; i < graphNodes.length; i++) {
          for (let j = i + 1; j < graphNodes.length; j++) {
            let dist = Math.hypot(graphNodes[i].x - graphNodes[j].x, graphNodes[i].y - graphNodes[j].y);
            if (dist < 600) {
              let alpha = Math.max(0, 1 - (dist / 600)) * 0.25;
              ctx.strokeStyle = `rgba(160, 160, 170, ${alpha})`;
              ctx.beginPath();
              ctx.moveTo(graphNodes[i].x, graphNodes[i].y);
              ctx.lineTo(graphNodes[j].x, graphNodes[j].y);
              ctx.stroke();
            }
          }
        }
      } else {
        ctx.lineWidth = theme === 'cartoon' ? 2.5 : 1.5;
        for (let i = 0; i < graphNodes.length; i++) {
          for (let j = i + 1; j < graphNodes.length; j++) {
            let dist = Math.hypot(graphNodes[i].x - graphNodes[j].x, graphNodes[i].y - graphNodes[j].y);
            if (dist < 800) {
              let alpha = Math.max(0, 1 - (dist / 800)) * colors.lineAlpha;
              ctx.strokeStyle = `rgba(${colors.lineBase}, ${alpha})`;
              ctx.beginPath();
              ctx.moveTo(graphNodes[i].x, graphNodes[i].y);
              ctx.lineTo(graphNodes[j].x, graphNodes[j].y);
              ctx.stroke();
            }
          }
        }
      }

      // ---- Draw nodes ----
      let hoverFound = false;

      for (let node of graphNodes) {
        let isHover = Math.hypot(mouseX - node.x, mouseY - node.y) <= node.rad + 10;
        if (isHover) hoverFound = true;

        let nodeColor = colors.isAcademic ? (ACADEMIC_COLORS[node.subtitle] || '#6b8cae') : node.color;

        if (colors.isAcademic) {
          // ---- Academic node: minimal thin outline, white fill ----
          ctx.shadowBlur = 0;

          // Outer ring on hover
          if (isHover) {
            ctx.beginPath();
            ctx.arc(node.x, node.y, node.rad + 4, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(26, 26, 46, 0.08)';
            ctx.lineWidth = 1;
            ctx.stroke();
          }

          // Node body: white fill, thin colored outline
          ctx.beginPath();
          ctx.arc(node.x, node.y, node.rad, 0, Math.PI * 2);
          ctx.fillStyle = '#ffffff';
          ctx.fill();

          // Thin outline
          ctx.lineWidth = 1.5;
          ctx.strokeStyle = nodeColor;
          ctx.stroke();

          // Inner dot accent
          ctx.beginPath();
          ctx.arc(node.x, node.y, 3, 0, Math.PI * 2);
          ctx.fillStyle = nodeColor;
          ctx.fill();

          // Minimalist letter icon
          const iconLetter = ACADEMIC_ICONS[node.id] || '';
          if (iconLetter) {
            ctx.fillStyle = nodeColor;
            ctx.font = 'bold 20px "Segoe UI", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.globalAlpha = 0.6;
            ctx.fillText(iconLetter, node.x, node.y - 12);
            ctx.globalAlpha = 1.0;
          }

          // Title: regular weight, dark
          ctx.fillStyle = colors.textMain;
          ctx.font = '13px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(node.title, node.x, node.y + 22);

          // Subtitle: small, muted gray
          ctx.fillStyle = colors.textSub;
          ctx.font = '10px "Segoe UI", "Microsoft YaHei", sans-serif';
          ctx.fillText(node.subtitle, node.x, node.y + 38);

        } else {
          // ---- Non-academic nodes (original style) ----
          if (theme === 'cyber') {
            ctx.shadowColor = node.color;
            ctx.shadowBlur = isHover ? 30 : 15;
          } else if (theme === 'glass') {
            ctx.shadowColor = node.color;
            ctx.shadowBlur = isHover ? 20 : 10;
          } else {
            ctx.shadowColor = 'rgba(0,0,0,0.1)';
            ctx.shadowBlur = 8;
          }

          ctx.beginPath();
          ctx.arc(node.x, node.y, node.rad + (isHover ? 6 : 0), 0, Math.PI * 2);
          ctx.fillStyle = colors.nodeFill;
          ctx.fill();
          ctx.shadowBlur = 0;

          ctx.lineWidth = theme === 'cartoon' ? 4 : 2;
          ctx.strokeStyle = node.color;
          ctx.stroke();

          if (isHover) {
            ctx.fillStyle = node.color;
            ctx.globalAlpha = theme === 'cartoon' ? 0.15 : 0.25;
            ctx.fill();
            ctx.globalAlpha = 1.0;
          }

          ctx.font = '24px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(node.icon, node.x, node.y - 10);

          ctx.fillStyle = colors.textMain;
          ctx.font = `bold ${theme === 'cartoon' ? '14px' : '13px'} sans-serif`;
          ctx.fillText(node.title, node.x, node.y + 18);

          ctx.fillStyle = colors.textSub;
          ctx.font = '11px sans-serif';
          ctx.fillText(node.subtitle, node.x, node.y + 34);
        }
      }

      document.body.style.cursor = hoverFound ? 'pointer' : 'default';
    }

    function animateGraph() {
      updateGraphPhysics();
      drawGraph();
      requestAnimationFrame(animateGraph);
    }
    animateGraph();
  </script>
</body>
</html>

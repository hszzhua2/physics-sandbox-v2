<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>伯努利原理与升力 — 物理沙盒宇宙</title>
  <link rel="stylesheet" href="shared-theme.css">
  <style>
    .exp-bg { z-index: -1; }
    #sim-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
    #ui-panel {
      position: absolute;
      top: 80px;
      left: 30px;
      width: 340px;
      padding: 20px;
      z-index: 10;
      max-height: 85vh;
      overflow-y: auto;
    }
    h1 { margin: 0; font-size: 1.35rem; transition: var(--theme-transition); }
    p.desc { color: var(--text-muted); font-size: 0.82rem; margin: 6px 0 12px 0; }
    .slider-group { margin-bottom: 12px; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 4px; font-weight: bold; }
    .val-display { font-family: monospace; font-size: 0.9rem; }
    .btn-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .btn-row .theme-btn { flex: 1; min-width: 80px; padding: 10px 12px; font-size: 0.85rem; }
    .stats { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; }
    .stats span { font-family: monospace; font-weight: bold; }
    .formula-box {
      background: rgba(128,128,128,0.08);
      border-radius: 8px;
      padding: 12px;
      margin: 10px 0;
      font-size: 0.82rem;
      line-height: 1.6;
    }
    .formula-box .eq { font-family: 'Courier New', monospace; text-align: center; margin: 6px 0; font-size: 0.9rem; }

    /* Theme colors */
    [data-theme="cartoon"] h1 { color: var(--accent-1); text-shadow: 1px 1px 0 rgba(0,0,0,0.1); }
    [data-theme="cartoon"] .val-display { color: var(--accent-1); }
    [data-theme="cartoon"] .stats span { color: var(--accent-1); }

    [data-theme="glass"] h1 { color: #ff00ea; text-shadow: 0 0 10px rgba(255,0,234,0.3); }
    [data-theme="glass"] .val-display { color: #74b9ff; }
    [data-theme="glass"] .stats span { color: #74b9ff; }

    [data-theme="cyber"] h1 { color: #ff00ea; text-shadow: 0 0 15px rgba(255,0,234,0.5); }
    [data-theme="cyber"] .val-display { color: #00f3ff; }
    [data-theme="cyber"] .stats span { color: #00f3ff; }

    [data-theme="academic"] h1 { color: #1a1a2e; font-weight: 700; text-shadow: none; }
    [data-theme="academic"] p.desc { color: #7a7a8a; }
    [data-theme="academic"] .val-display { color: #1a1a2e; }
    [data-theme="academic"] .stats span { color: #1a1a2e; }
    [data-theme="academic"] #ui-panel { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 4px; box-shadow: none; backdrop-filter: none; }
    [data-theme="academic"] .formula-box { background: #f4f5f7; }

    #ui-panel::-webkit-scrollbar { width: 5px; }
  </style>
</head>
<body>
  <div class="exp-bg"></div>
  <canvas id="sim-canvas"></canvas>

  <div id="ui-panel" class="glass-panel">
    <h1>伯努利原理与升力</h1>
    <p class="desc">飞机为什么能飞？流速与压力的魔法</p>

    <div class="stats">
      升力: <span id="lift-val">0</span> N &nbsp;|&nbsp;
      上表面流速: <span id="top-speed">0</span> m/s
    </div>

    <div class="slider-group">
      <label><span>攻角 (Angle of Attack)</span><span id="aoa-val" class="val-display">8°</span></label>
      <input type="range" id="slider-aoa" min="-15" max="25" step="1" value="8">
    </div>
    <div class="slider-group">
      <label><span>来流风速</span><span id="wind-val" class="val-display">80</span> m/s</label>
      <input type="range" id="slider-wind" min="20" max="200" step="5" value="80">
    </div>
    <div class="slider-group">
      <label><span>粒子数量</span><span id="particle-val" class="val-display">60</span></label>
      <input type="range" id="slider-particle" min="20" max="120" step="10" value="60">
    </div>
    <div class="slider-group">
      <label><span>空气密度</span><span id="rho-val" class="val-display">1.225</span> kg/m³</label>
      <input type="range" id="slider-rho" min="0.3" max="2.0" step="0.05" value="1.225">
    </div>

    <div class="formula-box">
      <strong>伯努利方程</strong>
      <div class="eq">P + ½ρv² = 常数</div>
      <p style="margin:4px 0 0 0; font-size:0.78rem; color:var(--text-muted);">
        流速越快的地方，压力越低。机翼上表面弯曲，空气被迫加速，形成低压区，从而产生向上的升力。
      </p>
    </div>

    <div class="formula-box">
      <strong>升力公式</strong>
      <div class="eq">L = ½ · ρ · v² · S · CL</div>
      <p style="margin:4px 0 0 0; font-size:0.78rem; color:var(--text-muted);">
        CL 为升力系数，与攻角和翼型形状有关。攻角过小升力不足，过大则气流分离导致失速。
      </p>
    </div>

    <div class="btn-row">
      <button class="theme-btn" onclick="resetSim()">重置</button>
      <button class="theme-btn" onclick="togglePause()" id="pause-btn">暂停</button>
    </div>
  </div>

  <!-- Entrance hint -->
  <div id="entrance-toast" class="glass-panel" style="
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:20; padding:24px 36px; text-align:center; pointer-events:none;
    opacity:1; transition:opacity 0.8s ease;">
    <div style="font-size:1.2rem; font-weight:bold; margin-bottom:8px; color:var(--text-color);">
      ✈️ 交互提示
    </div>
    <div style="font-size:0.95rem; color:var(--text-muted); line-height:1.8;">
      调节<strong style="color:var(--accent-1);">攻角</strong>观察升力变化<br>
      增大攻角至 <strong style="color:var(--accent-2);">15° 以上</strong> 观察失速现象
    </div>
  </div>

  <script src="shared-theme.js"></script>
  <script>
    PSUTheme.createSwitcher();
    PSUTheme.createBackButton('index.html');

    const canvas = document.getElementById('sim-canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let paused = false;
    let animId = null;

    // ---- Parameters ----
    let AOA = 8;          // Angle of attack in degrees
    let WIND_SPEED = 80;  // Free stream velocity (m/s)
    let PARTICLE_COUNT = 60;
    let RHO = 1.225;      // Air density (kg/m^3)

    // ---- Airfoil geometry ----
    // Simplified NACA 2412-like airfoil using cubic Bezier
    const CHORD = 360;    // Pixel length of chord
    const THICKNESS = 0.12 * CHORD; // Max thickness

    function getAirfoilPoints(cx, cy, angleDeg) {
      const rad = angleDeg * Math.PI / 180;
      const cos = Math.cos(rad), sin = Math.sin(rad);

      // Upper surface control points (Bezier)
      const up = [];
      for (let t = 0; t <= 1; t += 0.02) {
        const x = (t - 0.5) * CHORD;
        // NACA-like shape: thickness distribution
        const yt = 5 * THICKNESS * (0.2969 * Math.sqrt(t) - 0.1260 * t - 0.3516 * t * t + 0.2843 * t * t * t - 0.1015 * t * t * t * t);
        // Rotate
        const rx = x * cos - yt * sin;
        const ry = x * sin + yt * cos;
        up.push({ x: cx + rx, y: cy + ry });
      }

      // Lower surface
      const lo = [];
      for (let t = 1; t >= 0; t -= 0.02) {
        const x = (t - 0.5) * CHORD;
        const yt = -5 * THICKNESS * (0.2969 * Math.sqrt(t) - 0.1260 * t - 0.3516 * t * t + 0.2843 * t * t * t - 0.1015 * t * t * t * t);
        const rx = x * cos - yt * sin;
        const ry = x * sin + yt * cos;
        lo.push({ x: cx + rx, y: cy + ry });
      }
      return { upper: up, lower: lo };
    }

    // ---- Streamline particles ----
    let particles = [];

    class Particle {
      constructor(yOffset, layer) {
        this.reset(yOffset, layer);
      }
      reset(yOffset, layer) {
        this.x = -50;
        this.baseY = yOffset;
        this.y = yOffset;
        this.layer = layer; // 'upper', 'lower', 'freestream'
        this.progress = 0;
        this.speed = 1.0;
      }
    }

    function initParticles() {
      particles = [];
      const spacing = CHORD * 1.2 / (PARTICLE_COUNT / 3);
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const layer = i % 3;
        let yOffset;
        if (layer === 0) yOffset = -CHORD * 0.35 - (Math.floor(i/3) * spacing * 0.4); // upper
        else if (layer === 1) yOffset = CHORD * 0.35 + (Math.floor(i/3) * spacing * 0.4);  // lower
        else yOffset = -CHORD * 0.8 + (Math.floor(i/3) * spacing * 1.2); // freestream
        particles.push(new Particle(yOffset, layer === 0 ? 'upper' : (layer === 1 ? 'lower' : 'freestream')));
        // Stagger start positions
        particles[i].x = -50 - Math.random() * 200;
      }
    }

    // ---- Physics ----
    function getFlowSpeed(x, layer) {
      // Normalized position along chord (-0.5 to 0.5)
      const nx = x / CHORD;
      const absNx = Math.abs(nx);

      // Base speed factor
      let speedFactor = 1.0;

      if (layer === 'upper') {
        // Upper surface: speed increases due to curvature + angle of attack
        // Maximum speed near leading edge and peak suction
        const aoaFactor = Math.max(0, AOA / 25); // 0 to ~1
        const curvatureBoost = Math.sin(absNx * Math.PI) * (0.4 + aoaFactor * 0.8);
        speedFactor = 1.0 + curvatureBoost;
      } else if (layer === 'lower') {
        // Lower surface: speed decreases slightly or stays similar
        const aoaFactor = Math.max(0, -AOA / 25); // Effect reverses at negative AOA
        speedFactor = 1.0 - Math.sin(absNx * Math.PI) * (0.1 + aoaFactor * 0.2);
      }

      // Stall effect: at high AOA, upper surface flow separates (turbulent)
      if (AOA > 15 && layer === 'upper') {
        const stallFactor = (AOA - 15) / 10; // 0 to 1
        const separation = Math.sin(nx * Math.PI) * stallFactor * 0.5;
        speedFactor *= (1.0 - separation * 0.3);
      }

      return speedFactor;
    }

    function getLift() {
      // Simplified lift calculation
      // CL ≈ 2π * α (in radians) for thin airfoil theory
      // With stall correction
      const alphaRad = AOA * Math.PI / 180;
      let CL = 2 * Math.PI * alphaRad;

      // Stall: CL drops after ~15 degrees
      if (AOA > 15) {
        const stallDrop = Math.min(1.0, (AOA - 15) / 10);
        CL *= (1.0 - stallDrop * 0.7);
      }
      if (AOA < -10) {
        const stallDrop = Math.min(1.0, (-AOA - 10) / 10);
        CL *= (1.0 - stallDrop * 0.7);
      }

      // L = 0.5 * rho * v^2 * S * CL (using arbitrary S=1 for visualization)
      return 0.5 * RHO * WIND_SPEED * WIND_SPEED * CL;
    }

    function getAvgTopSpeed() {
      let sum = 0, count = 0;
      for (let nx = -0.4; nx <= 0.4; nx += 0.05) {
        sum += getFlowSpeed(nx * CHORD, 'upper');
        count++;
      }
      return (sum / count) * WIND_SPEED;
    }

    // ---- Drawing ----
    function getThemeColors() {
      const theme = document.documentElement.getAttribute('data-theme') || 'academic';
      if (theme === 'cartoon') return { bg: '#fef6e4', grid: 'rgba(0,0,0,0.06)', ink: '#2d3436' };
      if (theme === 'glass') return { bg: '#0f1117', grid: 'rgba(255,255,255,0.04)', ink: '#e0e6ed' };
      if (theme === 'academic') return { bg: '#f8f9fa', grid: 'rgba(0,0,0,0.05)', ink: '#1a1a2e' };
      return { bg: '#050508', grid: 'rgba(255,255,255,0.03)', ink: '#f0e6ff' };
    }

    function draw() {
      const theme = getThemeColors();
      ctx.fillStyle = theme.bg;
      ctx.fillRect(0, 0, W, H);

      const cx = W / 2;
      const cy = H / 2;
      const foil = getAirfoilPoints(cx, cy, AOA);

      // Draw subtle grid
      ctx.strokeStyle = theme.grid;
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 60) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y < H; y += 60) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // Draw freestream arrow (left side)
      ctx.strokeStyle = theme.ink;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.moveTo(40, cy);
      ctx.lineTo(100, cy);
      ctx.stroke();
      // Arrowhead
      ctx.beginPath();
      ctx.moveTo(100, cy); ctx.lineTo(90, cy - 6); ctx.lineTo(90, cy + 6); ctx.closePath();
      ctx.fillStyle = theme.ink; ctx.fill();
      ctx.globalAlpha = 1.0;
      ctx.font = 'bold 13px sans-serif';
      ctx.fillStyle = theme.ink;
      ctx.fillText('v∞ = ' + WIND_SPEED + ' m/s', 40, cy - 20);

      // Draw particles (streamlines)
      for (let p of particles) {
        const speedFactor = getFlowSpeed(p.x - cx, p.layer);
        const speed = speedFactor * WIND_SPEED;
        const color = getSpeedColor(speedFactor);

        // Particle position with deflection around airfoil
        let py = p.baseY;
        const dx = p.x - cx;
        const absDx = Math.abs(dx);

        if (absDx < CHORD * 0.6) {
          // Deflection based on layer and position
          const influence = Math.cos((dx / (CHORD * 0.6)) * Math.PI / 2);
          if (p.layer === 'upper') {
            py -= influence * CHORD * 0.08 * (1 + AOA / 30);
          } else if (p.layer === 'lower') {
            py += influence * CHORD * 0.05 * (1 - AOA / 30);
          }
        }

        p.y = py;

        // Draw particle
        const size = 2 + speedFactor * 1.5;
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
        ctx.fill();

        // Trail (short streak)
        ctx.globalAlpha = 0.2;
        ctx.strokeStyle = color;
        ctx.lineWidth = size * 0.5;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - speedFactor * 8, p.y);
        ctx.stroke();
        ctx.globalAlpha = 1.0;
      }

      // Draw airfoil
      ctx.fillStyle = theme.ink;
      ctx.globalAlpha = 0.15;
      ctx.beginPath();
      ctx.moveTo(foil.upper[0].x, foil.upper[0].y);
      for (let p of foil.upper) ctx.lineTo(p.x, p.y);
      for (let p of foil.lower) ctx.lineTo(p.x, p.y);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1.0;

      ctx.strokeStyle = theme.ink;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(foil.upper[0].x, foil.upper[0].y);
      for (let p of foil.upper) ctx.lineTo(p.x, p.y);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(foil.lower[0].x, foil.lower[0].y);
      for (let p of foil.lower) ctx.lineTo(p.x, p.y);
      ctx.stroke();

      // Draw chord line (dashed)
      ctx.strokeStyle = theme.ink;
      ctx.lineWidth = 1;
      ctx.setLineDash([6, 4]);
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      const cStart = { x: cx - CHORD/2 * Math.cos(AOA*Math.PI/180), y: cy - CHORD/2 * Math.sin(AOA*Math.PI/180) };
      const cEnd = { x: cx + CHORD/2 * Math.cos(AOA*Math.PI/180), y: cy + CHORD/2 * Math.sin(AOA*Math.PI/180) };
      ctx.moveTo(cStart.x, cStart.y);
      ctx.lineTo(cEnd.x, cEnd.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1.0;

      // Draw lift arrow
      const lift = getLift();
      const liftMag = Math.min(CHORD * 0.5, Math.abs(lift) / 200);
      const liftColor = lift > 0 ? '#10b981' : '#ef4444';

      ctx.strokeStyle = liftColor;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx, cy - liftMag);
      ctx.stroke();

      // Arrowhead for lift
      ctx.fillStyle = liftColor;
      ctx.beginPath();
      ctx.moveTo(cx, cy - liftMag);
      ctx.lineTo(cx - 8, cy - liftMag + 12);
      ctx.lineTo(cx + 8, cy - liftMag + 12);
      ctx.closePath();
      ctx.fill();

      // Lift label
      ctx.font = 'bold 14px sans-serif';
      ctx.fillStyle = liftColor;
      ctx.fillText('L = ' + (lift/1000).toFixed(2) + ' kN', cx + 20, cy - liftMag * 0.5);

      // Draw AOA arc
      if (Math.abs(AOA) > 2) {
        ctx.strokeStyle = theme.ink;
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.4;
        ctx.beginPath();
        const arcR = CHORD * 0.35;
        const arcStart = 0;
        const arcEnd = -AOA * Math.PI / 180;
        ctx.arc(cx - CHORD*0.35, cy, arcR, Math.min(arcStart, arcEnd), Math.max(arcStart, arcEnd), AOA < 0);
        ctx.stroke();
        ctx.globalAlpha = 1.0;

        // AOA label
        ctx.font = '12px sans-serif';
        ctx.fillStyle = theme.ink;
        ctx.globalAlpha = 0.6;
        const labelAngle = -AOA * Math.PI / 180 / 2;
        const labelX = cx - CHORD*0.35 + (arcR + 20) * Math.cos(labelAngle);
        const labelY = cy + (arcR + 20) * Math.sin(labelAngle);
        ctx.fillText('α = ' + AOA + '°', labelX - 20, labelY);
        ctx.globalAlpha = 1.0;
      }

      // Stall warning
      if (AOA > 15) {
        ctx.font = 'bold 18px sans-serif';
        ctx.fillStyle = '#ef4444';
        ctx.textAlign = 'center';
        ctx.fillText('⚠️ 失速警告 (Stall)', W / 2, H - 40);
        ctx.textAlign = 'left';
      }

      // Legend
      drawLegend(theme);
    }

    function getSpeedColor(factor) {
      // factor 0.5 (slow) = blue, 1.0 (normal) = green, 1.8 (fast) = red
      if (factor < 0.8) {
        const t = (factor - 0.5) / 0.3;
        return `rgb(${Math.round(59 + t * 100)}, ${Math.round(130 + t * 100)}, ${Math.round(246 - t * 100)})`;
      } else if (factor < 1.3) {
        const t = (factor - 0.8) / 0.5;
        return `rgb(${Math.round(159 + t * 96)}, ${Math.round(230 - t * 80)}, ${Math.round(146 - t * 100)})`;
      } else {
        const t = Math.min(1, (factor - 1.3) / 0.5);
        return `rgb(${Math.round(255)}, ${Math.round(150 - t * 100)}, ${Math.round(50 - t * 50)})`;
      }
    }

    function drawLegend(theme) {
      const lx = W - 160;
      const ly = H - 90;
      ctx.font = '11px sans-serif';
      ctx.fillStyle = theme.ink;
      ctx.globalAlpha = 0.6;
      ctx.fillText('流速图例', lx, ly);

      const colors = [
        { c: getSpeedColor(0.6), label: '慢 (高压)' },
        { c: getSpeedColor(1.0), label: '正常' },
        { c: getSpeedColor(1.6), label: '快 (低压)' }
      ];
      colors.forEach((item, i) => {
        const y = ly + 18 + i * 18;
        ctx.fillStyle = item.c;
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.arc(lx + 8, y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = theme.ink;
        ctx.globalAlpha = 0.5;
        ctx.fillText(item.label, lx + 22, y + 4);
      });
      ctx.globalAlpha = 1.0;
    }

    // ---- Main loop ----
    function loop() {
      if (!paused) {
        for (let p of particles) {
          const speedFactor = getFlowSpeed(p.x - W/2, p.layer);
          p.x += speedFactor * WIND_SPEED * 0.15;
          if (p.x > W + 50) {
            p.x = -50 - Math.random() * 100;
            p.progress = 0;
          }
        }
      }
      draw();
      updateStats();
      animId = requestAnimationFrame(loop);
    }

    function updateStats() {
      const lift = getLift();
      document.getElementById('lift-val').textContent = (lift / 1000).toFixed(2);
      const topSpeed = getAvgTopSpeed();
      document.getElementById('top-speed').textContent = topSpeed.toFixed(1);
    }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // ---- Sliders ----
    document.getElementById('slider-aoa').addEventListener('input', (e) => {
      AOA = parseInt(e.target.value);
      document.getElementById('aoa-val').textContent = AOA + '°';
    });
    document.getElementById('slider-wind').addEventListener('input', (e) => {
      WIND_SPEED = parseInt(e.target.value);
      document.getElementById('wind-val').textContent = WIND_SPEED;
    });
    document.getElementById('slider-particle').addEventListener('input', (e) => {
      PARTICLE_COUNT = parseInt(e.target.value);
      document.getElementById('particle-val').textContent = PARTICLE_COUNT;
      initParticles();
    });
    document.getElementById('slider-rho').addEventListener('input', (e) => {
      RHO = parseFloat(e.target.value);
      document.getElementById('rho-val').textContent = RHO.toFixed(3);
    });

    function resetSim() {
      AOA = 8;
      WIND_SPEED = 80;
      PARTICLE_COUNT = 60;
      RHO = 1.225;
      document.getElementById('slider-aoa').value = 8;
      document.getElementById('aoa-val').textContent = '8°';
      document.getElementById('slider-wind').value = 80;
      document.getElementById('wind-val').textContent = '80';
      document.getElementById('slider-particle').value = 60;
      document.getElementById('particle-val').textContent = '60';
      document.getElementById('slider-rho').value = 1.225;
      document.getElementById('rho-val').textContent = '1.225';
      initParticles();
    }

    function togglePause() {
      paused = !paused;
      document.getElementById('pause-btn').textContent = paused ? '继续' : '暂停';
    }

    // ---- Start ----
    initParticles();
    loop();

    setTimeout(() => {
      const toast = document.getElementById('entrance-toast');
      if (toast) toast.style.opacity = '0';
    }, 5000);

    window.addEventListener('beforeunload', () => cancelAnimationFrame(animId));
  </script>
</body>
</html>

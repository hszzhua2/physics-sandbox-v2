<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑洞吸积盘 - 物理沙盒宇宙</title>
    <link rel="stylesheet" href="shared-theme.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #info {
            position: absolute; top: 10px; left: 10px; color: #fff;
            font-family: monospace; font-size: 12px; z-index: 100;
            pointer-events: none;
        }
        #bh-ui {
            position: absolute; top: 80px; left: 30px; width: 320px; padding: 18px;
            z-index: 10; font-family: 'Courier New', monospace; color: #ccc;
        }
        .bh-slider-group { margin-bottom: 14px; }
        .bh-slider-group label { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 4px; }
        .bh-val { color: #60a5fa; font-weight: bold; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #3b82f6; }

        /* Theme overrides */
        [data-theme="academic"] #bh-ui { background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; box-shadow: none; backdrop-filter: none; color: #1a1a2e; }
        [data-theme="academic"] .bh-val { color: #1a1a2e; }
        [data-theme="academic"] input[type=range] { accent-color: #6b8cae; }
        [data-theme="cartoon"] #bh-ui { background: rgba(254,246,228,0.92); border: 2px solid rgba(255,107,107,0.3); border-radius: 16px; color: #2d3436; }
        [data-theme="cartoon"] .bh-val { color: #ff6b6b; }
        [data-theme="glass"] #bh-ui { background: rgba(15,17,23,0.85); border: 1px solid rgba(116,185,255,0.2); border-radius: 12px; color: #e0e6ed; }
        [data-theme="glass"] .bh-val { color: #74b9ff; }
        [data-theme="cyber"] #bh-ui { background: rgba(10,0,20,0.9); border: 1px solid rgba(189,0,255,0.3); border-radius: 8px; color: #f0e6ff; box-shadow: 0 0 20px rgba(189,0,255,0.1); }
        [data-theme="cyber"] .bh-val { color: #00f3ff; text-shadow: 0 0 6px rgba(0,243,255,0.3); }
        [data-theme="cyber"] input[type=range] { accent-color: #bd00ff; }
    </style>
</head>
<body>
    <div id="info">正在初始化 WebGL 与 GPGPU 计算环境...</div>

    <div id="bh-ui" class="glass-panel">
        <div style="font-size:1rem; font-weight:bold; margin-bottom:12px; color:inherit;">🌌 黑洞吸积盘</div>
        <div class="bh-slider-group">
            <label><span>粒子流速</span><span id="val-speed" class="bh-val">1.00x</span></label>
            <input type="range" id="slider-speed" min="0.05" max="3.0" step="0.05" value="1.0">
        </div>
        <div class="bh-slider-group">
            <label><span>多普勒强度</span><span id="val-doppler" class="bh-val">1.20</span></label>
            <input type="range" id="slider-doppler" min="0" max="3.0" step="0.1" value="1.2">
        </div>
        <div class="bh-slider-group">
            <label><span>黑洞质量</span><span id="val-gmass" class="bh-val">2.50</span></label>
            <input type="range" id="slider-gmass" min="0.5" max="8.0" step="0.1" value="2.5">
        </div>
        <div class="bh-slider-group">
            <label><span>引力透镜</span><span id="val-lensing" class="bh-val">ON</span></label>
            <input type="range" id="slider-lensing" min="0" max="1" step="1" value="1">
        </div>
    </div>

    <script src="shared-theme.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GPUComputationRenderer } from 'three/addons/misc/GPUComputationRenderer.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

        // 物理与渲染参数标定
        const PARAMS = {
            PARTICLE_RES: 512, // 512x512 = 262,144 粒子
            BH_RADIUS: 1.0,    // 史瓦西半径 R
            DISK_MIN: 1.5,     // 吸积盘内边缘 1.5R
            DISK_MAX: 5.0,     // 吸积盘外边缘 5.0R
            G_MASS: 2.5,       // 引力系数常数近似
            DOPPLER_FACTOR: 1.2// 多普勒频移视觉缩放系数
        };

        let scene, camera, renderer, composer, controls;
        let gpuCompute, posVariable, velVariable;
        let particleSystem;
        let lensingPass;
        
        // GPGPU: 速度更新着色器
        const computeVelocityShader = `
            #define PI 3.14159265359
            uniform float u_GM;
            uniform float u_R;
            uniform float u_Time;

            // 伪随机与噪声函数
            float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
            
            void main() {
                vec2 uv = gl_FragCoord.xy / resolution.xy;
                vec4 posData = texture2D(texturePosition, uv);
                vec4 velData = texture2D(textureVelocity, uv);
                
                vec3 pos = posData.xyz;
                vec3 vel = velData.xyz;
                
                float r = length(pos);
                if(r < u_R || r > 6.0) {
                    // 生命周期终结或逃逸，重置速度
                    vel = vec3(0.0);
                } else {
                    // 开普勒轨道速度近似: v = sqrt(GM/r)
                    float vMag = sqrt(u_GM / r);
                    
                    // 计算切向向量 (基于 Y 轴旋转)
                    vec3 tangent = normalize(cross(vec3(0.0, 1.0, 0.0), pos));
                    
                    // 向心吸积漂移 (随距离黑洞变近而加速)
                    vec3 inward = -normalize(pos) * (0.05 / (r - u_R + 0.1));
                    
                    // 添加微小湍流扰动
                    vec3 noiseVec = vec3(
                        sin(pos.z * 10.0 + u_Time) * 0.02,
                        cos(pos.x * 12.0 - u_Time) * 0.05, // 垂直于盘面的轻微波动
                        cos(pos.x * 10.0 + u_Time) * 0.02
                    );
                    
                    // 速度合成
                    vel = tangent * vMag + inward + noiseVec;
                }
                
                gl_FragColor = vec4(vel, 1.0);
            }
        `;

        // GPGPU: 位置更新着色器
        const computePositionShader = `
            uniform float u_R;
            uniform float u_DiskMin;
            uniform float u_DiskMax;
            uniform float u_Speed;
            
            float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }

            void main() {
                vec2 uv = gl_FragCoord.xy / resolution.xy;
                vec4 posData = texture2D(texturePosition, uv);
                vec3 pos = posData.xyz;
                
                vec4 velData = texture2D(textureVelocity, uv);
                vec3 vel = velData.xyz;
                
                pos += vel * 0.016 * u_Speed;
                
                float r = length(pos);
                // 粒子落入视界或飞离吸积盘，进行重置
                if(r < u_R || r > u_DiskMax) {
                    float angle = hash(uv * pos.xy) * 2.0 * 3.1415926;
                    float radius = mix(u_DiskMin, u_DiskMax, pow(hash(uv.yx), 1.5)); // 更多粒子集中在内侧
                    pos = vec3(cos(angle) * radius, (hash(uv)-0.5)*0.1, sin(angle) * radius);
                }
                
                gl_FragColor = vec4(pos, 1.0);
            }
        `;

        // 粒子渲染: 顶点着色器
        const particleVertexShader = `
            uniform sampler2D u_posTexture;
            uniform sampler2D u_velTexture;
            uniform vec3 u_cameraPos;
            uniform float u_dopplerFactor;
            
            varying vec3 vColor;
            
            void main() {
                vec4 posData = texture2D(u_posTexture, position.xy);
                vec4 velData = texture2D(u_velTexture, position.xy);
                
                vec3 worldPos = posData.xyz;
                vec3 vel = velData.xyz;
                
                vec4 mvPosition = modelViewMatrix * vec4(worldPos, 1.0);
                gl_Position = projectionMatrix * mvPosition;
                
                // 大小衰减
                gl_PointSize = 2.0 * (10.0 / -mvPosition.z);
                
                // 多普勒效应计算 (点乘相机方向与速度方向)
                vec3 viewDir = normalize(u_cameraPos - worldPos);
                vec3 velDir = normalize(vel);
                float dopplerShift = dot(viewDir, velDir); // >0 为朝向(蓝移), <0 为背离(红移)
                
                // 基础色彩映射 (内侧蓝白, 外侧红橙)
                float r = length(worldPos);
                float heat = smoothstep(5.0, 1.5, r);
                vec3 baseColor = mix(vec3(0.8, 0.2, 0.0), vec3(0.8, 0.9, 1.0), heat);
                
                // 应用相对论性光束效应调整亮度和颜色
                float dopplerMultiplier = 1.0 + dopplerShift * u_dopplerFactor;
                dopplerMultiplier = max(0.1, dopplerMultiplier); // 限制最低亮度
                
                vec3 shiftColor = dopplerShift > 0.0 ? vec3(0.2, 0.5, 1.0) : vec3(1.0, 0.2, 0.0);
                vColor = mix(baseColor, shiftColor, abs(dopplerShift) * 0.5) * dopplerMultiplier;
            }
        `;

        // 粒子渲染: 片元着色器
        const particleFragmentShader = `
            varying vec3 vColor;
            void main() {
                // 圆形粒子遮罩
                vec2 pt = gl_PointCoord - vec2(0.5);
                if(dot(pt, pt) > 0.25) discard;
                
                // 核心高亮，边缘衰减
                float alpha = smoothstep(0.5, 0.0, length(pt));
                gl_FragColor = vec4(vColor, alpha * 0.8);
            }
        `;

        // 后处理: 引力透镜 (屏幕空间近似)
        const LensingShader = {
            uniforms: {
                "tDiffuse": { value: null },
                "u_aspect": { value: 1.0 },
                "u_bhCenter": { value: new THREE.Vector2(0.5, 0.5) },
                "u_bhRadius": { value: 0.1 } // 屏幕空间的视网膜半径
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float u_aspect;
                uniform vec2 u_bhCenter;
                uniform float u_bhRadius;
                varying vec2 vUv;

                void main() {
                    vec2 uv = vUv;
                    vec2 delta = uv - u_bhCenter;
                    delta.x *= u_aspect;
                    
                    float dist = length(delta);
                    
                    // 视界内部处理：全黑，产生光子环截断
                    if(dist < u_bhRadius) {
                        gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
                        return;
                    }
                    
                    // 屏幕空间史瓦西透镜近似: alpha = 4GM / (c^2 * b)
                    // 简化为坐标偏移: offset = (R^2 / r^2) * r_vec
                    float lensingForce = (u_bhRadius * u_bhRadius) / dist;
                    vec2 offset = normalize(delta) * lensingForce;
                    offset.x /= u_aspect; // 还原宽高比
                    
                    vec2 sampleUV = uv - offset * 0.8; // 采样被弯曲的远端像素
                    
                    // 光子环辉光衰减
                    vec4 color = texture2D(tDiffuse, sampleUV);
                    float ringGlow = smoothstep(u_bhRadius * 1.5, u_bhRadius, dist);
                    color += vec4(0.8, 0.9, 1.0, 1.0) * ringGlow * 0.2;
                    
                    gl_FragColor = color;
                }
            `
        };

        init();
        animate();

        // ---- Theme & UI Controls ----
        PSUTheme.createSwitcher();
        PSUTheme.createBackButton('index.html');

        const sliderSpeed = document.getElementById('slider-speed');
        const sliderDoppler = document.getElementById('slider-doppler');
        const sliderGmass = document.getElementById('slider-gmass');
        const sliderLensing = document.getElementById('slider-lensing');

        sliderSpeed.addEventListener('input', () => {
            const v = parseFloat(sliderSpeed.value);
            document.getElementById('val-speed').textContent = v.toFixed(2) + 'x';
            if (posVariable) posVariable.material.uniforms.u_Speed.value = v;
        });
        sliderDoppler.addEventListener('input', () => {
            const v = parseFloat(sliderDoppler.value);
            document.getElementById('val-doppler').textContent = v.toFixed(2);
            if (particleSystem) particleSystem.material.uniforms.u_dopplerFactor.value = v;
        });
        sliderGmass.addEventListener('input', () => {
            const v = parseFloat(sliderGmass.value);
            document.getElementById('val-gmass').textContent = v.toFixed(2);
            if (velVariable) velVariable.material.uniforms.u_GM.value = v;
        });
        sliderLensing.addEventListener('input', () => {
            const v = parseInt(sliderLensing.value);
            document.getElementById('val-lensing').textContent = v ? 'ON' : 'OFF';
            if (lensingPass) lensingPass.enabled = !!v;
        });

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 2, 8);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 限制像素比以保性能
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.maxDistance = 20;
            controls.minDistance = 3;

            initGPGPU();
            initParticles();
            initPostProcessing();

            window.addEventListener('resize', onWindowResize);
            document.getElementById('info').innerText = `粒子数: ${PARAMS.PARTICLE_RES * PARAMS.PARTICLE_RES} | 可滚动鼠标缩放观察多普勒/引力透镜`;
        }

        function initGPGPU() {
            gpuCompute = new GPUComputationRenderer(PARAMS.PARTICLE_RES, PARAMS.PARTICLE_RES, renderer);
            
            const dtPosition = gpuCompute.createTexture();
            const dtVelocity = gpuCompute.createTexture();
            
            // 初始化粒子位置与速度
            const posArray = dtPosition.image.data;
            const velArray = dtVelocity.image.data;
            
            for (let i = 0; i < posArray.length; i += 4) {
                const angle = Math.random() * Math.PI * 2;
                const radius = PARAMS.DISK_MIN + Math.pow(Math.random(), 1.5) * (PARAMS.DISK_MAX - PARAMS.DISK_MIN);
                
                posArray[i + 0] = Math.cos(angle) * radius;
                posArray[i + 1] = (Math.random() - 0.5) * 0.1; // 极薄的盘面
                posArray[i + 2] = Math.sin(angle) * radius;
                posArray[i + 3] = 1;
                
                velArray[i + 0] = 0;
                velArray[i + 1] = 0;
                velArray[i + 2] = 0;
                velArray[i + 3] = 1;
            }
            
            velVariable = gpuCompute.addVariable("textureVelocity", computeVelocityShader, dtVelocity);
            posVariable = gpuCompute.addVariable("texturePosition", computePositionShader, dtPosition);
            
            gpuCompute.setVariableDependencies(velVariable, [posVariable, velVariable]);
            gpuCompute.setVariableDependencies(posVariable, [posVariable, velVariable]);
            
            velVariable.material.uniforms.u_GM = { value: PARAMS.G_MASS };
            velVariable.material.uniforms.u_R = { value: PARAMS.BH_RADIUS };
            velVariable.material.uniforms.u_Time = { value: 0.0 };
            
            posVariable.material.uniforms.u_R = { value: PARAMS.BH_RADIUS };
            posVariable.material.uniforms.u_DiskMin = { value: PARAMS.DISK_MIN };
            posVariable.material.uniforms.u_DiskMax = { value: PARAMS.DISK_MAX };
            posVariable.material.uniforms.u_Speed = { value: 1.0 };
            
            const error = gpuCompute.init();
            if (error !== null) {
                console.error(error);
                document.getElementById('info').innerText = "GPGPU 初始化失败: 硬件不支持";
            }
        }

        function initParticles() {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARAMS.PARTICLE_RES * PARAMS.PARTICLE_RES * 3);
            const uvs = new Float32Array(PARAMS.PARTICLE_RES * PARAMS.PARTICLE_RES * 2);
            
            let p = 0;
            for (let j = 0; j < PARAMS.PARTICLE_RES; j++) {
                for (let i = 0; i < PARAMS.PARTICLE_RES; i++) {
                    uvs[p++] = i / (PARAMS.PARTICLE_RES - 1);
                    uvs[p++] = j / (PARAMS.PARTICLE_RES - 1);
                }
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(uvs, 2)); // 传入 UV 作为 position
            
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    u_posTexture: { value: null },
                    u_velTexture: { value: null },
                    u_cameraPos: { value: new THREE.Vector3() },
                    u_dopplerFactor: { value: PARAMS.DOPPLER_FACTOR }
                },
                vertexShader: particleVertexShader,
                fragmentShader: particleFragmentShader,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true
            });
            
            particleSystem = new THREE.Points(geometry, material);
            // 禁用包围盒剔除，因为顶点是在着色器中计算的
            particleSystem.frustumCulled = false; 
            scene.add(particleSystem);
        }

        function initPostProcessing() {
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            
            lensingPass = new ShaderPass(LensingShader);
            lensingPass.uniforms['u_aspect'].value = window.innerWidth / window.innerHeight;
            composer.addPass(lensingPass);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            lensingPass.uniforms['u_aspect'].value = window.innerWidth / window.innerHeight;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();
            
            // 运行 GPGPU 步进
            velVariable.material.uniforms.u_Time.value = performance.now() * 0.001;
            gpuCompute.compute();
            
            // 将 GPGPU 结果纹理传给粒子系统
            particleSystem.material.uniforms.u_posTexture.value = gpuCompute.getCurrentRenderTarget(posVariable).texture;
            particleSystem.material.uniforms.u_velTexture.value = gpuCompute.getCurrentRenderTarget(velVariable).texture;
            particleSystem.material.uniforms.u_cameraPos.value.copy(camera.position);
            
            // 计算屏幕空间的黑洞参数用于后处理
            // 黑洞中心在世界坐标 (0,0,0)
            const bhPosition = new THREE.Vector3(0, 0, 0);
            bhPosition.project(camera);
            const screenX = (bhPosition.x + 1) / 2;
            const screenY = (bhPosition.y + 1) / 2;
            
            // 计算屏幕空间的视界半径 (基础三角学近似)
            const dist = camera.position.length();
            const fov = camera.fov * (Math.PI / 180);
            const visibleHeight = 2 * Math.tan(fov / 2) * dist;
            const screenRadius = (PARAMS.BH_RADIUS * 2 / visibleHeight) * 0.5;
            
            lensingPass.uniforms['u_bhCenter'].value.set(screenX, screenY);
            lensingPass.uniforms['u_bhRadius'].value = screenRadius;
            
            composer.render();
        }
    </script>
</body>
</html>

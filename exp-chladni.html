<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>克拉尼图形 - 物理沙盒宇宙</title>
  <link rel="stylesheet" href="shared-theme.css">
  <style>
    .exp-bg { z-index: -1; }
    #sim-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
    #ui-panel {
      position: absolute;
      top: 80px;
      left: 30px;
      width: 300px;
      padding: 20px;
      z-index: 10;
    }
    h1 { margin: 0; font-size: 1.5rem; transition: var(--theme-transition); }
    p.desc { color: var(--text-muted); font-size: 0.85rem; margin: 8px 0 15px 0; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.9rem; margin: 15px 0 5px; font-weight: bold; }
    .val-display { font-family: monospace; }

    [data-theme="cartoon"] h1 { color: var(--accent-2); text-shadow: 1px 1px 0 rgba(0,0,0,0.1); }
    [data-theme="cartoon"] .val-display { color: var(--accent-2); }

    [data-theme="glass"] h1 { color: #00f3ff; text-shadow: 0 0 10px rgba(0,243,255,0.3); }
    [data-theme="glass"] .val-display { color: #74b9ff; }

    [data-theme="cyber"] h1 { color: #00f3ff; text-shadow: 0 0 15px rgba(0,243,255,0.5); }
    [data-theme="cyber"] .val-display { color: #00f3ff; }
  </style>
</head>
<body>
  <div class="exp-bg"></div>
  <canvas id="sim-canvas"></canvas>

  <div id="ui-panel" class="glass-panel">
    <h1>CHLADNI FIGURES</h1>
    <p class="desc">二维驻波：克拉尼几何共振场</p>
    <div class="slider-group">
      <label><span>模态 N</span><span id="vn" class="val-display">3</span></label>
      <input type="range" id="sn" min="1" max="10" value="3">
    </div>
    <div class="slider-group">
      <label><span>模态 M</span><span id="vm" class="val-display">5</span></label>
      <input type="range" id="sm" min="1" max="10" value="5">
    </div>
    <button class="theme-btn" onclick="scatter()">重新撒沙</button>
  </div>

  <script src="shared-theme.js"></script>
  <script>
    PSUTheme.createSwitcher();
    PSUTheme.createBackButton('index.html');

    const canvas = document.getElementById('sim-canvas'), ctx = canvas.getContext('2d');
    const sn = document.getElementById('sn'), sm = document.getElementById('sm');
    const NUM = 30000;
    const px = new Float32Array(NUM), py = new Float32Array(NUM), vx = new Float32Array(NUM), vy = new Float32Array(NUM);
    let tn = 3, tm = 5, cn = 3, cm = 5;
    let animationId = null;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    function scatter() { for(let i=0;i<NUM;i++){ px[i]=(Math.random()*2)-1; py[i]=(Math.random()*2)-1; vx[i]=0; vy[i]=0; } }
    scatter();

    function getThemeColors() {
      const theme = document.documentElement.getAttribute('data-theme') || 'cyber';
      if (theme === 'cartoon') {
        return { fade: 'rgba(254, 246, 228, 0.2)', particle: 'rgba(78, 205, 196, 0.5)' };
      } else if (theme === 'glass') {
        return { fade: 'rgba(15, 17, 23, 0.2)', particle: 'rgba(116, 185, 255, 0.5)' };
      } else {
        return { fade: 'rgba(3, 3, 5, 0.2)', particle: 'rgba(0, 243, 255, 0.5)' };
      }
    }

    function loop() {
      document.getElementById('vn').innerText = tn = parseInt(sn.value);
      document.getElementById('vm').innerText = tm = parseInt(sm.value);
      cn += (tn - cn)*0.05; cm += (tm - cm)*0.05;
      for(let i=0; i<NUM; i++) {
        let x = px[i], y = py[i], dx = vx[i], dy = vy[i], xpi = x*Math.PI, ypi = y*Math.PI;
        let val = Math.cos(cn*xpi)*Math.cos(cm*ypi) - Math.cos(cm*xpi)*Math.cos(cn*ypi);
        let gx = -cn*Math.sin(cn*xpi)*Math.cos(cm*ypi) + cm*Math.sin(cm*xpi)*Math.cos(cn*ypi);
        let gy = -cm*Math.cos(cn*xpi)*Math.sin(cm*ypi) + cn*Math.cos(cm*xpi)*Math.sin(cn*ypi);
        dx -= 2*val*gx * 0.015; dy -= 2*val*gy * 0.015;
        dx += (Math.random()-0.5)*Math.abs(val)*0.08; dy += (Math.random()-0.5)*Math.abs(val)*0.08;
        dx *= 0.85; dy *= 0.85; x += dx; y += dy;
        if(x<-1){x=-1;dx*=-0.5;} if(x>1){x=1;dx*=-0.5;} if(y<-1){y=-1;dy*=-0.5;} if(y>1){y=1;dy*=-0.5;}
        px[i]=x; py[i]=y; vx[i]=dx; vy[i]=dy;
      }
      const colors = getThemeColors();
      ctx.fillStyle = colors.fade; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.globalCompositeOperation = 'lighter'; ctx.fillStyle = colors.particle; ctx.beginPath();
      let size = Math.min(canvas.width, canvas.height)*0.9, offX = (canvas.width-size)/2, offY = (canvas.height-size)/2;
      for(let i=0; i<NUM; i++) ctx.rect(offX + ((px[i]+1)/2)*size, offY + ((py[i]+1)/2)*size, 1.2, 1.2);
      ctx.fill(); ctx.globalCompositeOperation = 'source-over';
      animationId = requestAnimationFrame(loop);
    }
    loop();
    window.addEventListener('beforeunload', () => cancelAnimationFrame(animationId));
  </script>
</body>
</html>

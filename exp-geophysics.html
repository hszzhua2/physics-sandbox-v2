<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地球物理 3D — Geophysics Explorer | 物理沙盒宇宙</title>
<link rel="stylesheet" href="shared-theme.css">
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
/* ================================================================ THEME VARS */
[data-theme="glass"]{
  --g-bg:#080812; --g-bg2:#0e0e1c; --g-surface:rgba(255,255,255,0.04); --g-surface-hover:rgba(255,255,255,0.08);
  --g-ink:#f1f5f9; --g-ink2:#cbd5e1; --g-muted:#64748b; --g-rule:rgba(255,255,255,0.07);
  --g-accent:#74b9ff; --g-accent2:#a29bfe; --g-accent3:#34d399; --g-accent4:#fbbf24;
  --g-card-bg:rgba(255,255,255,0.03); --g-card-border:rgba(255,255,255,0.06);
  --g-canvas-bg:#040410; --g-param-bg:rgba(255,255,255,0.03); --g-param-border:rgba(255,255,255,0.06);
  --g-output-bg:rgba(0,0,0,0.3); --g-output-border:rgba(255,255,255,0.06);
  --g-formula-bg:rgba(116,185,255,0.05); --g-formula-border:rgba(116,185,255,0.12);
  --g-scrollbar:rgba(116,185,255,0.3); --g-glow:none;
  --g-crust:#8b6914; --g-mantle:#c0392b; --g-outercore:#e67e22; --g-innercore:#f1c40f;
  --g-pwave:#74b9ff; --g-swave:#e74c3c; --g-magfield:#a29bfe; --g-plate:#2ecc71;
}
[data-theme="cyber"]{
  --g-bg:#040410; --g-bg2:#08081a; --g-surface:rgba(0,243,255,0.03); --g-surface-hover:rgba(0,243,255,0.06);
  --g-ink:#e0f7fa; --g-ink2:#b2ebf2; --g-muted:#4dd0e1; --g-rule:rgba(0,243,255,0.1);
  --g-accent:#00f3ff; --g-accent2:#ff00ea; --g-accent3:#39ff14; --g-accent4:#ffb800;
  --g-card-bg:rgba(0,243,255,0.02); --g-card-border:rgba(0,243,255,0.12);
  --g-canvas-bg:#020208; --g-param-bg:rgba(0,243,255,0.02); --g-param-border:rgba(0,243,255,0.1);
  --g-output-bg:rgba(0,0,0,0.4); --g-output-border:rgba(0,243,255,0.08);
  --g-formula-bg:rgba(0,243,255,0.04); --g-formula-border:rgba(0,243,255,0.15);
  --g-scrollbar:rgba(0,243,255,0.4); --g-glow:0 0 8px rgba(0,243,255,0.25);
  --g-crust:#ffb800; --g-mantle:#ff00ea; --g-outercore:#00f3ff; --g-innercore:#39ff14;
  --g-pwave:#00f3ff; --g-swave:#ff00ea; --g-magfield:#bd00ff; --g-plate:#39ff14;
}
[data-theme="soviet"]{
  --g-bg:#f0ebe4; --g-bg2:#e8e0d6; --g-surface:#fffaf2; --g-surface-hover:#f4f0ea;
  --g-ink:#1a1a1a; --g-ink2:#3d3d3d; --g-muted:#6a5a4a; --g-rule:#d4c4a8;
  --g-accent:#c41e1e; --g-accent2:#8b4513; --g-accent3:#a0522d; --g-accent4:#cd853f;
  --g-card-bg:#fffaf2; --g-card-border:#c41e1e;
  --g-canvas-bg:#e8e0d6; --g-param-bg:#f4f0ea; --g-param-border:#d4c4a8;
  --g-output-bg:#f4f0ea; --g-output-border:#d4c4a8;
  --g-formula-bg:rgba(196,30,30,0.04); --g-formula-border:rgba(196,30,30,0.2);
  --g-scrollbar:#c41e1e; --g-glow:none;
  --g-crust:#8b6914; --g-mantle:#c41e1e; --g-outercore:#cd853f; --g-innercore:#daa520;
  --g-pwave:#c41e1e; --g-swave:#556b2f; --g-magfield:#8b4513; --g-plate:#556b2f;
}
[data-theme="cartoon"]{
  --g-bg:#fef6e4; --g-bg2:#fff8f0; --g-surface:rgba(255,255,255,0.7); --g-surface-hover:rgba(255,255,255,0.9);
  --g-ink:#2d3436; --g-ink2:#4a4a4a; --g-muted:#7a7a7a; --g-rule:rgba(0,0,0,0.08);
  --g-accent:#ff6b6b; --g-accent2:#4ecdc4; --g-accent3:#ffe66d; --g-accent4:#a29bfe;
  --g-card-bg:rgba(255,255,255,0.8); --g-card-border:rgba(0,0,0,0.1);
  --g-canvas-bg:#1a1a2e; --g-param-bg:rgba(255,255,255,0.5); --g-param-border:rgba(0,0,0,0.1);
  --g-output-bg:rgba(255,255,255,0.6); --g-output-border:rgba(0,0,0,0.08);
  --g-formula-bg:rgba(255,107,107,0.05); --g-formula-border:rgba(255,107,107,0.15);
  --g-scrollbar:rgba(0,0,0,0.15); --g-glow:none;
  --g-crust:#d4a017; --g-mantle:#ff6b6b; --g-outercore:#ffa502; --g-innercore:#ffe66d;
  --g-pwave:#4ecdc4; --g-swave:#ff6b6b; --g-magfield:#a29bfe; --g-plate:#26de81;
}
[data-theme="academic"]{
  --g-bg:#f8f9fa; --g-bg2:#f1f3f5; --g-surface:rgba(255,255,255,0.9); --g-surface-hover:#f0f0f0;
  --g-ink:#1a1a2e; --g-ink2:#3d3d5c; --g-muted:#7a7a8a; --g-rule:#e0e0e0;
  --g-accent:#6b8cae; --g-accent2:#8a7ca8; --g-accent3:#c4956a; --g-accent4:#6a9e8a;
  --g-card-bg:#ffffff; --g-card-border:#e0e0e0;
  --g-canvas-bg:#000000; --g-param-bg:#f8f9fa; --g-param-border:#e0e0e0;
  --g-output-bg:#f4f5f7; --g-output-border:#e0e0e0;
  --g-formula-bg:rgba(107,140,174,0.04); --g-formula-border:rgba(107,140,174,0.2);
  --g-scrollbar:#d0d0d0; --g-glow:none;
  --g-crust:#b8860b; --g-mantle:#cd5c5c; --g-outercore:#daa520; --g-innercore:#ffd700;
  --g-pwave:#6b8cae; --g-swave:#cd5c5c; --g-magfield:#8a7ca8; --g-plate:#6a9e8a;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:var(--font-main,'Segoe UI','Microsoft YaHei',system-ui,sans-serif);background:var(--g-bg);color:var(--g-ink);line-height:1.6;overflow:hidden;height:100vh;transition:background-color .5s ease,color .4s ease,border-color .4s ease}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--g-bg)}
::-webkit-scrollbar-thumb{background:var(--g-scrollbar);border-radius:999px}
[data-theme="soviet"] ::-webkit-scrollbar-thumb{border-radius:0}

.app{display:flex;height:calc(100vh - 52px);padding-top:52px}

/* ===== LEFT PANEL ===== */
.left-panel{width:300px;min-width:280px;border-right:1px solid var(--g-rule);background:var(--g-bg2);overflow-y:auto;transition:background-color .5s ease,border-color .4s ease}
.lp-header{padding:14px 18px 10px;border-bottom:1px solid var(--g-rule);display:flex;align-items:center;gap:10px}
.lp-header .lp-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;background:var(--g-formula-bg);border:1px solid var(--g-formula-border)}
.lp-header h1{font-size:.92rem;font-weight:700}
.lp-header .lp-sub{font-size:.68rem;color:var(--g-muted);margin-top:1px}
[data-theme="academic"] .left-panel{background:#fff;border-right:1px solid #e0e0e0}
[data-theme="cartoon"] .left-panel{background:rgba(255,248,240,0.9);border-right:2px solid rgba(0,0,0,0.06)}
[data-theme="soviet"] .left-panel{background:#fffaf2;border-right:2px solid #c41e1e}
[data-theme="cartoon"] .lp-header .lp-icon{background:rgba(255,107,107,0.12);border-color:rgba(255,107,107,0.15)}
[data-theme="cartoon"] .lp-header h1{color:var(--g-accent)}
[data-theme="cyber"] .lp-header .lp-icon{background:rgba(189,0,255,0.15);border-color:rgba(0,243,255,0.2)}
[data-theme="cyber"] .lp-header h1{color:var(--g-accent);text-shadow:var(--g-glow)}
[data-theme="soviet"] .lp-header h1{color:var(--g-accent)}

.side-section{padding:18px 20px;border-bottom:1px solid var(--g-rule);transition:border-color .4s ease}
.side-section:last-child{border-bottom:none}
.section-label{font-family:monospace;font-size:.68rem;text-transform:uppercase;letter-spacing:2.5px;color:var(--g-accent);margin-bottom:14px;display:flex;align-items:center;gap:8px;transition:color .4s ease}
.section-label::before{content:'';width:3px;height:14px;background:var(--g-accent);border-radius:2px;transition:background .4s ease}

/* Mode buttons */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mode-btn{padding:9px 4px;border:1px solid var(--g-param-border);background:var(--g-param-bg);color:var(--g-muted);border-radius:8px;font-size:.72rem;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;transition:all .3s ease}
.mode-btn.active{border-color:var(--g-accent);color:var(--g-accent);background:var(--g-formula-bg)}
.mode-btn:hover{border-color:var(--g-accent)}
[data-theme="academic"] .mode-btn{background:#f4f5f7;border-color:#e0e0e0;color:#666;border-radius:4px}
[data-theme="academic"] .mode-btn.active{border-color:#6b8cae;color:#1a1a2e;background:#e8ecf1}
[data-theme="soviet"] .mode-btn{background:#f4f0ea;border-color:#d4c4a8;color:#6a5a4a;border-radius:2px}
[data-theme="soviet"] .mode-btn.active{border-color:#c41e1e;color:#c41e1e;background:#fffaf2}

/* Toggle layer buttons */
.layer-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.toggle-btn{padding:8px 6px;border:1px solid var(--g-param-border);background:var(--g-param-bg);color:var(--g-muted);border-radius:8px;font-size:.72rem;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .3s ease;user-select:none}
.toggle-btn .dot{width:7px;height:7px;border-radius:50%;background:var(--g-muted);transition:background .3s ease}
.toggle-btn.active{border-color:var(--g-accent);color:var(--g-accent);background:var(--g-formula-bg)}
.toggle-btn.active .dot{background:var(--g-accent)}
.toggle-btn:hover{border-color:var(--g-accent)}
[data-theme="academic"] .toggle-btn{background:#f4f5f7;border-color:#e0e0e0;color:#666;border-radius:4px}
[data-theme="academic"] .toggle-btn.active{border-color:#6b8cae;color:#1a1a2e;background:#e8ecf1}
[data-theme="soviet"] .toggle-btn{background:#f4f0ea;border-color:#d4c4a8;color:#6a5a4a;border-radius:2px}
[data-theme="soviet"] .toggle-btn.active{border-color:#c41e1e;color:#c41e1e;background:#fffaf2}

/* Texture tabs */
.tex-tabs{display:flex;gap:6px}
.tex-tab{flex:1;padding:8px 4px;border:1px solid var(--g-param-border);background:var(--g-param-bg);color:var(--g-muted);border-radius:8px;font-size:.72rem;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;transition:all .3s ease}
.tex-tab.active{border-color:var(--g-accent);color:var(--g-accent);background:var(--g-formula-bg)}
.tex-tab:hover{border-color:var(--g-accent)}
[data-theme="academic"] .tex-tab{background:#f4f5f7;border-color:#e0e0e0;color:#666;border-radius:4px}
[data-theme="academic"] .tex-tab.active{border-color:#6b8cae;color:#1a1a2e;background:#e8ecf1}
[data-theme="soviet"] .tex-tab{background:#f4f0ea;border-color:#d4c4a8;color:#6a5a4a;border-radius:2px}
[data-theme="soviet"] .tex-tab.active{border-color:#c41e1e;color:#c41e1e;background:#fffaf2}

/* Params */
.param-group{margin-bottom:14px}.param-group:last-child{margin-bottom:0}
.param-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.param-label{font-size:.82rem;font-weight:600;color:var(--g-ink2);transition:color .4s ease}
.param-value{font-family:monospace;font-size:.78rem;color:var(--g-accent);min-width:60px;text-align:right}
input[type="range"]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--g-param-border);outline:none;transition:background .4s ease}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--g-accent);cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
[data-theme="academic"] input[type="range"]{height:3px;border-radius:0;background:#e0e0e0}
[data-theme="academic"] input[type="range"]::-webkit-slider-thumb{width:14px;height:14px;border-radius:0;background:#1a1a2e;box-shadow:none}
[data-theme="soviet"] input[type="range"]{height:4px;border-radius:0;background:#d4c4a8}
[data-theme="soviet"] input[type="range"]::-webkit-slider-thumb{width:16px;height:16px;border-radius:0;background:#c41e1e;box-shadow:none}

.hint-text{font-size:.72rem;color:var(--g-muted);margin-top:8px;line-height:1.5}

/* Info card */
.info-card{background:var(--g-output-bg);border:1px solid var(--g-output-border);border-radius:10px;padding:14px 16px;margin-bottom:10px;transition:background-color .5s ease,border-color .4s ease}
.info-card:last-child{margin-bottom:0}
.info-card h3{font-size:.8rem;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.info-card p{font-size:.76rem;color:var(--g-ink2);line-height:1.7;margin:4px 0}
.info-card p strong{color:var(--g-ink)}
[data-theme="academic"] .info-card{background:#f4f5f7;border-color:#e0e0e0;border-radius:4px}
[data-theme="soviet"] .info-card{background:#f4f0ea;border-color:#d4c4a8;border-radius:2px}
[data-theme="cartoon"] .info-card h3{color:var(--g-accent)}
[data-theme="cyber"] .info-card h3{color:var(--g-accent);text-shadow:var(--g-glow)}

/* ===== CENTER CANVAS ===== */
.sim-panel{flex:1;position:relative;overflow:hidden;background:var(--g-canvas-bg);transition:background-color .5s ease}
.canvas-container{position:absolute;inset:0;overflow:hidden}
.canvas-container canvas{display:block;width:100%;height:100%}
.canvas-overlay{position:absolute;top:16px;left:16px;display:flex;gap:8px;z-index:5;pointer-events:none}
.overlay-badge{padding:5px 12px;background:rgba(0,0,0,0.5);border:1px solid var(--g-rule);border-radius:8px;font-family:monospace;font-size:.7rem;color:var(--g-muted);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.canvas-controls{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:8px}
.sim-btn{padding:8px 20px;border:1px solid var(--g-rule);background:rgba(0,0,0,0.4);color:var(--g-ink);border-radius:10px;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .3s ease;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.sim-btn:hover{background:rgba(0,0,0,0.6);border-color:var(--g-accent)}
.sim-btn.primary{background:var(--g-accent);color:#0a0a1a;border-color:var(--g-accent)}
.sim-btn.primary:hover{filter:brightness(1.15)}
[data-theme="academic"] .sim-btn{background:rgba(255,255,255,0.8);border:1px solid #e0e0e0;border-radius:4px;color:#1a1a2e}
[data-theme="academic"] .sim-btn.primary{background:#6b8cae;border-color:#6b8cae;color:#fff}
[data-theme="soviet"] .sim-btn{background:rgba(255,250,242,0.8);border:1px solid #d4c4a8;border-radius:2px}
[data-theme="soviet"] .sim-btn.primary{background:#c41e1e;border-color:#c41e1e;color:#fff}
[data-theme="cartoon"] .sim-btn{background:rgba(255,255,255,0.8);border:1px solid rgba(0,0,0,0.1)}
[data-theme="cartoon"] .sim-btn.primary{background:#ff6b6b;border-color:#ff6b6b;color:#fff}
[data-theme="academic"] .overlay-badge{background:rgba(255,255,255,0.8);border:1px solid #e0e0e0;color:#7a7a8a}
[data-theme="soviet"] .overlay-badge{background:rgba(255,250,242,0.9);border:1px solid #c41e1e;color:#6a5a4a}
.scene-hint{position:absolute;bottom:14px;right:16px;font-size:.66rem;color:var(--g-muted);font-family:monospace;pointer-events:none;opacity:.6;z-index:4}

/* ===== RIGHT PANEL ===== */
.right-panel{width:380px;min-width:340px;border-left:1px solid var(--g-rule);background:var(--g-bg2);overflow-y:auto;transition:background-color .5s ease,border-color .4s ease}
.rp-header{padding:14px 18px 10px;border-bottom:1px solid var(--g-rule);display:flex;align-items:center;gap:10px}
.rp-header .rp-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;background:var(--g-formula-bg);border:1px solid var(--g-formula-border)}
.rp-header h2{font-size:.92rem;font-weight:700}
.rp-header .rp-sub{font-size:.68rem;color:var(--g-muted);margin-top:1px}
[data-theme="academic"] .right-panel{background:#fff;border-left:1px solid #e0e0e0}
[data-theme="cartoon"] .right-panel{background:rgba(255,248,240,0.9);border-left:2px solid rgba(0,0,0,0.06)}
[data-theme="soviet"] .right-panel{background:#fffaf2;border-left:2px solid #c41e1e}
[data-theme="cartoon"] .rp-header .rp-icon{background:rgba(78,205,196,0.12);border-color:rgba(78,205,196,0.15)}
[data-theme="cartoon"] .rp-header h2{color:var(--g-accent2)}
[data-theme="cyber"] .rp-header h2{color:var(--g-accent);text-shadow:var(--g-glow)}
[data-theme="soviet"] .rp-header h2{color:var(--g-accent)}

/* Output cards */
.output-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.output-card{background:var(--g-output-bg);border:1px solid var(--g-output-border);border-radius:10px;padding:10px 12px;text-align:center;transition:background-color .5s ease,border-color .4s ease}
.output-num{font-family:monospace;font-size:1.05rem;font-weight:700;color:var(--g-accent);line-height:1.2}
.output-num.b{color:var(--g-accent2)}.output-num.c{color:var(--g-accent3)}.output-num.d{color:var(--g-accent4)}
.output-label{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--g-muted);margin-top:2px}
[data-theme="academic"] .output-card{background:#f4f5f7;border-color:#e0e0e0;border-radius:4px}
[data-theme="soviet"] .output-card{background:#f4f0ea;border-color:#d4c4a8;border-radius:2px}

/* Layer table */
.layer-table{width:100%;border-collapse:collapse;font-size:.74rem}
.layer-table th{text-align:left;padding:6px 8px;border-bottom:1px solid var(--g-rule);color:var(--g-muted);font-weight:600;font-size:.68rem;text-transform:uppercase;letter-spacing:1px}
.layer-table td{padding:6px 8px;border-bottom:1px solid var(--g-rule);color:var(--g-ink2)}
.layer-table tr:last-child td{border-bottom:none}
.layer-table .layer-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}

/* Formula block */
.formula-block{background:var(--g-formula-bg);border:1px solid var(--g-formula-border);border-radius:10px;padding:12px 14px;margin-bottom:10px;transition:background-color .5s ease,border-color .4s ease}
.formula-block:last-child{margin-bottom:0}
.formula-title{font-size:.78rem;font-weight:700;color:var(--g-ink);margin-bottom:6px}
.formula-expr{font-family:monospace;font-size:.76rem;color:var(--g-accent2);line-height:1.8;white-space:pre-wrap}
.formula-desc{font-size:.76rem;color:var(--g-muted);margin-top:6px;line-height:1.6}
.formula-desc strong{color:var(--g-ink2)}
[data-theme="academic"] .formula-block{background:#f8f9fa;border-color:#e0e0e0;border-radius:4px}
[data-theme="soviet"] .formula-block{background:#fffaf2;border-color:#d4c4a8;border-radius:2px}

/* Quiz */
.quiz-box{background:var(--g-output-bg);border:1px solid var(--g-output-border);border-radius:10px;padding:14px;transition:background-color .5s ease,border-color .4s ease}
.quiz-q{font-size:.8rem;font-weight:600;color:var(--g-ink);margin-bottom:10px;line-height:1.5}
.quiz-opts{display:flex;flex-direction:column;gap:6px}
.quiz-opt{padding:8px 12px;border:1px solid var(--g-param-border);background:var(--g-param-bg);border-radius:8px;font-size:.76rem;color:var(--g-ink2);cursor:pointer;transition:all .2s ease}
.quiz-opt:hover{border-color:var(--g-accent);color:var(--g-accent)}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ================================================================ THEME COLORS */
function getThemeColors(){
  let theme = document.documentElement.getAttribute('data-theme');
  if(!theme){ try { theme = localStorage.getItem('psu-theme-v1') || 'academic'; } catch(e){ theme = 'academic'; } }
  const map = {
    'glass':    { bg:0x040410, grid:0x64ffda, axis:0xef4444, accent:0x74b9ff, sun:0xffe066, star:0xffffff },
    'cyber':    { bg:0x020208, grid:0x00f3ff, axis:0xff00ea, accent:0x00f3ff, sun:0xffb800, star:0xe0f7fa },
    'soviet':   { bg:0xe8e0d6, grid:0xc41e1e, axis:0xc41e1e, accent:0xc41e1e, sun:0xdaa520, star:0x6a5a4a },
    'cartoon':  { bg:0x1a1a2e, grid:0x4ecdc4, axis:0xff6b6b, accent:0xff6b6b, sun:0xffe66d, star:0xffffff },
    'academic': { bg:0x000000, grid:0x6b8cae, axis:0xe74c3c, accent:0x6b8cae, sun:0xffd700, star:0xffffff },
  };
  return map[theme] || map['academic'];
}
function getThemeHex(name){
  const c = getThemeColors();
  return '#' + c[name].toString(16).padStart(6,'0');
}

/* ================================================================ STATE */
const options = { grid:true, axis:true, sun:true, twilight:true, cities:true, rotation:true, climate:true, stars:true };
let currentMode = 'surface';
let rotationSpeed = 1.0;
let axisTilt = 23.5;
let sunHeight = 20;
let textureType = 'satellite';
let isUserInteracting = false;

const simTime = { hours:0, fps:60, fpsCount:0, fpsTimer:0, lastFrame:0 };

/* ================================================================ CITY DATA */
const cities = [
  {n:'北京', lon:116.4, lat:39.9}, {n:'上海', lon:121.5, lat:31.2},
  {n:'东京', lon:139.7, lat:35.7}, {n:'首尔', lon:127.0, lat:37.6},
  {n:'香港', lon:114.2, lat:22.3}, {n:'新加坡', lon:103.8, lat:1.4},
  {n:'曼谷', lon:100.5, lat:13.8}, {n:'雅加达', lon:106.8, lat:-6.2},
  {n:'孟买', lon:72.9, lat:19.1},  {n:'新德里', lon:77.2, lat:28.6},
  {n:'迪拜', lon:55.3, lat:25.3},  {n:'德黑兰', lon:51.4, lat:35.7},
  {n:'莫斯科', lon:37.6, lat:55.8},{n:'伊斯坦布尔', lon:29.0, lat:41.0},
  {n:'开罗', lon:31.2, lat:30.0},  {n:'约翰内斯堡', lon:28.0, lat:-26.2},
  {n:'拉各斯', lon:3.4, lat:6.5},  {n:'内罗毕', lon:36.8, lat:-1.3},
  {n:'伦敦', lon:-0.1, lat:51.5},  {n:'巴黎', lon:2.4, lat:48.9},
  {n:'柏林', lon:13.4, lat:52.5},  {n:'罗马', lon:12.5, lat:41.9},
  {n:'马德里', lon:-3.7, lat:40.4},{n:'纽约', lon:-74.0, lat:40.7},
  {n:'洛杉矶', lon:-118.2, lat:34.1},{n:'芝加哥', lon:-87.6, lat:41.9},
  {n:'多伦多', lon:-79.4, lat:43.7},{n:'墨西哥城', lon:-99.1, lat:19.4},
  {n:'里约热内卢', lon:-43.2, lat:-22.9},{n:'圣保罗', lon:-46.6, lat:-23.5},
  {n:'布宜诺斯艾利斯', lon:-58.4, lat:-34.6},{n:'悉尼', lon:151.2, lat:-33.9},
  {n:'墨尔本', lon:144.96, lat:-37.8},{n:'奥克兰', lon:174.8, lat:-36.8},
  {n:'檀香山', lon:-157.9, lat:21.3},{n:'温哥华', lon:-123.1, lat:49.3},
  {n:'开普敦', lon:18.4, lat:-33.9},
];

/* ================================================================ HELPERS */
function lonLatToVector3(lon, lat, radius){
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
}
function vector3ToLonLat(v){
  const r = v.length();
  const lat = Math.asin(v.y / Math.max(r, 1e-6)) * 180 / Math.PI;
  const phi = Math.acos(v.y / Math.max(r, 1e-6));
  const sinPhi = Math.sin(phi);
  let lon = 0;
  if(sinPhi > 1e-6){
    let theta = Math.atan2(v.z, -v.x);
    lon = theta * 180 / Math.PI - 180;
    if(lon < -180) lon += 360;
    if(lon > 180) lon -= 360;
  }
  return { lon, lat };
}

/* ================================================================ THREE.JS SETUP */
const container = document.getElementById('canvasContainer');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
camera.position.set(0, 2, 5);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.localClippingEnabled = true;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.5;
controls.maxDistance = 15;
controls.rotateSpeed = 0.8;
controls.enablePan = true;
controls.addEventListener('start', () => { isUserInteracting = true; });
controls.addEventListener('end', () => { isUserInteracting = false; });

/* Lights */
const sunLight = new THREE.DirectionalLight(0xffffff, 1.4);
sunLight.position.set(5, 2, 0);
scene.add(sunLight);
const ambientLight = new THREE.AmbientLight(0x445566, 0.55);
scene.add(ambientLight);
const fillLight = new THREE.DirectionalLight(0x6688aa, 0.35);
fillLight.position.set(-5, -1, 2);
scene.add(fillLight);

/* ================================================================ EARTH GROUP */
const earthGroup = new THREE.Group();
scene.add(earthGroup);

const TEX_BASE = 'https://unpkg.com/three-globe@2.31.0/example/img/';
const texLoader = new THREE.TextureLoader();
texLoader.crossOrigin = 'anonymous';
const textures = {
  satellite: texLoader.load(TEX_BASE + 'earth-blue-marble.jpg'),
  topo:      texLoader.load(TEX_BASE + 'earth-topology.png'),
  political: texLoader.load(TEX_BASE + 'earth-night.jpg'),
};
const earthMaterial = new THREE.MeshPhongMaterial({ map: textures.satellite, shininess: 8, specular: 0x222233 });
const earthMesh = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 48), earthMaterial);
earthGroup.add(earthMesh);

/* ---- Sun marker (yellow sphere on surface, world-space) ---- */
const sunMarker = new THREE.Mesh(
  new THREE.SphereGeometry(0.035, 16, 12),
  new THREE.MeshBasicMaterial({ color: 0xffe066 })
);
scene.add(sunMarker);
const sunGlow = new THREE.Mesh(
  new THREE.SphereGeometry(0.07, 16, 12),
  new THREE.MeshBasicMaterial({ color: 0xffe066, transparent:true, opacity:0.25 })
);
scene.add(sunGlow);

/* ================================================================ GRID LINES */
const gridGroup = new THREE.Group();
earthGroup.add(gridGroup);
(function buildGrid(){
  const gridMat = new THREE.LineBasicMaterial({ color: 0x64ffda, transparent:true, opacity:0.35 });
  // Longitude lines every 15 deg
  for(let lon = -180; lon < 180; lon += 15){
    const pts = [];
    for(let lat = -90; lat <= 90; lat += 3){
      pts.push(lonLatToVector3(lon, lat, 1.002));
    }
    gridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
  }
  // Latitude lines every 15 deg
  for(let lat = -75; lat <= 75; lat += 15){
    const pts = [];
    for(let lon = -180; lon <= 180; lon += 3){
      pts.push(lonLatToVector3(lon, lat, 1.002));
    }
    gridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
  }
  // Equator emphasis
  const eqPts = [];
  for(let lon = -180; lon <= 180; lon += 2) eqPts.push(lonLatToVector3(lon, 0, 1.004));
  gridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(eqPts),
    new THREE.LineBasicMaterial({ color: 0x64ffda, transparent:true, opacity:0.6 })));
})();

/* ================================================================ EARTH AXIS */
const axisGroup = new THREE.Group();
earthGroup.add(axisGroup);
(function buildAxis(){
  const axisMat = new THREE.LineBasicMaterial({ color: 0xef4444 });
  const pts = [ new THREE.Vector3(0,-1.25,0), new THREE.Vector3(0,1.25,0) ];
  axisGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), axisMat));
  const npMat = new THREE.MeshBasicMaterial({ color: 0xef4444 });
  const spMat = new THREE.MeshBasicMaterial({ color: 0xef4444 });
  axisGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.03, 16, 12), npMat).translateY(1.25));
  axisGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.03, 16, 12), spMat).translateY(-1.25));
})();

/* ================================================================ CITY MARKERS */
const cityGroup = new THREE.Group();
earthGroup.add(cityGroup);
(function buildCities(){
  const mat = new THREE.MeshBasicMaterial({ color: 0xff3b3b });
  const haloMat = new THREE.MeshBasicMaterial({ color: 0xff3b3b, transparent:true, opacity:0.3 });
  for(const c of cities){
    const pos = lonLatToVector3(c.lon, c.lat, 1.012);
    const dot = new THREE.Mesh(new THREE.SphereGeometry(0.012, 10, 8), mat);
    dot.position.copy(pos);
    cityGroup.add(dot);
    const halo = new THREE.Mesh(new THREE.SphereGeometry(0.024, 10, 8), haloMat);
    halo.position.copy(pos);
    cityGroup.add(halo);
  }
})();

/* ================================================================ CLIMATE ZONES */
const climateGroup = new THREE.Group();
earthGroup.add(climateGroup);
function climateShell(lat1, lat2, color, opacity){
  const theta1 = (90 - lat1) * Math.PI / 180;
  const theta2 = (90 - lat2) * Math.PI / 180;
  const thetaStart = Math.min(theta1, theta2);
  const thetaLength = Math.abs(theta1 - theta2);
  const geo = new THREE.SphereGeometry(1.018, 48, 24, 0, Math.PI*2, thetaStart, thetaLength);
  const mat = new THREE.MeshBasicMaterial({ color, transparent:true, opacity, side:THREE.DoubleSide, depthWrite:false });
  return new THREE.Mesh(geo, mat);
}
(function buildClimate(){
  climateGroup.add(climateShell(-23.5, 23.5, 0xffe066, 0.12));   // tropical
  climateGroup.add(climateShell(23.5, 35, 0xff9f43, 0.10));      // N subtropical
  climateGroup.add(climateShell(-35, -23.5, 0xff9f43, 0.10));    // S subtropical
  climateGroup.add(climateShell(35, 66.5, 0x4ecdc4, 0.10));      // N temperate
  climateGroup.add(climateShell(-66.5, -35, 0x4ecdc4, 0.10));    // S temperate
  climateGroup.add(climateShell(66.5, 90, 0x74b9ff, 0.14));      // N frigid
  climateGroup.add(climateShell(-90, -66.5, 0x74b9ff, 0.14));    // S frigid
})();

/* ================================================================ TWILIGHT / TERMINATOR */
const twilightMaterial = new THREE.ShaderMaterial({
  uniforms: {
    sunDir: { value: new THREE.Vector3(1,0,0) },
    darkness: { value: 1.0 },
  },
  vertexShader: `
    varying vec3 vNormal;
    void main(){
      vNormal = normalize(normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 sunDir;
    varying vec3 vNormal;
    uniform float darkness;
    void main(){
      float intensity = dot(vNormal, sunDir);
      if(intensity < -0.1){
        gl_FragColor = vec4(0.05, 0.1, 0.25, 0.7 * darkness);
      } else if(intensity < 0.1){
        float alpha = (intensity + 0.1) / 0.2;
        gl_FragColor = vec4(0.08, 0.15, 0.3, 0.45 * (1.0 - alpha) * darkness);
      } else {
        discard;
      }
    }
  `,
  transparent: true,
  depthWrite: false,
  side: THREE.FrontSide,
});
const twilightMesh = new THREE.Mesh(new THREE.SphereGeometry(1.01, 64, 48), twilightMaterial);
earthGroup.add(twilightMesh);

/* ================================================================ STARS */
let stars;
(function buildStars(){
  const N = 3000;
  const positions = new Float32Array(N * 3);
  const colors = new Float32Array(N * 3);
  const palette = [
    [1,1,1],         // white
    [0.6,0.8,1],     // blue
    [1,1,0.7],       // yellow
    [1,0.7,0.4],     // orange
  ];
  for(let i=0;i<N;i++){
    const r = 80 + Math.random() * 20;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.cos(phi);
    positions[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
    const col = palette[Math.floor(Math.random() * palette.length)];
    const b = 0.5 + Math.random() * 0.5;
    colors[i*3]   = col[0] * b;
    colors[i*3+1] = col[1] * b;
    colors[i*3+2] = col[2] * b;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.PointsMaterial({ size:0.35, vertexColors:true, transparent:true, opacity:0.9, sizeAttenuation:true });
  stars = new THREE.Points(geo, mat);
  scene.add(stars);
})();

/* ================================================================ INTERNAL STRUCTURE */
const internalGroup = new THREE.Group();
scene.add(internalGroup);
const clipPlane = new THREE.Plane(new THREE.Vector3(0, 0, -1), 0); // removes +Z half
const internalLayers = [
  { name:'内核',   rIn:0,     rOut:0.19, color:0xffd700, label:'固态铁镍' },
  { name:'外核',   rIn:0.19,  rOut:0.55, color:0xe67e22, label:'液态铁镍' },
  { name:'下地幔', rIn:0.55,  rOut:0.85, color:0xc0392b, label:'固态硅酸盐' },
  { name:'上地幔', rIn:0.85,  rOut:0.97, color:0x8b6914, label:'软流层' },
  { name:'地壳',   rIn:0.97,  rOut:1.0,  color:0x2ecc71, label:'岩石圈' },
];
(function buildInternal(){
  // Nested spheres clipped at +Z (front removed). BackSide renders the back
  // hemisphere outer walls; smaller (inner) layers are closer to camera and
  // occlude larger ones at the centre, producing clean concentric colour rings.
  for(let i = 0; i < internalLayers.length; i++){
    const L = internalLayers[i];
    const rOut = Math.max(0.001, L.rOut);
    const geo = new THREE.SphereGeometry(rOut, 64, 48);
    const mat = new THREE.MeshPhongMaterial({
      color: L.color,
      transparent: true,
      opacity: 0.92,
      side: THREE.BackSide,
      shininess: 5,
      clippingPlanes: [clipPlane],
      clipShadows: true,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData = L;
    mesh.renderOrder = internalLayers.length - i; // inner renders first
    internalGroup.add(mesh);
  }
  // Filled cross-section disks at z=0 (paint largest->smallest) for a clean cut face
  for(let i = internalLayers.length - 1; i >= 0; i--){
    const L = internalLayers[i];
    const r = Math.max(0.001, L.rOut);
    const diskGeo = new THREE.CircleGeometry(r, 64);
    const diskMat = new THREE.MeshBasicMaterial({
      color: L.color, transparent:true, opacity:0.55, side:THREE.DoubleSide,
      depthWrite:false, clippingPlanes:[clipPlane],
    });
    const disk = new THREE.Mesh(diskGeo, diskMat);
    disk.position.z = -0.002;
    disk.renderOrder = 50 + (internalLayers.length - i);
    internalGroup.add(disk);
  }
  // Cross-section ring outlines at each boundary (in z=0 plane)
  for(const L of internalLayers){
    const r = Math.max(0.001, L.rOut);
    const pts = [];
    for(let a=0;a<=Math.PI*2;a+=Math.PI/64){
      pts.push(new THREE.Vector3(Math.cos(a)*r, Math.sin(a)*r, -0.003));
    }
    const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent:true, opacity:0.5, clippingPlanes:[clipPlane] });
    internalGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lineMat));
  }
})();
internalGroup.visible = false;

/* ================================================================ SEISMIC WAVES */
const seismicGroup = new THREE.Group();
scene.add(seismicGroup);
let epicenterMarker = null;
const seismicWaves = []; // {mesh, type:'p'|'s', r, speed, maxR, mat}

function setEpicenter(point){
  // point in earthGroup local space (on surface)
  if(epicenterMarker){ seismicGroup.remove(epicenterMarker); epicenterMarker.geometry.dispose(); }
  const mat = new THREE.MeshBasicMaterial({ color: 0xffd700 });
  epicenterMarker = new THREE.Mesh(new THREE.SphereGeometry(0.025, 16, 12), mat);
  // place in world: convert local surface point to world via earthGroup
  const worldP = point.clone().applyMatrix4(earthGroup.matrixWorld);
  epicenterMarker.position.copy(worldP);
  seismicGroup.add(epicenterMarker);

  // spawn P and S waves centered at epicenter (world space)
  spawnWave('p', worldP);
  spawnWave('s', worldP);
}
function spawnWave(type, center){
  const color = type === 'p' ? 0x74b9ff : 0xe74c3c;
  const mat = new THREE.MeshBasicMaterial({ color, wireframe:true, transparent:true, opacity:0.7 });
  const geo = new THREE.SphereGeometry(1, 24, 16);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(center);
  mesh.scale.setScalar(0.02);
  seismicGroup.add(mesh);
  seismicWaves.push({
    mesh, type, r:0.02,
    speed: type === 'p' ? 0.045 : 0.026,
    maxR: type === 'p' ? 2.6 : 1.5, // S-wave capped (cannot pass outer core)
    mat,
  });
}
function clearSeismic(){
  for(const w of seismicWaves){ seismicGroup.remove(w.mesh); w.mesh.geometry.dispose(); w.mat.dispose(); }
  seismicWaves.length = 0;
  if(epicenterMarker){ seismicGroup.remove(epicenterMarker); epicenterMarker.geometry.dispose(); epicenterMarker = null; }
}

/* ================================================================ MAGNETIC FIELD */
const magneticGroup = new THREE.Group();
scene.add(magneticGroup);
let solarWind = null;
let magTiltMesh = null;

function buildMagnetic(){
  // Dipole field lines: r = L * sin^2(theta), theta = colatitude
  for(let L = 1.3; L <= 4.2; L += 0.38){
    const pts = [];
    for(let th = 0.12; th <= Math.PI - 0.12; th += 0.04){
      const r = L * Math.sin(th) * Math.sin(th);
      if(r < 1.0) continue; // inside earth
      const x = r * Math.sin(th);
      const y = -r * Math.cos(th);
      pts.push(new THREE.Vector3(x, y, 0));
    }
    if(pts.length < 2) continue;
    const curve = new THREE.CatmullRomCurve3(pts);
    const tubeGeo = new THREE.TubeGeometry(curve, 80, 0.006, 6, false);
    const tubeMat = new THREE.MeshBasicMaterial({ color: 0xa29bfe, transparent:true, opacity:0.5 });
    magneticGroup.add(new THREE.Mesh(tubeGeo, tubeMat));
    // mirror to other side
    const pts2 = pts.map(p => new THREE.Vector3(-p.x, p.y, p.z));
    const curve2 = new THREE.CatmullRomCurve3(pts2);
    const tubeGeo2 = new THREE.TubeGeometry(curve2, 80, 0.006, 6, false);
    magneticGroup.add(new THREE.Mesh(tubeGeo2, new THREE.MeshBasicMaterial({ color: 0xa29bfe, transparent:true, opacity:0.5 })));
  }
  // Magnetic poles
  const poleN = new THREE.Mesh(new THREE.SphereGeometry(0.04,16,12), new THREE.MeshBasicMaterial({ color:0x74b9ff }));
  poleN.position.set(0, 1.06, 0);
  magneticGroup.add(poleN);
  const poleS = new THREE.Mesh(new THREE.SphereGeometry(0.04,16,12), new THREE.MeshBasicMaterial({ color:0xff6b6b }));
  poleS.position.set(0, -1.06, 0);
  magneticGroup.add(poleS);

  // Solar wind particle system streaming from -X side
  const N = 1200;
  const positions = new Float32Array(N*3);
  const vels = new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const y = (Math.random()-0.5) * 6;
    const z = (Math.random()-0.5) * 6;
    positions[i*3]   = -8 - Math.random()*3;
    positions[i*3+1] = y;
    positions[i*3+2] = z;
    vels[i*3]   = 0.06 + Math.random()*0.04;
    vels[i*3+1] = 0;
    vels[i*3+2] = 0;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  solarWind = new THREE.Points(geo, new THREE.PointsMaterial({ color:0xffe066, size:0.06, transparent:true, opacity:0.7 }));
  solarWind.userData = { vels };
  magneticGroup.add(solarWind);

  // Bow shock (dashed line) on sunward side
  const shockPts = [];
  for(let a = -Math.PI/2.1; a <= Math.PI/2.1; a += 0.05){
    const dist = 2.8 * (1 + 0.35*Math.cos(a));
    shockPts.push(new THREE.Vector3(-dist*Math.cos(a), dist*Math.sin(a), 0));
  }
  const shockLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(shockPts),
    new THREE.LineDashedMaterial({ color:0xa29bfe, dashSize:0.1, gapSize:0.08, transparent:true, opacity:0.5 }));
  shockLine.computeLineDistances();
  magneticGroup.add(shockLine);

  magTiltMesh = magneticGroup;
}
buildMagnetic();

/* ================================================================ TECTONIC PLATES */
const tectonicGroup = new THREE.Group();
earthGroup.add(tectonicGroup);
const convectionArrows = [];

// Approximate major plate boundary polylines [lon,lat]
const plateBoundaries = [
  // Pacific Ring of Fire (east pacific + west americas)
  [[-180,60],[-170,55],[-160,50],[-150,45],[-140,40],[-130,35],[-120,30],[-115,25],[-110,20],[-100,15],[-95,10],[-85,5],[-80,0],[-75,-5],[-72,-15],[-72,-25],[-75,-35],[-74,-45],[-73,-55]],
  // Mid-Atlantic Ridge
  [[-30,75],[-32,65],[-30,55],[-28,45],[-30,35],[-32,25],[-33,15],[-32,5],[-31,-5],[-13,-10],[-12,-25],[-8,-40],[-5,-55]],
  // Pacific west (Japan -> Philippines -> Indonesia)
  [[140,55],[142,45],[140,35],[135,28],[130,20],[125,12],[122,5],[125,-5],[130,-10],[145,-15],[155,-25],[170,-35],[175,-50]],
  // Indian Ridge
  [[60,-10],[65,-20],[70,-30],[75,-40],[80,-50]],
  // Himalaya / Alpine belt
  [[0,38],[20,37],[40,38],[60,37],[75,35],[88,28],[95,27],[105,25],[120,24]],
  // East African Rift
  [[35,15],[36,5],[37,-5],[34,-15],[30,-25]],
];
const plateColors = [0xff6b6b, 0x4ecdc4, 0xffe06d, 0xa29bfe, 0x26de81, 0xfd79a8];
(function buildPlates(){
  plateBoundaries.forEach((poly, idx) => {
    const pts = poly.map(p => lonLatToVector3(p[0], p[1], 1.008));
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({ color: plateColors[idx % plateColors.length], linewidth: 2 });
    tectonicGroup.add(new THREE.Line(geo, mat));
    // boundary markers
    poly.forEach(p => {
      const pos = lonLatToVector3(p[0], p[1], 1.012);
      const dot = new THREE.Mesh(new THREE.SphereGeometry(0.014,10,8),
        new THREE.MeshBasicMaterial({ color: plateColors[idx % plateColors.length] }));
      dot.position.copy(pos);
      tectonicGroup.add(dot);
    });
  });
  // Mantle convection arrows beneath surface
  for(let i=0;i<10;i++){
    const ang = (i/10)*Math.PI*2 + 0.2;
    const baseR = 0.82;
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(0.025, 0.12, 8),
      new THREE.MeshBasicMaterial({ color: 0xff9f43, transparent:true, opacity:0.7 })
    );
    const pos = new THREE.Vector3(Math.cos(ang)*baseR, Math.sin(ang)*baseR, 0);
    cone.position.copy(pos);
    // orient outward
    cone.lookAt(pos.clone().multiplyScalar(2));
    cone.rotateX(Math.PI/2);
    tectonicGroup.add(cone);
    convectionArrows.push({ mesh:cone, angle:ang, baseR, phase:i*0.6, dir: i%2===0?1:-1 });
  }
})();

function setMode(mode){

  const modeNames = { surface:'地表视图', internal:'内部结构', seismic:'地震波', magnetic:'地磁场', tectonic:'板块构造' };
  document.getElementById('badgeMode').textContent = modeNames[mode];

  // Default visibility

  internalGroup.visible = (mode === 'internal');
  gridGroup.visible = options.grid && (mode === 'surface');
  axisGroup.visible = options.axis && (mode !== 'internal');
  cityGroup.visible = options.cities && (mode === 'surface');
  climateGroup.visible = options.climate && (mode === 'surface');
  twilightMesh.visible = options.twilight && (mode === 'surface');
  sunMarker.visible = options.sun && (mode === 'surface');
  sunGlow.visible = options.sun && (mode === 'surface');
  tectonicGroup.visible = (mode === 'tectonic');
  magneticGroup.visible = (mode === 'magnetic');

  if(mode === 'seismic'){
    sunLight.intensity = 1.0; ambientLight.intensity = 0.6;

    internal: '剖切半球 · 展示地壳/地幔/外核/内核',

/* ================================================================ RAYCAST (seismic click) */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
renderer.domElement.addEventListener('pointerdown', (e) => {
  if(currentMode !== 'seismic') return;
  if(e.button !== 0) return;
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObject(earthMesh, false);
  if(hits.length > 0){
    // convert world hit point to earthGroup local space
    const localP = hits[0].point.clone();
    earthGroup.worldToLocal(localP);
    localP.normalize().multiplyScalar(1.0);
    setEpicenter(localP);
    updateRightPanel();
  }
});

/* ================================================================ ANIMATION */
function updateSun(){
  const el = sunHeight * Math.PI / 180;
  sunLight.position.set(Math.cos(el) * 5, Math.sin(el) * 5, 0);
  const sunWorldDir = sunLight.position.clone().normalize();
  sunMarker.position.copy(sunWorldDir).multiplyScalar(1.04);
  sunGlow.position.copy(sunMarker.position);
  // sun direction in earthGroup local space for twilight shader
  const inv = new THREE.Matrix4().copy(earthGroup.matrixWorld).invert();
  const sunLocal = sunWorldDir.clone().transformDirection(inv);
  twilightMaterial.uniforms.sunDir.value.copy(sunLocal);
  // local time: longitude facing sun
  const ll = vector3ToLonLat(sunLocal.clone().multiplyScalar(1));
  simTime.subsolarLon = ll.lon;
}

function animate(timestamp){
  requestAnimationFrame(animate);
  if(!simTime.lastFrame) simTime.lastFrame = timestamp;
  const dt = Math.min(0.05, (timestamp - simTime.lastFrame) / 1000);
  simTime.lastFrame = timestamp;

  // FPS
  simTime.fpsCount++;
  simTime.fpsTimer += dt;
  if(simTime.fpsTimer >= 1){
    simTime.fps = simTime.fpsCount;
    simTime.fpsCount = 0;
    simTime.fpsTimer = 0;
    document.getElementById('badgeFPS').textContent = simTime.fps + ' FPS';
  }

  // Axis tilt
  earthGroup.rotation.z = axisTilt * Math.PI / 180;
  internalGroup.rotation.z = axisTilt * Math.PI / 180;

  // Earth rotation
  if(options.rotation && !isUserInteracting && currentMode !== 'internal'){
    earthGroup.rotation.y += 0.002 * rotationSpeed;
    simTime.hours = (simTime.hours + 0.002 * rotationSpeed * (24 / (Math.PI * 2))) % 24;
  }
  // internal group slow rotation for cross-section viewing
  if(currentMode === 'internal' && !isUserInteracting){
    internalGroup.rotation.y += 0.001 * rotationSpeed;
  }

  // Ensure matrixWorld is current before deriving local sun direction
  earthGroup.updateMatrixWorld();
  internalGroup.updateMatrixWorld();
  updateSun();

  // Seismic waves
  if(currentMode === 'seismic'){
    for(let i = seismicWaves.length - 1; i >= 0; i--){
      const w = seismicWaves[i];
      w.r += w.speed * (1 + rotationSpeed * 0.2);
      w.mesh.scale.setScalar(Math.max(0.001, w.r));
      const lifeFrac = w.r / w.maxR;
      w.mat.opacity = Math.max(0, 0.7 * (1 - lifeFrac));
      if(w.r >= w.maxR){
        seismicGroup.remove(w.mesh);
        w.mesh.geometry.dispose();
        w.mat.dispose();
        seismicWaves.splice(i, 1);
      }
    }
    if(epicenterMarker){
      const pulse = (Math.sin(timestamp * 0.008) + 1) * 0.5;
      epicenterMarker.scale.setScalar(1 + pulse * 0.8);
    }
  }

  // Solar wind particles
  if(currentMode === 'magnetic' && solarWind){
    const pos = solarWind.geometry.attributes.position;
    const vels = solarWind.userData.vels;
    for(let i=0;i<pos.count;i++){
      let x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
      x += vels[i*3];
      // deflect near earth
      const d = Math.hypot(x, y, z);
      if(d < 2.2 && x > -1.5){
        const f = 0.08 / (d*d + 0.2);
        y += y * f * 6;
        z += z * f * 6;
        vels[i*3] *= 0.96;
      }
      if(x > 8 || d < 1.05){
        // respawn on -X side
        x = -8 - Math.random()*3;
        y = (Math.random()-0.5) * 6;
        z = (Math.random()-0.5) * 6;
        vels[i*3] = 0.06 + Math.random()*0.04;
      }
      pos.setXYZ(i, x, y, z);
    }
    pos.needsUpdate = true;
    // magnetic tilt
    magneticGroup.rotation.y = timestamp * 0.0001;
  }

  // Mantle convection arrows
  if(currentMode === 'tectonic'){
    for(const a of convectionArrows){
      a.phase += dt * 0.8 * (1 + rotationSpeed * 0.3);
      const r = a.baseR + Math.sin(a.phase) * 0.06;
      const ang = a.angle + Math.cos(a.phase) * 0.15 * a.dir;
      const pos = new THREE.Vector3(Math.cos(ang)*r, Math.sin(ang)*r, 0);
      a.mesh.position.copy(pos);
      a.mesh.lookAt(pos.clone().multiplyScalar(2));
      a.mesh.rotateX(Math.PI/2);
      a.mesh.material.opacity = 0.4 + 0.4 * (0.5 + 0.5*Math.sin(a.phase));
    }
  }

  // Camera distance badge
  document.getElementById('badgeCam').textContent = 'R = ' + camera.position.length().toFixed(2);

  // Right panel live update (throttled)
  if(simTime.fpsCount % 15 === 0) updateLiveData();

  controls.update();
  renderer.render(scene, camera);
}

/* ================================================================ RIGHT PANEL */
function updateLiveData(){
  const grid = document.getElementById('liveGrid');
  if(!grid.children.length) return; // only update if built
  // recompute view center lat/lon
  const dir = camera.position.clone().normalize();
  const ll = vector3ToLonLat(dir);
  let localHour = (simTime.hours + (ll.lon / 15) + 24) % 24;
  if(localHour < 0) localHour += 24;
  const hh = Math.floor(localHour).toString().padStart(2,'0');
  const mm = Math.floor((localHour % 1) * 60).toString().padStart(2,'0');
  let season;
  if(sunHeight > 10) season = '北半球夏';
  else if(sunHeight < -10) season = '北半球冬';
  else season = '春秋分';

  const items = grid.children;
  if(items[0]) items[0].querySelector('.output-num').textContent = ll.lat.toFixed(1) + '°';
  if(items[1]) items[1].querySelector('.output-num').textContent = ll.lon.toFixed(1) + '°';
  if(items[2]) items[2].querySelector('.output-num').textContent = hh + ':' + mm;
  if(items[3]) items[3].querySelector('.output-num').textContent = season;
}

let quizIdx = 0, quizScore = 0, quizTotal = 0;
function renderQuiz(){
  const q = quizBank[quizIdx];
  document.getElementById('quizQ').textContent = `Q${quizIdx+1}. ${q.q}`;
  const optsDiv = document.getElementById('quizOpts');
  optsDiv.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('div');
    btn.className = 'quiz-opt';
    btn.textContent = String.fromCharCode(65+i) + '. ' + opt;
    btn.addEventListener('click', () => answerQuiz(i, q));
    optsDiv.appendChild(btn);
  });
  document.getElementById('quizFeedback').classList.remove('show');
  document.getElementById('quizScore').textContent = `${quizScore} / ${quizTotal}`;
}
function answerQuiz(idx, q){
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(o => o.style.pointerEvents = 'none');
  if(idx === q.a){ opts[idx].classList.add('correct'); quizScore++; }
  else { opts[idx].classList.add('wrong'); opts[q.a].classList.add('correct'); }
  quizTotal++;
  const fb = document.getElementById('quizFeedback');
  fb.textContent = q.exp;
  fb.classList.add('show');
  document.getElementById('quizScore').textContent = `${quizScore} / ${quizTotal}`;
}
document.getElementById('quizNext').addEventListener('click', () => {
  quizIdx = (quizIdx + 1) % quizBank.length;
  renderQuiz();
});
renderQuiz();
